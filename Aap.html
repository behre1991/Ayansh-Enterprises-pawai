<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आयांश एंटरप्राइजेज, पवई</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; margin: 0; padding-bottom: 90px; }
        header { background: #003366; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        .page { display: none; padding: 15px; }
        .active { display: block; }
        input, button { width: 100%; padding: 15px; margin: 8px 0; font-size: 18px; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #003366; color: white; border: none; cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #003366; height: 70px; }
        .nav button { flex: 1; color: white; background: none; border: none; font-size: 14px; }
    </style>
</head>
<body>

<header>आयांश एंटरप्राइजेज, पवई</header>

<div id="billing" class="page active">
    <h3>🧾 बिलिंग</h3>
    <input type="text" id="cName" placeholder="ग्राहक का नाम">
    <input type="text" id="iName" placeholder="सामान का नाम">
    <input type="number" id="iQty" placeholder="मात्रा (अनिवार्य)">
    <input type="number" id="iRate" placeholder="रेट">
    <button onclick="saveBill()">✅ बिल पक्का करें</button>
</div>

<div id="stock" class="page">
    <h3>📦 स्टॉक</h3>
    <div id="stockDisplay"></div>
</div>

<div id="purchase" class="page">
    <h3>📥 आवक</h3>
    <input type="text" id="pDist" placeholder="डिस्ट्रीब्यूटर">
    <input type="text" id="pItem" placeholder="सामान">
    <input type="number" id="pQty" placeholder="मात्रा (अनिवार्य)">
    <input type="number" id="pRate" placeholder="खरीद रेट">
    <button onclick="savePurchase()">सामग्री जोड़ें</button>
</div>

<div id="ledger" class="page">
    <h3>📒 खाता</h3>
    <button onclick="alert('कैमरा ओपन...')">📸 फोटो लें</button>
    <button style="background:green;">जमा</button>
    <button style="background:red;">बकाया काटें</button>
</div>

<div class="nav">
    <button onclick="show('billing')">🧾 बिल</button>
    <button onclick="show('stock')">📦 स्टॉक</button>
    <button onclick="show('purchase')">📥 आवक</button>
    <button onclick="show('ledger')">📒 खाता</button>
</div>

<script>
    let stock = JSON.parse(localStorage.getItem('myStock')) || {};

    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'stock') updateStockDisplay();
    }

    function savePurchase() {
        let item = document.getElementById('pItem').value;
        let qty = parseInt(document.getElementById('pQty').value);
        if(!item || !qty) return alert("मात्रा अनिवार्य है!");
        stock[item] = (stock[item] || 0) + qty;
        localStorage.setItem('myStock', JSON.stringify(stock));
        alert("स्टॉक अपडेट हो गया!");
    }

    function saveBill() {
        let item = document.getElementById('iName').value;
        let qty = parseInt(document.getElementById('iQty').value);
        if(stock[item] >= qty) {
            stock[item] -= qty;
            localStorage.setItem('myStock', JSON.stringify(stock));
            alert("बिल बन गया, स्टॉक अपडेट हुआ!");
        } else {
            alert("स्टॉक में सामान कम है!");
        }
    }

    function updateStockDisplay() {
        let display = document.getElementById('stockDisplay');
        display.innerHTML = JSON.stringify(stock);
    }
</script>
</body>
</html>
