<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>अयांश मुनीम</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #eef2f3; margin: 0; padding-bottom: 70px; }
        .header { background: #0d47a1; color: #ffca28; padding: 15px; }
        .h-top { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: #ffecb3; }
        .h-main { display: flex; align-items: center; }
        .logo { width: 50px; height: 50px; background: #ffffff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; font-size: 20px; cursor: pointer; overflow: hidden; }
        .card { background: #ffffff; margin: 10px; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 6px solid #ffca28; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; margin-bottom: 8px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #0d47a1; color: #ffca28; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-green { background: #2e7d32 !important; color: white !important; }
        .table-wrap { height: 300px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #0d47a1; color: #ffca28; padding: 10px; font-size: 13px; }
        td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; font-size: 13px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #ffffff; border-top: 1px solid #ddd; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: bold; color: #0d47a1; cursor: pointer; }
        .page { display: none; }
        .spacer { height: 30px; border-bottom: 1px solid #eee; margin-bottom: 15px; }
        .bold-big { font-weight: bold; font-size: 18px; border: 2px solid #0d47a1 !important; }
        #ledgerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; padding: 10px; }
        .modal-body { background: #fff; height: 100%; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; }
    </style>
</head>
<body onload="loadSavedData()">

<div id="lock" style="text-align:center; padding-top:100px;">
    <h3>अयांश मुनीम लॉगिन</h3>
    <input type="password" id="passInput" placeholder="पासवर्ड (1234)" style="width:70%;">
    <button onclick="unlockApp()" style="width:70%;">प्रवेश करें</button>
</div>

<div id="appBody" style="display:none;">
    <div class="header">
        <div class="h-top"><span id="dspGst">जीएसटी: XXXXX</span> <span id="dspMob">मोबाइल: 9999999999</span></div>
        <div class="h-main">
            <div class="logo" id="dspLogo" onclick="show('p-settings')">🏢</div>
            <div>
                <div id="dspName" style="font-weight:bold; font-size:18px;">अयांश इंटरप्राइजेज</div>
                <div id="dspAddr" style="font-size:12px;">दुकान का पता</div>
            </div>
        </div>
    </div>

    <div id="p-billing" class="page" style="display:block;">
        <div class="card">
            <div style="display:flex; gap:10px;">
                <input type="number" id="oldDue" class="bold-big" placeholder="पुराना बकाया"> 
                <input type="date" id="cDate" style="width: 40%;">
            </div>
            <input type="text" id="cName" placeholder="नाम और पता" oninput="fillMob()">
            <input type="number" id="cMob" placeholder="मोबाइल">
        </div>
        <div class="card">
            <input type="text" id="iName" placeholder="सामान का नाम">
            <div style="display:flex; gap:5px;">
                <input type="number" id="iQty" placeholder="मात्रा">
                <input type="number" id="iRate" placeholder="रेट">
            </div>
            <button onclick="addItem()">➕ जोड़ें</button>
            <table id="billTable"><thead><tr><th>नाम</th><th>मात्रा</th><th>रेट</th></tr></thead><tbody id="list"></tbody></table>
            <div id="totalSum" style="font-weight:bold; color: #0d47a1; margin-top:10px;">कुल योग: ₹0</div>
            <div style="display:flex; gap:10px;">
                <button onclick="generateBill('नगद')" class="btn-green">💰 नगद</button>
                <button onclick="generateBill('उधार')">📝 उधार</button>
            </div>
        </div>
    </div>

    <div id="p-khata" class="page">
        <div class="card"><input type="text" id="searchFarmer" placeholder="नाम से खोजें..." onkeyup="filterFarmers()"></div>
        <div class="card" id="farmerList"></div>
    </div>

    <div id="ledgerModal">
        <div class="modal-body">
            <button onclick="document.getElementById('ledgerModal').style.display='none'">❌ बंद करें</button>
            <h3 id="modalFarmerName"></h3>
            <div class="table-wrap" style="flex:1;">
                <table><thead><tr><th>तारीख</th><th>विवरण</th><th>उधार(+)</th><th>जमा(-)</th><th>शेष</th><th>X</th></tr></thead><tbody id="ledgerListBody"></tbody></table>
            </div>
            <button onclick="depositMoney()" class="btn-green">💰 पैसा जमा करें</button>
            <button onclick="shareWhatsApp()" style="background:#ef6c00;">📤 शेयर करें</button>
            <button onclick="deleteFarmer()" style="background:#b71c1c;">🗑️ किसान डिलीट करें</button>
        </div>
    </div>

    <div id="p-settings" class="page">
        <div class="card">
            <h3>प्रोफाइल सेटिंग</h3>
            <input type="file" id="logoIn" accept="image/*" onchange="previewLogo(this)">
            <input type="text" id="setName" placeholder="दुकान नाम">
            <input type="text" id="setMob" placeholder="मोबाइल नंबर">
            <input type="text" id="setGst" placeholder="जीएसटी">
            <input type="text" id="setAddr" placeholder="पता">
            <button onclick="updateProfile()">🔄 अपडेट प्रोफाइल</button>
            <div class="spacer"></div>
            <input type="password" id="newPass" placeholder="नया पासवर्ड">
            <button onclick="savePass()">🔒 पासवर्ड बदलें</button>
            <div class="spacer"></div>
            <button onclick="backupData()">💾 बैकअप लें</button>
            <button onclick="viewArchive()" style="background:#006064;">📜 पूरा रिकॉर्ड (Archive)</button>
            <input type="text" id="updateCode" placeholder="अपडेट कोड">
            <button onclick="updateApp()">🚀 अपडेट करें</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="tab" onclick="show('p-billing')">🛒 बिलिंग</div>
        <div class="tab" onclick="show('p-khata')">📜 खाता</div>
    </div>
</div>

<script>
    let farmers = JSON.parse(localStorage.getItem('farmersDB')) || {};
    let archive = JSON.parse(localStorage.getItem('archiveDB')) || [];
    let tempItems = []; let billTotal = 0;

    function unlockApp() { if(document.getElementById('passInput').value == (localStorage.getItem('appPass') || '1234')) { document.getElementById('lock').style.display='none'; document.getElementById('appBody').style.display='block'; } }
    function show(id) { document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); document.getElementById(id).style.display = 'block'; if(id=='p-khata') renderFarmers(); }
    
    function fillMob() { let n = document.getElementById('cName').value; if(farmers[n]) document.getElementById('cMob').value = farmers[n].mob || ""; }
    function addItem() { let n=document.getElementById('iName'), q=document.getElementById('iQty'), r=document.getElementById('iRate'); if(n.value && q.value && r.value) { billTotal += (q.value * r.value); tempItems.push({n:n.value, q:q.value, r:r.value}); document.getElementById('list').insertAdjacentHTML('beforeend', `<tr><td>${n.value}</td><td>${q.value}</td><td>${r.value}</td></tr>`); document.getElementById('totalSum').innerText = "कुल योग: ₹"+billTotal; n.value=''; q.value=''; r.value=''; } }

    function generateBill(type) {
        let name = document.getElementById('cName').value, mob = document.getElementById('cMob').value;
        if(!name || tempItems.length == 0) return alert("नाम और सामान जोड़ें!");
        let desc = tempItems.map(i => i.n).join(", ");
        if(type == 'उधार') {
            if(!farmers[name]) farmers[name] = { logs: [], mob: mob };
            farmers[name].logs.push({date: document.getElementById('cDate').value, desc: desc, dr: billTotal, cr: 0});
            localStorage.setItem('farmersDB', JSON.stringify(farmers));
        }
        archive.push({date: new Date().toLocaleDateString(), name: name, type: type, total: billTotal, desc: desc});
        localStorage.setItem('archiveDB', JSON.stringify(archive));
        document.getElementById('list').innerHTML = ''; document.getElementById('cName').value = ''; billTotal = 0; tempItems = []; document.getElementById('totalSum').innerText = "कुल योग: ₹0"; alert(type + " दर्ज!");
    }

    function renderFarmers() { let list = document.getElementById('farmerList'); list.innerHTML = ""; for(let n in farmers) list.insertAdjacentHTML('beforeend', `<button onclick="openLedger('${n}')">${n}</button>`); }
    function openLedger(n) { 
        document.getElementById('modalFarmerName').innerText = n; let b = document.getElementById('ledgerListBody'); b.innerHTML = ""; let bal = 0;
        farmers[n].logs.forEach((l, i) => { bal += (l.dr - l.cr); b.insertAdjacentHTML('beforeend', `<tr><td>${l.date}</td><td>${l.desc} (${l.dr>0 ? 'उधार':'नगद'})</td><td>${l.dr}</td><td>${l.cr}</td><td>${bal}</td><td><button onclick="delEntry('${n}',${i})">X</button></td></tr>`); });
        document.getElementById('ledgerModal').style.display = 'block';
    }
    function delEntry(n, i) { if(confirm("हटाएं?")) { archive.push({date: new Date().toLocaleDateString(), name: n, type: 'DELETE', desc: farmers[n].logs[i].desc, total: farmers[n].logs[i].dr}); farmers[n].logs.splice(i,1); localStorage.setItem('farmersDB', JSON.stringify(farmers)); localStorage.setItem('archiveDB', JSON.stringify(archive)); openLedger(n); } }
    function deleteFarmer() { if(confirm("पूरा खाता हटाएं?")) { delete farmers[document.getElementById('modalFarmerName').innerText]; localStorage.setItem('farmersDB', JSON.stringify(farmers)); document.getElementById('ledgerModal').style.display='none'; renderFarmers(); } }
    function shareWhatsApp() { let msg = "लेजर: " + document.getElementById('modalFarmerName').innerText + "\n" + JSON.stringify(farmers[document.getElementById('modalFarmerName').innerText].logs); window.open("https://wa.me/?text=" + encodeURIComponent(msg)); }
    function depositMoney() { let a = parseFloat(prompt("जमा राशि:")); if(a) { farmers[document.getElementById('modalFarmerName').innerText].logs.push({date: new Date().toLocaleDateString(), desc: "नकद जमा", dr: 0, cr: a}); localStorage.setItem('farmersDB', JSON.stringify(farmers)); openLedger(document.getElementById('modalFarmerName').innerText); } }
    function updateProfile() { localStorage.setItem('shopProfile', JSON.stringify({n:document.getElementById('setName').value, m:document.getElementById('setMob').value, g:document.getElementById('setGst').value, a:document.getElementById('setAddr').value})); alert("अपडेट!"); }
    function savePass() { localStorage.setItem('appPass', document.getElementById('newPass').value); alert("पासवर्ड बदल गया!"); }
    function backupData() { let d = {curr: farmers, arch: archive}; let a = document.createElement('a'); a.href = 'data:text/plain;'+encodeURIComponent(JSON.stringify(d)); a.download = 'AnnualData.json'; a.click(); }
    function viewArchive() { alert("पूरा रिकॉर्ड: " + JSON.stringify(archive).substring(0, 100) + "..."); }
    function updateApp() { if(document.getElementById('updateCode').value=="UPDATE") { alert("Done"); location.reload(); } }
    function previewLogo(i) { let r = new FileReader(); r.onload=function(e){document.getElementById('dspLogo').innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;">`}; r.readAsDataURL(i.files[0]); }
    function loadSavedData() { document.getElementById('cDate').valueAsDate = new Date(); let p = JSON.parse(localStorage.getItem('shopProfile')); if(p) { document.getElementById('setName').value=p.n; document.getElementById('setMob').value=p.m; document.getElementById('setGst').value=p.g; document.getElementById('setAddr').value=p.a; } }
    function filterFarmers() {}
</script>
</body>
</html>
