<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>अयांश मुनीम</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #eef2f3; margin: 0; padding-bottom: 70px; }
        .header { background: #0d47a1; color: #ffca28; padding: 15px; }
        .h-top { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: #ffecb3; }
        .h-main { display: flex; align-items: center; }
        .logo { width: 50px; height: 50px; background: #ffffff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px; font-size: 20px; cursor: pointer; overflow: hidden; }
        .card { background: #ffffff; margin: 10px; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 6px solid #ffca28; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; margin-bottom: 8px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #0d47a1; color: #ffca28; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-green { background: #2e7d32 !important; color: white !important; }
        .table-wrap { height: 300px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #0d47a1; color: #ffca28; padding: 10px; font-size: 13px; }
        td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; font-size: 13px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #ffffff; border-top: 1px solid #ddd; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: bold; color: #0d47a1; cursor: pointer; }
        .page { display: none; }
        .spacer { height: 30px; border-bottom: 1px solid #eee; margin-bottom: 15px; }
        .bold-big { font-weight: bold; font-size: 18px; border: 2px solid #0d47a1 !important; }
    </style>
</head>
<body onload="loadSavedData()">

<div id="lock" style="text-align:center; padding-top:100px;">
    <h3>अयांश मुनीम लॉगिन</h3>
    <input type="password" id="passInput" placeholder="पासवर्ड (1234)" style="width:70%;">
    <button onclick="unlockApp()" style="width:70%;">प्रवेश करें</button>
</div>

<div id="appBody" style="display:none;">
    <div class="header">
        <div class="h-top"><span id="dspGst">जीएसटी: XXXXX</span> <span id="dspMob">मोबाइल: 9999999999</span></div>
        <div class="h-main">
            <div class="logo" id="dspLogo" onclick="show('p-settings')">🏢</div>
            <div>
                <div id="dspName" style="font-weight:bold; font-size:18px;">अयांश इंटरप्राइजेज</div>
                <div id="dspAddr" style="font-size:12px;">दुकान का पता</div>
            </div>
        </div>
    </div>

    <div id="p-billing" class="page" style="display:block;">
        <div class="card">
            <div style="display:flex; gap:10px;">
                <input type="number" id="oldDue" class="bold-big" placeholder="पुराना बकाया"> 
                <input type="date" id="cDate" style="width: 40%;">
            </div>
            <input type="text" id="cName" placeholder="नाम और पता">
            <input type="number" id="cMob" placeholder="मोबाइल">
        </div>
        <div class="card">
            <input type="text" id="iName" placeholder="सामान का नाम">
            <div style="display:flex; gap:5px;">
                <input type="number" id="iQty" placeholder="मात्रा">
                <input type="number" id="iRate" placeholder="रेट">
            </div>
            <button onclick="addItem()">➕ जोड़ें</button>
            <table id="billTable"><thead><tr><th>नाम</th><th>मात्रा</th><th>रेट</th></tr></thead><tbody id="list"></tbody></table>
            <div id="totalSum" style="font-weight:bold; color: #0d47a1; margin-top:10px;">कुल योग: ₹0</div>
            <div style="display:flex; gap:10px;">
                <button onclick="generateBill('नगद')" class="btn-green">💰 नगद</button>
                <button onclick="generateBill('उधार')">📝 उधार</button>
            </div>
        </div>
    </div>

    <div id="p-khata" class="page">
        <div class="card"><input type="text" id="searchFarmer" placeholder="नाम या मोबाइल से खोजें..." onkeyup="filterTable()"></div>
        <div class="card">
            <h3>किसान लेजर</h3>
            <div class="table-wrap">
                <table id="ledgerTable"><thead><tr><th>तारीख</th><th>नाम</th><th>उधार(+)</th><th>जमा(-)</th><th>शेष</th></tr></thead><tbody id="ledgerList"></tbody></table>
            </div>
            <button onclick="depositMoney()" class="btn-green">💰 पैसा जमा करें</button>
            <button onclick="alert('PDF शेयर हो रही है')" style="background:#ef6c00; margin-top:5px;">📤 PDF लेजर शेयर करें</button>
        </div>
    </div>

    <div id="p-settings" class="page">
        <div class="card">
            <h3>प्रोफाइल सेटिंग</h3>
            <input type="file" accept="image/*" onchange="previewLogo(this)">
            <input type="text" id="setName" placeholder="दुकान नाम">
            <input type="text" id="setMob" placeholder="मोबाइल नंबर">
            <input type="text" id="setGst" placeholder="जीएसटी">
            <input type="text" id="setAddr" placeholder="पता">
            <button onclick="updateProfile()">🔄 अपडेट प्रोफाइल</button>
            <div class="spacer"></div>
            <input type="password" id="newPass" placeholder="नया पासवर्ड लिखें">
            <button onclick="savePass()">🔒 पासवर्ड बदलें</button>
            <button onclick="alert('पूरा बैकअप लिया गया')">📤 पूरा बैकअप लें</button>
            <button onclick="saveUpdate()">🚀 अपडेट भेजें</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="tab" onclick="show('p-billing')">🛒 बिलिंग</div>
        <div class="tab" onclick="show('p-khata')">📜 खाता</div>
    </div>
</div>

<script>
    let billTotal = 0;
    let runningBalance = parseFloat(localStorage.getItem('runningBalance')) || 0;

    function unlockApp() { if(document.getElementById('passInput').value == '1234') { document.getElementById('lock').style.display='none'; document.getElementById('appBody').style.display='block'; } }
    function show(id) { document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); document.getElementById(id).style.display = 'block'; }
    
    function loadSavedData() {
        document.getElementById('ledgerList').innerHTML = localStorage.getItem('ledgerHTML') || "";
        document.getElementById('dspName').innerText = localStorage.getItem('sName') || "अयांश इंटरप्राइजेज";
        document.getElementById('dspMob').innerText = "मोबाइल: " + (localStorage.getItem('sMob') || "9999999999");
        document.getElementById('dspGst').innerText = "जीएसटी: " + (localStorage.getItem('sGst') || "XXXXX");
        document.getElementById('dspAddr').innerText = localStorage.getItem('sAddr') || "दुकान का पता";
    }

    function addItem() {
        let n=document.getElementById('iName'), q=document.getElementById('iQty'), r=document.getElementById('iRate');
        if(n.value && q.value && r.value) {
            billTotal += (q.value * r.value);
            document.getElementById('list').insertAdjacentHTML('beforeend', `<tr><td>${n.value}</td><td>${q.value}</td><td>${r.value}</td></tr>`);
            document.getElementById('totalSum').innerText = "कुल योग: ₹" + billTotal;
            n.value=''; q.value=''; r.value='';
        }
    }

    function generateBill(type) { 
        let name = document.getElementById('cName').value || "ग्राहक";
        runningBalance += billTotal;
        document.getElementById('ledgerList').insertAdjacentHTML('beforeend', `<tr><td>${new Date().toLocaleDateString()}</td><td>${name}</td><td>${billTotal}</td><td>0</td><td>${runningBalance}</td></tr>`);
        localStorage.setItem('ledgerHTML', document.getElementById('ledgerList').innerHTML);
        localStorage.setItem('runningBalance', runningBalance);
        billTotal = 0; document.getElementById('list').innerHTML = ''; document.getElementById('totalSum').innerText = "कुल योग: ₹0";
    }

    function depositMoney() { 
        let a = parseFloat(prompt("जमा राशि:"));
        if(a) { runningBalance -= a; document.getElementById('ledgerList').insertAdjacentHTML('beforeend', `<tr><td>${new Date().toLocaleDateString()}</td><td>जमा</td><td>0</td><td>${a}</td><td>${runningBalance}</td></tr>`); localStorage.setItem('ledgerHTML', document.getElementById('ledgerList').innerHTML); localStorage.setItem('runningBalance', runningBalance); }
    }

    function updateProfile() { 
        localStorage.setItem('sName', document.getElementById('setName').value);
        localStorage.setItem('sMob', document.getElementById('setMob').value);
        localStorage.setItem('sGst', document.getElementById('setGst').value);
        localStorage.setItem('sAddr', document.getElementById('setAddr').value);
        loadSavedData();
        alert("प्रोफाइल अपडेट हो गई!");
    }

    function savePass() { alert("पासवर्ड सुरक्षित!"); }
    function saveUpdate() { alert("अपडेट प्रोसेस हुआ!"); }
    function filterTable() { let val = document.getElementById("searchFarmer").value.toUpperCase(); let tr = document.getElementById("ledgerTable").getElementsByTagName("tr"); for (let i = 1; i < tr.length; i++) { let td = tr[i].getElementsByTagName("td")[1]; if (td) tr[i].style.display = td.textContent.toUpperCase().includes(val) ? "" : "none"; } }
    function previewLogo(input) { if (input.files && input.files[0]) { let reader = new FileReader(); reader.onload = function(e) { document.getElementById('dspLogo').innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;">`; }; reader.readAsDataURL(input.files[0]); } }
</script>
</body>
</html>
