<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>डिजिटल दुकान - स्मार्ट मैनेजर</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; }
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; padding-bottom: 30px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .nav-pills .nav-link.active { background: var(--primary); border-radius: 20px; }
        .lock-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        @media print { .no-print { display: none; } #receipt { border: 1px solid #000; padding: 15px; } }
    </style>
</head>
<body>

<div id="lockScreen" class="lock-overlay">
    <div class="card p-4 text-center shadow-lg" style="width: 300px;">
        <h4 class="mb-3">🔐 सुरक्षित लॉगिन</h4>
        <input type="password" id="pinInput" class="form-control text-center mb-3" placeholder="पिन डालें">
        <button onclick="checkUnlock()" class="btn btn-primary w-100 fw-bold">प्रवेश करें</button>
        <p class="small text-muted mt-2">शुरुआती पिन: 1234</p>
    </div>
</div>

<div class="container mt-3 hidden" id="mainContent">
    <header class="text-center mb-4 no-print">
        <h2 class="fw-bold text-primary" id="disp_shopName">मेरी दुकान</h2>
        <div class="small text-muted" id="disp_shopDetails">GST: - | मो: -</div>
    </header>

    <ul class="nav nav-pills nav-justified mb-3 bg-white p-1 rounded-pill shadow-sm no-print">
        <li class="nav-item"><a class="nav-link active" data-bs-toggle="pill" href="#billingTab">🧾 बिलिंग</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#stockTab">📦 स्टॉक</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#khataTab">📒 खाता</a></li>
        <li class="nav-item"><a class="nav-link" data-bs-toggle="pill" href="#settingTab">⚙️ सेटिंग</a></li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="billingTab">
            <div class="card p-3 no-print">
                <h5>🛒 नया बिल</h5>
                <input type="text" id="custName" class="form-control mb-2" placeholder="किसान/ग्राहक का नाम">
                <input type="number" id="custPhone" class="form-control mb-3" placeholder="व्हाट्सएप नंबर">
                
                <div class="row g-1 border-top pt-2">
                    <div class="col-5"><input type="text" id="itemName" class="form-control" placeholder="सामान"></div>
                    <div class="col-3"><input type="number" id="itemQty" class="form-control" placeholder="मात्रा"></div>
                    <div class="col-4"><input type="number" id="itemRate" class="form-control" placeholder="रेट"></div>
                    <button onclick="addToBill()" class="btn btn-dark mt-2 fw-bold">➕ आइटम जोड़ें</button>
                </div>

                <table class="table mt-3 small table-bordered">
                    <thead class="table-light"><tr><th>नाम</th><th>मात्रा</th><th>कुल</th></tr></thead>
                    <tbody id="billTableBody"></tbody>
                </table>
                <h5 class="text-end fw-bold">कुल योग: ₹<span id="grandTotal">0</span></h5>
                <button onclick="finalizeBill()" class="btn btn-success w-100 fw-bold py-2 mt-2">✅ बिल पक्का करें और WhatsApp</button>
            </div>
            
            <div id="receipt" class="card p-3">
                <center><h4 id="rec_name">दुकान का नाम</h4><small id="rec_gst"></small></center>
                <hr>
                <p><b>ग्राहक:</b> <span id="rec_cust">-</span></p>
                <div id="rec_items"></div>
                <hr>
                <h5 class="text-end">कुल: ₹<span id="rec_total">0</span></h5>
                <center class="mt-2">
                    <img id="upiQR" src="" width="120" class="border p-1">
                    <p class="small mt-1">Scan & Pay</p>
                    <button class="btn btn-outline-dark btn-sm w-100 no-print" onclick="window.print()">🖨️ रसीद प्रिंट करें</button>
                </center>
            </div>
        </div>

        <div class="tab-pane fade" id="stockTab">
            <div class="card p-3">
                <h5>📦 नया स्टॉक जोड़ें</h5>
                <div class="row g-2">
                    <div class="col-7"><input type="text" id="stkName" class="form-control" placeholder="सामान का नाम"></div>
                    <div class="col-5"><input type="number" id="stkQty" class="form-control" placeholder="मात्रा"></div>
                </div>
                <button onclick="saveStock()" class="btn btn-primary w-100 mt-2 fw-bold">स्टॉक अपडेट करें</button>
                <hr>
                <h6>वर्तमान स्टॉक लिस्ट:</h6>
                <table class="table table-sm">
                    <thead><tr><th>आइटम</th><th>बचा माल</th></tr></thead>
                    <tbody id="stockDisplayTable"></tbody>
                </table>
            </div>
        </div>

        <div class="tab-pane fade" id="khataTab">
            <div class="card p-3">
                <h5>💰 उधारी और जमा</h5>
                <div class="input-group mb-3">
                    <input type="text" id="payName" class="form-control" placeholder="किसान का नाम">
                    <input type="number" id="payAmt" class="form-control" placeholder="जमा राशि">
                    <button class="btn btn-primary" onclick="processPayment()">💵 जमा करें</button>
                </div>
                <table class="table table-sm border">
                    <thead class="table-danger text-white"><tr><th>किसान</th><th>बकाया</th><th>एक्शन</th></tr></thead>
                    <tbody id="khataTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="tab-pane fade" id="settingTab">
            <div class="card p-3">
                <h5>⚙️ मास्टर सेटिंग</h5>
                <label class="small fw-bold">दुकान का नाम:</label><input type="text" id="set_name" class="form-control mb-2">
                <label class="small fw-bold">GST नंबर:</label><input type="text" id="set_gst" class="form-control mb-2">
                <label class="small fw-bold">मोबाइल नंबर:</label><input type="text" id="set_phone" class="form-control mb-2">
                <label class="small fw-bold">UPI ID (उदा: 91xxx@ybl):</label><input type="text" id="set_upi" class="form-control mb-2">
                <label class="small fw-bold">नया पिन (4 अंक):</label><input type="text" id="set_pin" class="form-control mb-3">
                <button onclick="saveSettings()" class="btn btn-danger w-100 fw-bold">💾 सेटिंग्स सुरक्षित करें</button>
            </div>
        </div>
    </div>
</div>

<script>
    // डेटाबेस लोड करें (LocalStorage)
    let db = JSON.parse(localStorage.getItem('dukaanDB')) || {
        config: {name: "मेरी दुकान", gst: "GST123", phone: "91000", upi: "pay@upi", pin: "1234"},
        inventory: {},
        khata: {}
    };

    let tempBill = [];
    let grandTotal = 0;

    // लॉगिन चेक
    function checkUnlock() {
        if(document.getElementById('pinInput').value === db.config.pin) {
            document.getElementById('lockScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            initApp();
        } else { alert("गलत पिन!"); }
    }

    // ऐप शुरू करें
    function initApp() {
        document.getElementById('disp_shopName').innerText = db.config.name;
        document.getElementById('disp_shopDetails').innerText = `GST: ${db.config.gst} | मो: ${db.config.phone}`;
        document.getElementById('rec_name').innerText = db.config.name;
        document.getElementById('rec_gst').innerText = `GST: ${db.config.gst} | मो: ${db.config.phone}`;
        
        // फॉर्म सेटिंग्स भरें
        document.getElementById('set_name').value = db.config.name;
        document.getElementById('set_gst').value = db.config.gst;
        document.getElementById('set_phone').value = db.config.phone;
        document.getElementById('set_upi').value = db.config.upi;
        document.getElementById('set_pin').value = db.config.pin;
        
        refreshStock();
        refreshKhata();
    }

    // बिलिंग फंक्शन्स
    function addToBill() {
        let n = document.getElementById('itemName').value, q = document.getElementById('itemQty').value, r = document.getElementById('itemRate').value;
        if(!n || !q || !r) return;
        let t = q * r;
        tempBill.push({name: n, qty: q, total: t});
        grandTotal += t;
        
        document.getElementById('billTableBody').innerHTML += `<tr><td>${n}</td><td>${q}</td><td>₹${t}</td></tr>`;
        document.getElementById('grandTotal').innerText = grandTotal;
        document.getElementById('itemName').value = '';
    }

    function finalizeBill() {
        let cName = document.getElementById('custName').value, cPhone = document.getElementById('custPhone').value;
        if(!cName || tempBill.length === 0) return alert("नाम और सामान भरें!");

        // स्टॉक अपडेट और उधारी अपडेट
        if(!db.khata[cName]) db.khata[cName] = {phone: cPhone, balance: 0};
        db.khata[cName].balance += grandTotal;
        
        tempBill.forEach(item => {
            if(db.inventory[item.name]) db.inventory[item.name] -= parseFloat(item.qty);
            else db.inventory[item.name] = -parseFloat(item.qty); // स्टॉक में नहीं है तो माइनस में दिखाएगा
        });

        // रसीद तैयार करें
        document.getElementById('rec_cust').innerText = cName;
        document.getElementById('rec_total').innerText = grandTotal;
        document.getElementById('rec_items').innerHTML = tempBill.map(i => `<div>${i.name} x${i.qty} = ₹${i.total}</div>`).join('');
        document.getElementById('upiQR').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=upi://pay?pa=${db.config.upi}&pn=${db.config.name}&am=${grandTotal}`;

        saveToDB();
        
        let msg = `*${db.config.name}*\nग्राहक: ${cName}\nकुल बिल: ₹${grandTotal}\nधन्यवाद!`;
        window.open(`https://wa.me/91${cPhone}?text=${encodeURIComponent(msg)}`, '_blank');
        
        // साफ़ करें
        tempBill = []; grandTotal = 0;
        document.getElementById('billTableBody').innerHTML = '';
        document.getElementById('grandTotal').innerText = '0';
        refreshStock(); refreshKhata();
    }

    // स्टॉक मैनेजमेंट
    function saveStock() {
        let n = document.getElementById('stkName').value, q = document.getElementById('stkQty').value;
        if(!n || !q) return;
        db.inventory[n] = (db.inventory[n] || 0) + parseFloat(q);
        saveToDB(); refreshStock();
        document.getElementById('stkName').value = ''; document.getElementById('stkQty').value = '';
    }

    function refreshStock() {
        let h = "";
        for(let key in db.inventory) h += `<tr><td>${key}</td><td>${db.inventory[key]}</td></tr>`;
        document.getElementById('stockDisplayTable').innerHTML = h;
    }

    // खाता (Payment)
    function processPayment() {
        let n = document.getElementById('payName').value, a = document.getElementById('payAmt').value;
        if(db.khata[n]) {
            db.khata[n].balance -= parseFloat(a);
            saveToDB(); refreshKhata();
            alert("जमा सफल!");
        } else { alert("किसान का नाम नहीं मिला!"); }
    }

    function refreshKhata() {
        let h = "";
        for(let key in db.khata) {
            h += `<tr><td>${key}</td><td class="text-danger fw-bold">₹${db.khata[key].balance}</td>
            <td><button class="btn btn-sm btn-success" onclick="sendWA('${key}','${db.khata[key].phone}','${db.khata[key].balance}')">रिमाइंडर</button></td></tr>`;
        }
        document.getElementById('khataTableBody').innerHTML = h;
    }

    function sendWA(n,p,b) {
        window.open(`https://wa.me/91${p}?text=${encodeURIComponent("*रिमाइंडर:* आपका बकाया ₹"+b+" है।")}`, '_blank');
    }

    // सेटिंग्स
    function saveSettings() {
        db.config = {
            name: document.getElementById('set_name').value,
            gst: document.getElementById('set_gst').value,
            phone: document.getElementById('set_phone').value,
            upi: document.getElementById('set_upi').value,
            pin: document.getElementById('set_pin').value
        };
        saveToDB(); location.reload();
    }

    function saveToDB() {
        localStorage.setItem('dukaanDB', JSON.stringify(db));
    }
</script>
</body>
</html>
