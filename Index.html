<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ayansh Pro Vyapar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --p: #002970; --s: #FF8F00; --g: #2E7D32; --r: #C62828; --bg: #F4F7F9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .header { background: var(--p); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 15px; border-bottom: 4px solid var(--s); position: sticky; top: 0; z-index: 1000; }
        #sh-logo-img { width: 50px; height: 50px; border-radius: 50%; background: white; object-fit: cover; border: 2px solid var(--s); }
        .container { padding: 10px; max-width: 600px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr 40px; gap: 5px; margin-bottom: 10px; align-items: center; }
        .inp { border: 1px solid #ccc; border-radius: 6px; padding: 10px; font-size: 14px; width: 100%; box-sizing: border-box; }
        .btn { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; padding: 12px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; }
        .btn-save { background: var(--s); font-size: 16px; margin-top: 10px; }
        .footer { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 70px; border-top: 1px solid #ddd; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #7F8C8D; font-size: 11px; font-weight: bold; cursor: pointer; }
        .tab-active { color: var(--p); background: #F0F2F9; border-top: 4px solid var(--p); }
        .page { display: none; } .show { display: block; }
        .total-box { background: #333; color: white; padding: 10px; border-radius: 8px; text-align: right; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body onload="initApp()">

    <div class="header">
        <img id="sh-logo-img" src="https://via.placeholder.com/50" alt="Logo">
        <div>
            <h2 id="sh-name" style="margin:0; font-size:16px;">दुकान का नाम</h2>
            <small id="sh-info">GST: NA | Mob: NA</small>
        </div>
    </div>

    <div class="container">
        <div id="pg-bill" class="page">
            <div class="card">
                <input type="text" id="cN" class="inp" placeholder="किसान का नाम" list="cL" onkeyup="checkOld(this.value)">
                <input type="number" id="cM" class="inp" placeholder="मोबाइल नंबर" style="margin-top:8px;">
            </div>
            <div class="card">
                <div id="itemList"></div>
                <button class="btn" style="background:#555; padding:8px; font-size:12px;" onclick="addItem()">+ सामान जोड़ें</button>
                <div class="total-box" style="margin-top:10px;">कुल: ₹<span id="gTotal">0</span></div>
                <select id="pMode" class="inp" style="margin-top:10px;"><option value="उधार">उधार</option><option value="नगद">नगद</option></select>
                <button class="btn btn-save" onclick="saveBill()">💾 बिल सुरक्षित करें</button>
            </div>
        </div>

        <div id="pg-khata" class="page">
            <button class="btn" style="background:var(--g); margin-bottom:10px;" onclick="exportEx('TX')">📊 Excel खाता डाउनलोड</button>
            <div id="khataList"></div>
        </div>

        <div id="pg-stock" class="page">
            <div class="card">
                <input type="text" id="sN" class="inp" placeholder="सामान का नाम">
                <input type="number" id="sQ" class="inp" placeholder="मात्रा" style="margin:8px 0;">
                <input type="number" id="sR" class="inp" placeholder="रेट (खरीद)">
                <button class="btn" style="background:var(--p); margin-top:10px;" onclick="addStock()">📦 स्टॉक जोड़ें</button>
            </div>
            <button class="btn" style="background:var(--g); margin-bottom:10px;" onclick="exportEx('STOCK')">📋 स्टॉक Excel रिपोर्ट</button>
            <div id="stockList"></div>
        </div>

        <div id="pg-set" class="page">
            <div class="card">
                <label>दुकान लोगो:</label> <input type="file" accept="image/*" onchange="upLogo(this)">
                <input type="text" id="setN" class="inp" placeholder="दुकान का नाम" style="margin-top:8px;">
                <input type="text" id="setG" class="inp" placeholder="GST नंबर" style="margin:8px 0;">
                <input type="number" id="setM" class="inp" placeholder="मोबाइल नंबर">
                <button class="btn" style="background:var(--p); margin-top:10px;" onclick="saveSet()">💾 जानकारी सेव करें</button>
            </div>
            <div class="card" style="border-top:5px solid var(--r)">
                <textarea id="upCode" class="inp" style="height:60px" placeholder="नया कोड यहाँ डालें"></textarea>
                <button class="btn" style="background:var(--r); margin-top:10px;" onclick="updateApp()">🚀 कोड अपडेट करें</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="tab" id="t-bill" onclick="tab('bill')">📝 बिलिंग</div>
        <div class="tab" id="t-khata" onclick="tab('khata')">📒 खाता</div>
        <div class="tab" id="t-stock" onclick="tab('stock')">📦 स्टॉक</div>
        <div class="tab" id="t-set" onclick="tab('set')">⚙️ सेटिंग</div>
    </div>

    <datalist id="cL"></datalist> <datalist id="sL"></datalist>

    <script>
        let DB = JSON.parse(localStorage.getItem("AYANSH_FINAL_V6")) || { tx: [], stock: [], prof: { name: "Ayansh Enterprises", gst: "NA", mob: "NA", logo: "" } };

        function initApp() { tab('bill'); loadProf(); addItem(); renderStock(); }

        function tab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
            document.getElementById('pg-' + t).classList.add('show');
            document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('tab-active'));
            document.getElementById('t-' + t).classList.add('tab-active');
            if(t==='khata') renderKhata();
            if(t==='stock') renderStock();
        }

        function upLogo(input) {
            if (input.files && input.files[0]) {
                let r = new FileReader();
                r.onload = e => { DB.prof.logo = e.target.result; document.getElementById('sh-logo-img').src = e.target.result; sync(); };
                r.readAsDataURL(input.files[0]);
            }
        }

        function loadProf() {
            document.getElementById('sh-name').innerText = DB.prof.name;
            document.getElementById('sh-info').innerText = `GST: ${DB.prof.gst} | Mob: ${DB.prof.mob}`;
            document.getElementById('setN').value = DB.prof.name;
            document.getElementById('setG').value = DB.prof.gst;
            document.getElementById('setM').value = DB.prof.mob;
            if(DB.prof.logo) document.getElementById('sh-logo-img').src = DB.prof.logo;
            document.getElementById('cL').innerHTML = [...new Set(DB.tx.map(x => x.n))].map(n => `<option value="${n}">`).join('');
            document.getElementById('sL').innerHTML = DB.stock.map(s => `<option value="${s.n}">`).join('');
        }

        function saveSet() {
            DB.prof.name = document.getElementById('setN').value;
            DB.prof.gst = document.getElementById('setG').value;
            DB.prof.mob = document.getElementById('setM').value;
            sync(); loadProf(); alert("सेव हुआ!");
        }

        function addItem() {
            let div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `<input type="text" class="inp i-n" placeholder="सामान" list="sL"> <input type="number" class="inp i-q" placeholder="मात्रा" oninput="calc()"> <input type="number" class="inp i-r" placeholder="रेट" oninput="calc()"> <button onclick="this.parentElement.remove(); calc()" style="background:none; border:none; color:red">✖</button>`;
            document.getElementById('itemList').appendChild(div);
        }

        function calc() {
            let t = 0;
            document.querySelectorAll('.item-row').forEach(r => {
                let q = r.querySelector('.i-q').value || 0, rt = r.querySelector('.i-r').value || 0;
                t += (q * rt);
            });
            document.getElementById('gTotal').innerText = t;
        }

        function saveBill() {
            let n = document.getElementById('cN').value, total = document.getElementById('gTotal').innerText;
            if(!n || total == "0") return alert("विवरण भरें!");
            let items = [];
            document.querySelectorAll('.item-row').forEach(r => {
                let name = r.querySelector('.i-n').value;
                if(name) items.push(`${name}(Qty:${r.querySelector('.i-q').value}, Rate:${r.querySelector('.i-r').value})`);
            });
            DB.tx.push({ n, m: document.getElementById('cM').value, items: items.join(", "), total: parseFloat(total), type: document.getElementById('pMode').value, date: new Date().toLocaleString() });
            sync(); alert("बिल सेव!"); location.reload();
        }

        function checkOld(n) {
            let b = DB.tx.filter(x => x.n === n && x.type === 'उधार').reduce((s, x) => s + x.total, 0);
            if(b > 0) alert("पुराना बकाया: ₹" + b);
        }

        function renderKhata() {
            let h = "";
            [...new Set(DB.tx.map(x => x.n))].reverse().forEach(n => {
                let bal = DB.tx.filter(x => x.n === n && x.type === 'उधार').reduce((s, x) => s + x.total, 0);
                h += `<div class="card"><b>${n}</b> <span style="float:right; color:red">₹${bal}</span></div>`;
            });
            document.getElementById('khataList').innerHTML = h;
        }

        function addStock() {
            let n = document.getElementById('sN').value, q = document.getElementById('sQ').value, r = document.getElementById('sR').value;
            if(!n || !q) return alert("नाम-मात्रा भरें");
            DB.stock.push({ n, q, r, date: new Date().toLocaleDateString() });
            sync(); renderStock();
        }

        function renderStock() {
            let h = "";
            DB.stock.forEach((s, i) => {
                h += `<div class="card" style="display:flex; justify-content:space-between"><span>${s.n} (₹${s.r})</span> <b>${s.q} नग</b></div>`;
            });
            document.getElementById('stockList').innerHTML = h;
        }

        function sync() { localStorage.setItem("AYANSH_FINAL_V6", JSON.stringify(DB)); }

        function exportEx(type) {
            let data = type === 'TX' ? DB.tx : DB.stock;
            let ws = XLSX.utils.json_to_sheet(data);
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, `${type}_Report.xlsx`);
        }

        function updateApp() {
            let code = document.getElementById('upCode').value;
            if(code.length < 100) return alert("गलत कोड");
            let b = new Blob([code], {type: 'text/html'});
            window.location.href = URL.createObjectURL(b);
        }
    </script>
</body>
</html>
