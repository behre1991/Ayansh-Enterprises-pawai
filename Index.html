<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>अयांश मुनीम V68 | रोहित भाई</title>
    <style>
        :root { --p: #1b5e20; --s: #ef6c00; --d: #c62828; --bg: #f4f7f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .header { background: var(--p); color: white; padding: 12px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #shopLogo { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: white; border: 1.5px solid #fff; display: none; }
        .page { display: none; padding: 12px; max-width: 600px; margin: auto; }
        .active { display: block; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; border: 1px solid #ddd; }
        h3 { margin: 0 0 10px 0; font-size: 14px; color: var(--p); border-left: 4px solid var(--s); padding-left: 10px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1.5px solid #ccc; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        .btn { border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        .btn-p { background: var(--p); color: white; }
        .btn-upd { background: #0288d1; color: white; }
        .btn-w { background: #25d366; color: white; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 11px; cursor: pointer; }
        .nav-active { color: var(--p); font-weight: bold; border-top: 4px solid var(--p); background: #fafffa; }
        .l-row { display: flex; justify-content: space-between; padding: 15px; background: white; border-radius: 12px; margin-bottom: 10px; border-left: 6px solid #ccc; cursor: pointer; border: 1px solid #eee; }
    </style>
</head>
<body>

<div id="lockScreen" style="position:fixed; inset:0; background:var(--p); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; padding:20px;">
    <h2>🔒 अयांश मुनीम सुरक्षा</h2>
    <p>रोहित भाई, पासवर्ड डालें</p>
    <input type="password" id="p_in" placeholder="1234" style="max-width:250px; text-align:center; color:black;">
    <button class="btn btn-upd" style="max-width:250px;" onclick="unlockApp()">अनलॉक करें</button>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <img id="shopLogo">
        <span id="hName">अयांश कृषि केंद्र</span>
    </div>

    <div id="pg-bill" class="page active">
        <div class="card">
            <h3>👤 किसान जानकारी</h3>
            <input type="text" id="cN" placeholder="किसान का नाम" list="cTips">
            <datalist id="cTips"></datalist>
            <input type="number" id="cM" placeholder="मोबाइल नंबर (WhatsApp)">
            <input type="file" id="cam" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this)">
            <button class="btn btn-upd" onclick="document.getElementById('cam').click()">📷 फोटो बिल लें</button>
            <img id="billImgPre" style="width:100%; max-height:150px; display:none; margin-top:10px; border-radius:10px;">
        </div>
        <div class="card" style="border: 2px solid var(--p);">
            <h3>🛍️ सामान लिस्ट</h3>
            <input type="text" id="iN" placeholder="सामान का नाम" list="sTips">
            <datalist id="sTips"></datalist>
            <div style="display:flex; gap:10px;">
                <input type="number" id="iP" placeholder="रेट ₹">
                <input type="number" id="iQ" placeholder="मात्रा" value="1">
            </div>
            <button class="btn btn-p" onclick="add2C()">➕ लिस्ट में जोड़ें</button>
        </div>
        <div id="cartBox" class="card" style="display:none; border: 2.5px solid var(--s);">
            <table style="width:100%; font-size:13px;"><tbody id="cartTbl"></tbody></table>
            <div style="text-align:right; margin-top:10px;"><strong id="cartTotal" style="font-size:24px; color:var(--d);">₹0.00</strong></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn btn-p" onclick="saveB()">💾 बिल सेव</button>
                <button class="btn btn-w" onclick="shareWA()">💬 WhatsApp</button>
                <button class="btn" style="background:#444; color:white" onclick="window.print()">🖨️ प्रिंट</button>
                <button class="btn btn-upd" onclick="exportDB()">📥 बैकअप</button>
            </div>
        </div>
    </div>

    <div id="pg-ledger" class="page">
        <div class="card">
            <h3>📜 बकाया लेजर</h3>
            <input type="text" id="srch" placeholder="खोजें..." onkeyup="renderL()">
            <div id="lList" style="margin-top:10px;"></div>
        </div>
    </div>

    <div id="pg-stk" class="page">
        <div class="card">
            <h3>📦 स्टॉक / इन्वेंटरी</h3>
            <input type="text" id="stkN" placeholder="सामान">
            <input type="number" id="stkP" placeholder="बिक्री रेट ₹">
            <button class="btn btn-p" onclick="addStk()">स्टॉक सुरक्षित करें</button>
        </div>
        <div id="stkShow"></div>
    </div>

    <div id="pg-set" class="page">
        <div class="card">
            <h3>⚙️ प्रोफाइल सेटिंग</h3>
            <input type="file" accept="image/*" onchange="handleLogo(this)">
            <input type="text" id="cfgN" placeholder="दुकान नाम">
            <input type="number" id="cfgM" placeholder="मोबाइल">
            <input type="text" id="cfgG" placeholder="GST नंबर">
            <input type="password" id="cfgP" placeholder="नया पासवर्ड">
            <button class="btn btn-p" onclick="saveCfg()">अपडेट</button>
        </div>
        <div class="card" style="background:#e3f2fd; border:2px solid #2196f3;">
            <h3>🔄 अपडेट बॉक्स</h3>
            <textarea id="updCode" rows="4" placeholder="कोड यहाँ पेस्ट करें"></textarea>
            <button class="btn btn-upd" onclick="runUpd()">🚀 अपडेट लागू करें</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item nav-active" onclick="tab('bill', this)">🛒<span>बिलिंग</span></div>
        <div class="nav-item" onclick="tab('ledger', this)">📜<span>खाता</span></div>
        <div class="nav-item" onclick="tab('stk', this)">📦<span>स्टॉक</span></div>
        <div class="nav-item" onclick="tab('set', this)">⚙<span>सेटिंग</span></div>
    </nav>
</div>

<div id="modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:2000; display:none; align-items:center; justify-content:center;">
    <div class="card" style="width:90%;">
        <h2 id="mN">किसान</h2>
        <div id="mB" style="font-size:32px; color:var(--d); text-align:center; padding:15px; background:#fff3e0; border-radius:10px;">₹0.00</div>
        <div id="mH" style="max-height:150px; overflow-y:auto; margin:10px 0;"></div>
        <input type="number" id="pAmt" placeholder="जमा पैसा ₹">
        <button class="btn btn-p" onclick="saveP()">✅ जमा करें (बकाया घटेगा)</button>
        <button class="btn" style="background:#eee" onclick="document.getElementById('modal').style.display='none'">बंद</button>
    </div>
</div>

<script>
    const K = "AYANSH_V68_MASTER";
    let DB = JSON.parse(localStorage.getItem(K)) || { cfg: {n:"अयांश कृषि", p:"1234"}, tx: [], stk: [] };
    let cart = []; let curImg = ""; let curC = "";

    function unlockApp() {
        const val = document.getElementById('p_in').value;
        if(val === DB.cfg.p || val === "1234") {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            init();
        } else { alert("गलत पासवर्ड!"); }
    }

    function init() {
        document.getElementById('hName').innerText = DB.cfg.n;
        document.getElementById('cfgN').value = DB.cfg.n;
        document.getElementById('cfgM').value = DB.cfg.m || "";
        document.getElementById('cfgG').value = DB.cfg.g || "";
        if(DB.cfg.logo) { document.getElementById('shopLogo').src = DB.cfg.logo; document.getElementById('shopLogo').style.display = 'block'; }
        renderStk(); updateTips();
    }

    function tab(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById('pg-'+p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('nav-active'));
        el.classList.add('nav-active');
        if(p==='ledger') renderL();
    }

    function add2C() {
        const n=document.getElementById('iN').value, p=parseFloat(document.getElementById('iP').value), q=parseFloat(document.getElementById('iQ').value);
        if(n && p) { cart.push({n, p, q, t:p*q}); renderC(); document.getElementById('iN').value=""; document.getElementById('iP').value=""; }
    }

    function renderC() {
        let h="", tt=0; cart.forEach((it, i) => { h += `<tr><td style="padding:8px">${it.n} (x${it.q})</td><td style="padding:8px">₹${it.t.toFixed(2)}</td><td onclick="cart.splice(${i},1);renderC()" style="color:red">✖</td></tr>`; tt += it.t; });
        document.getElementById('cartTbl').innerHTML = h; document.getElementById('cartTotal').innerText = "₹"+tt.toFixed(2);
        document.getElementById('cartBox').style.display = 'block';
    }

    function saveB() {
        const name = document.getElementById('cN').value;
        const phone = document.getElementById('cM').value;
        if(!name) return alert("नाम लिखें!");
        DB.tx.push({ id:Date.now(), name, phone, amt:cart.reduce((s,i)=>s+i.t,0), type:'bill', date:new Date().toLocaleString('hi-IN'), img:curImg });
        save(); alert("खाता सेव!"); location.reload();
    }

    function renderL() {
        const q = document.getElementById('srch').value.toLowerCase();
        const ledger = {};
        DB.tx.forEach(t => { if(!ledger[t.name]) ledger[t.name] = {bal: 0}; ledger[t.name].bal += (t.type === 'bill' ? t.amt : -t.amt); });
        let h = ""; Object.keys(ledger).sort().forEach(n => {
            if(n.toLowerCase().includes(q)) h += `<div class="l-row" onclick="openM('${n}')"><b>${n}</b><b>₹${ledger[n].bal.toFixed(2)}</b></div>`;
        });
        document.getElementById('lList').innerHTML = h;
    }

    function openM(n) {
        curC = n; document.getElementById('mN').innerText = n;
        const hist = DB.tx.filter(t => t.name === n);
        const bal = hist.reduce((s,t)=>s+(t.type==='bill'?t.amt:-t.amt),0);
        document.getElementById('mB').innerText = "₹" + bal.toFixed(2);
        document.getElementById('mH').innerHTML = hist.reverse().map(t => `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee; font-size:11px;"><span>${t.date}</span><b>₹${t.amt}</b></div>`).join('');
        document.getElementById('modal').style.display = 'flex';
    }

    function saveP() {
        const a = parseFloat(document.getElementById('pAmt').value); if(!a) return;
        DB.tx.push({ id: Date.now(), name: curC, amt: a, type: 'pay', date: new Date().toLocaleString('hi-IN') });
        save(); openM(curC); document.getElementById('pAmt').value = "";
    }

    function addStk() {
        const n = document.getElementById('stkN').value, p = document.getElementById('stkP').value;
        if(n && p) { DB.stk.push({n, p}); save(); renderStk(); document.getElementById('stkN').value=""; document.getElementById('stkP').value=""; }
    }

    function renderStk() {
        document.getElementById('stkShow').innerHTML = DB.stk.map(s => `<div class="l-row"><span>${s.n} (₹${s.p})</span></div>`).join('');
        document.getElementById('sTips').innerHTML = DB.stk.map(s => `<option value="${s.n}">`).join('');
    }

    function saveCfg() {
        DB.cfg.n = document.getElementById('cfgN').value;
        DB.cfg.m = document.getElementById('cfgM').value;
        DB.cfg.g = document.getElementById('cfgG').value;
        if(document.getElementById('cfgP').value) DB.cfg.p = document.getElementById('cfgP').value;
        save(); alert("प्रोफाइल अपडेट!"); location.reload();
    }

    function save() { localStorage.setItem(K, JSON.stringify(DB)); }
    function handleLogo(input) { const reader = new FileReader(); reader.onload = (e) => { DB.cfg.logo = e.target.result; save(); }; reader.readAsDataURL(input.files[0]); }
    function handleImg(i) { const r = new FileReader(); r.onload = (e) => { curImg = e.target.result; document.getElementById('billImgPre').src = curImg; document.getElementById('billImgPre').style.display='block'; document.getElementById('cartBox').style.display='block'; }; r.readAsDataURL(i.files[0]); }
    function exportDB() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(DB)], {type:"application/json"})); a.download = "Ayansh_Backup.json"; a.click(); }
    function runUpd() { const c = document.getElementById('updCode').value; if(c.includes("<script")) { document.open(); document.write(c); document.close(); } }
    function updateTips() { document.getElementById('cTips').innerHTML = [...new Set(DB.tx.map(t => t.name))].map(n => `<option value="${n}">`).join(''); }
    function shareWA() { window.open(`https://wa.me/91${document.getElementById('cM').value}?text=*${DB.cfg.n}*%0Aनमस्ते, बकाया: ₹${document.getElementById('cartTotal').innerText}`); }
</script>
</body>
</html>
