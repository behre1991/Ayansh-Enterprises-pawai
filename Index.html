<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आयांश एंटरप्राइजेज</title>
    <style>
        /* बड़े और साफ बटन ताकि इस्तेमाल करना आसान हो */
        body { font-family: sans-serif; margin: 0; padding-bottom: 80px; background: #fdfdfd; }
        header { background: #004a99; color: white; padding: 20px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        
        /* बड़े इनपुट और बटन */
        input, select, button { width: 100%; padding: 18px; margin: 10px 0; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; }
        button { background: #004a99; color: white; border: none; font-weight: bold; cursor: pointer; }
        
        /* नेविगेशन पट्टी */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #222; }
        .nav button { flex: 1; padding: 20px; color: white; border: none; background: none; font-size: 16px; }
    </style>
</head>
<body>

<header>
    <span id="shopDisplay">आयांश एंटरप्राइजेज</span>
    <span onclick="settings()">⋮</span>
</header>

<div id="billing" class="page active">
    <input type="text" id="bName" placeholder="किसान का नाम">
    <input type="number" id="bQty" placeholder="मात्रा (Qty)" oninput="calc()">
    <input type="number" id="bRate" placeholder="रेट (Rate)" oninput="calc()">
    <input type="text" id="bTotal" placeholder="कुल राशि" readonly>
    <button onclick="saveBill()">बिल सुरक्षित करें</button>
</div>

<div id="ledger" class="page"><h3>📒 खाता</h3><p>यहाँ हिसाब दिखेगा...</p></div>
<div id="stock" class="page"><h3>📦 स्टॉक</h3><p>यहाँ स्टॉक दिखेगा...</p></div>
<div id="purchase" class="page"><h3>📥 आवक</h3><button>माल जोड़ें</button></div>

<div class="nav">
    <button onclick="show('ledger')">खाता</button>
    <button onclick="show('billing')">बिलिंग</button>
    <button onclick="show('stock')">स्टॉक</button>
    <button onclick="show('purchase')">आवक</button>
</div>

<script>
    // 1. अपडेट सिस्टम: दुकान का नाम हमेशा याद रखेगा
    window.onload = () => {
        let savedName = localStorage.getItem('shopName');
        if(savedName) document.getElementById('shopDisplay').innerText = savedName;
    };

    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function calc() {
        document.getElementById('bTotal').value = document.getElementById('bQty').value * document.getElementById('bRate').value;
    }

    // 2. सेटिंग और अपडेट सिस्टम
    function settings() {
        let newName = prompt("दुकान का नया नाम डालें:", localStorage.getItem('shopName') || "");
        if(newName) {
            localStorage.setItem('shopName', newName);
            document.getElementById('shopDisplay').innerText = newName;
            alert("अपडेट सफल रहा! डेटा सुरक्षित है।");
        }
    }

    function saveBill() { alert("बिल सेव हो गया! (यह डेटा हमेशा सुरक्षित रहेगा)"); }
</script>
</body>
</html>
