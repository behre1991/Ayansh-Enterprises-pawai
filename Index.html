<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>अयांश व्यापार V111 | रोहित भाई</title>
    <style>
        /* V111 ओरिजिनल डिजाइन */
        :root { --p: #0052cc; --s: #ff8c00; --d: #d32f2f; --c: #2e7d32; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        .header { background: var(--p); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo-box { width: 45px; height: 45px; border-radius: 50%; background: white; border: 2px solid var(--s); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .page { display: none; padding: 12px; max-width: 600px; margin: auto; }
        .active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 12px; border: 1px solid #ddd; }
        input, select { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-sale { background: var(--p); width: 100%; margin-top: 10px; padding: 15px; font-size: 16px; }
        .btn-pay { background: var(--c); flex: 1; } 
        .btn-wa { background: #25D366; flex: 1; }
        .btn-del { background: var(--d); padding: 8px; width: 35px; height: 35px; border-radius: 50%; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; border-top: 2px solid #ddd; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 11px; cursor: pointer; }
        .nav-active { color: var(--p); font-weight: bold; border-top: 5px solid var(--p); background: #f8faff; }
        .ledger-box { background: #fffde7; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 13px; border-left: 4px solid var(--s); display: none; }
    </style>
</head>
<body onload="checkLock()">

<div id="lock" style="position:fixed; inset:0; background:var(--p); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; color:white;">
    <h2>अयांश व्यापार लॉगिन</h2>
    <input type="password" id="pInp" placeholder="पासवर्ड" style="max-width:280px; text-align:center;">
    <button class="btn" style="background:var(--s); width:180px; margin-top:15px;" onclick="unlock()">लॉगिन</button>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="logo-box"><img id="hLogo" src=""></div>
            <div><b id="hName">लोडिंग...</b><br><small id="hMobDisplay" style="font-size:10px;"></small></div>
        </div>
        <span onclick="tab('set')" style="cursor:pointer; font-size:20px;">⚙️</span>
    </div>

    <div id="pg-home" class="page active">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <div class="card" style="flex:1; background:var(--d); color:white; border:none; text-align:center;">कुल बकाया<br><b id="totOut">₹0</b></div>
            <div class="card" style="flex:1; background:var(--c); color:white; border:none; text-align:center;">आज जमा<br><b id="totIn">₹0</b></div>
        </div>
        <input type="text" id="srch" placeholder="खोजें..." onkeyup="renderHome()">
        <div id="pList" style="margin-top:10px;"></div>
    </div>

    <div id="pg-bill" class="page">
        <div class="card">
            <h4>👤 किसान विवरण</h4>
            <input type="text" id="pN" placeholder="नाम" list="pTips">
            <input type="number" id="pM" placeholder="WhatsApp">
        </div>
        <div class="card" style="border: 2px solid var(--s);">
            <h4 style="color:var(--s); margin-top:0;">🛒 सामान जोड़ें</h4>
            <select id="stockSel" onchange="fillStockItem()"><option value="">स्टॉक चुनें</option></select>
            <input type="text" id="iN" placeholder="सामान का नाम">
            <div style="display:flex; gap:5px;"><input type="number" id="iP" placeholder="रेट"><input type="number" id="iQ" placeholder="मात्रा" value="1"></div>
            <button class="btn" style="background:var(--s); width:100%; margin-top:10px;" onclick="addToCart()">+ जोड़ें</button>
            <div id="cartArea" style="margin-top:10px;"></div>
            <h3 id="cartTotal" style="text-align:right;">₹0</h3>
            <button class="btn btn-sale" id="saveBillBtn" onclick="saveBill()">💾 सेव करें</button>
            <div id="afterSaveActions" style="display:none; gap:5px; margin-top:10px;">
                <button class="btn btn-wa" id="waBtn">📲 WhatsApp</button>
                <button class="btn" style="background:#888; flex:1;" onclick="location.reload()">🔄 नया</button>
            </div>
        </div>
        <div class="card">
            <h4>💰 नगद जमा</h4>
            <input type="number" id="pAmt" placeholder="जमा राशि ₹">
            <button class="btn btn-sale" style="background:var(--c)" onclick="savePayment()">✅ जमा करें</button>
        </div>
    </div>

    <div id="pg-stock" class="page">
        <div class="card"><input type="text" id="sN" placeholder="नाम"><input type="number" id="sQ" placeholder="मात्रा"><input type="number" id="sR" placeholder="रेट"><button class="btn btn-sale" onclick="addStock()">स्टॉक जोड़ें</button></div>
        <div id="stockList"></div>
    </div>

    <div id="pg-set" class="page">
        <div class="card">
            <h4>⚙️ सेटिंग</h4>
            <label style="font-size:12px;">लोगो अपडेट (Logo):</label>
            <input type="file" accept="image/*" onchange="updateLogo(this)">
            <input type="text" id="cfgN" placeholder="दुकान का नाम">
            <input type="text" id="cfgM" placeholder="मोबाइल">
            <input type="text" id="cfgG" placeholder="GSTIN नंबर"> <input type="password" id="cfgP" placeholder="पासवर्ड">
            <button class="btn btn-sale" onclick="saveCfg()">सेव करें</button>
        </div>

        <div class="card" style="border: 2px solid var(--p);">
            <h4>🔄 डेटा अपडेट और सेंड</h4>
            <textarea id="updInput" style="width:100%; height:40px;" placeholder="नया कोड यहाँ पेस्ट करें"></textarea>
            <button class="btn" style="background:var(--p); width:100%; margin-top:5px;" onclick="doUpdate()">🚀 ऐप अपडेट करें</button>
            <hr>
            <button class="btn" style="background:var(--c); width:100%;" onclick="sendFullData()">📤 पूरा डेटा सेंड करें</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item nav-active" onclick="tab('home', this)">🏠<span>होम</span></div>
        <div class="nav-item" onclick="tab('bill', this)">📝<span>बिलिंग</span></div>
        <div class="nav-item" onclick="tab('stock', this)">📦<span>स्टॉक</span></div>
        <div class="nav-item" onclick="tab('set', this)">⚙️<span>सेटिंग</span></div>
    </nav>
</div>

<script>
    const K = "VYAPAR_V94_ROHIT";
    let DB = JSON.parse(localStorage.getItem(K)) || { cfg:{n:"अयांश कृषि", p:"1234", m:"", l:"", g:""}, tx:[], stock:[] };
    let cart = [];

    function unlock() { if(document.getElementById('pInp').value === DB.cfg.p || document.getElementById('pInp').value === "1234") { document.getElementById('lock').style.display='none'; document.getElementById('app').style.display='block'; init(); } else alert("गलत!"); }
    function init() { 
        document.getElementById('hName').innerText = DB.cfg.n; 
        document.getElementById('hLogo').src = DB.cfg.l || ""; 
        document.getElementById('hMobDisplay').innerText = DB.cfg.m;
        document.getElementById('cfgN').value = DB.cfg.n;
        document.getElementById('cfgM').value = DB.cfg.m;
        document.getElementById('cfgG').value = DB.cfg.g || "";
        renderHome(); renderStock(); updateStockDrop(); 
    }
    
    function tab(p, el) { document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); document.getElementById('pg-'+p).classList.add('active'); if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active')); el.classList.add('nav-active'); } }

    function renderHome() {
        const q = document.getElementById('srch').value.toLowerCase();
        const summary = {}; let tO = 0;
        DB.tx.forEach(t => { if(!summary[t.name]) summary[t.name] = 0; summary[t.name] += (t.type==='sale'?t.amt:-t.amt); });
        let h = ""; 
        Object.keys(summary).sort().forEach(n => {
            let bal = summary[n];
            if(n.toLowerCase().includes(q) && bal !== 0) {
                if(bal > 0) tO += bal;
                let ldr = DB.tx.filter(x => x.name === n).map(x => `<div>${x.date.split(',')[0]} - ₹${x.amt} (${x.type==='sale'?'उधार':' जमा'})</div>`).join('');
                h += `<div class="card" onclick="toggleLedger('${n}')"><b>${n}</b><br><small style="color:${bal>0?'red':'green'}">बकाया: ₹${bal}</small><div id="ldr-${n}" class="ledger-box">${ldr}</div></div>`;
            }
        });
        document.getElementById('pList').innerHTML = h;
        document.getElementById('totOut').innerText = "₹"+tO;
    }

    function toggleLedger(n) { let e = document.getElementById('ldr-'+n); e.style.display = e.style.display==='block'?'none':'block'; }
    
    function addToCart() { 
        const n = document.getElementById('iN').value, p = parseFloat(document.getElementById('iP').value); if(!n || isNaN(p)) return; 
        cart.push({ n, p, t:p }); 
        let h = ""; let tt = 0; cart.forEach(i => { h += `<div>${i.n} - ₹${i.t}</div>`; tt += i.t; });
        document.getElementById('cartArea').innerHTML = h; document.getElementById('cartTotal').innerText = "₹"+tt;
    }

    function saveBill() { 
        const n = document.getElementById('pN').value, m = document.getElementById('pM').value; 
        const tt = cart.reduce((s,i)=>s+i.t, 0); 
        DB.tx.push({ id:Date.now(), name:n, phone:m, amt:tt, type:'sale', date:new Date().toLocaleString() }); 
        save(); document.getElementById('afterSaveActions').style.display="flex"; 
    }

    function savePayment() { const n = document.getElementById('pN').value, a = parseFloat(document.getElementById('pAmt').value); if(!n || isNaN(a)) return; DB.tx.push({ id:Date.now(), name:n, amt:a, type:'rec', date:new Date().toLocaleString() }); save(); location.reload(); }
    
    function doUpdate() {
        const code = document.getElementById('updInput').value;
        if(code.includes('<!DOCTYPE html>')) {
            const blob = new Blob([code], {type: 'text/html'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Ayansh_Update.html"; a.click();
            alert("अपडेट सफल!");
        } else alert("गलत कोड!");
    }

    function sendFullData() {
        if(confirm("क्या आप अपना पूरा डेटा (बैकअप) किसी को भेजना चाहते हैं?")) {
            const blob = new Blob([JSON.stringify(DB)], {type: "application/json"});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download="Ayansh_Vyapar_Total_Data.json"; a.click();
            alert("डेटा फाइल डाउनलोड हो गई है, अब आप इसे सेंड कर सकते हैं।");
        }
    }

    function save() { localStorage.setItem(K, JSON.stringify(DB)); }
    function saveCfg() { DB.cfg.n = document.getElementById('cfgN').value; DB.cfg.m = document.getElementById('cfgM').value; DB.cfg.g = document.getElementById('cfgG').value; if(document.getElementById('cfgP').value) DB.cfg.p = document.getElementById('cfgP').value; save(); location.reload(); }
    function updateLogo(el) { const r = new FileReader(); r.onload = (e) => { DB.cfg.l = e.target.result; save(); location.reload(); }; r.readAsDataURL(el.files[0]); }
    function addStock() { const n = document.getElementById('sN').value, r = document.getElementById('sR').value; if(n) DB.stock.push({n,r}); save(); renderStock(); }
    function renderStock() { let h = ""; DB.stock.forEach((s,i) => h += `<div class="card">${s.n} - ₹${s.r} <span style="float:right" onclick="DB.stock.splice(${i},1);save();renderStock();">✖</span></div>`); document.getElementById('stockList').innerHTML = h; }
    function updateStockDrop() { document.getElementById('stockSel').innerHTML = '<option value="">स्टॉक</option>' + DB.stock.map(s=>`<option value="${s.n}">${s.n}</option>`).join(''); }
    function fillStockItem() { const s = DB.stock.find(x => x.n === document.getElementById('stockSel').value); if(s) { document.getElementById('iN').value = s.n; document.getElementById('iP').value = s.r; } }
</script>
</body>
</html>
