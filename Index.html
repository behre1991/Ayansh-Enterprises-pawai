<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>अयांश मुनीम PRO | V59 FINAL</title>
    <style>
        :root { --p: #1b5e20; --s: #ef6c00; --d: #c62828; --bg: #f4f7f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .header { background: var(--p); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .page { display: none; padding: 12px; max-width: 600px; margin: auto; }
        .active { display: block; }
        .card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; border: 1px solid #ddd; }
        h3 { margin: 0 0 10px 0; font-size: 14px; color: var(--p); border-left: 4px solid var(--s); padding-left: 10px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1.5px solid #ccc; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        .btn { border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        .btn-p { background: var(--p); color: white; }
        .btn-upd { background: #0288d1; color: white; }
        .btn-w { background: #25d366; color: white; }
        .btn-del { background: #ffebee; color: var(--d); border: 1px solid var(--d); padding: 5px; width: auto; font-size: 11px; border-radius: 6px; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 11px; cursor: pointer; }
        .nav-active { color: var(--p); font-weight: bold; border-top: 4px solid var(--p); background: #fafffa; }
        #photoPre { width: 100%; max-height: 200px; object-fit: contain; display: none; margin-top: 10px; border-radius: 10px; }
        .l-row { display: flex; justify-content: space-between; padding: 15px; background: white; border-radius: 12px; margin-bottom: 10px; border-left: 6px solid #ccc; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>

<div id="app">
    <div class="header" id="hName">मुनीम सॉफ्टवेयर</div>

    <div id="pg-bill" class="page active">
        <div class="card">
            <h3>👤 किसान & फोटो बिल</h3>
            <input type="text" id="cN" placeholder="किसान का नाम" list="cTips">
            <datalist id="cTips"></datalist>
            <input type="number" id="cM" placeholder="WhatsApp नंबर">
            <input type="file" id="cam" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this)">
            <button class="btn btn-upd" onclick="document.getElementById('cam').click()">📷 कागज बिल की फोटो लें</button>
            <img id="photoPre">
        </div>

        <div class="card" style="border: 2px solid var(--p);">
            <h3>🛒 सामान लिस्ट</h3>
            <input type="text" id="iN" placeholder="सामान का नाम" list="sTips">
            <datalist id="sTips"></datalist>
            <div style="display:flex; gap:10px;">
                <input type="number" id="iP" placeholder="दर ₹">
                <input type="number" id="iQ" placeholder="मात्रा" value="1">
            </div>
            <button class="btn btn-p" onclick="add2C()">➕ लिस्ट में जोड़ें</button>
        </div>

        <div id="cartBox" class="card" style="display:none; border: 2.5px solid var(--s);">
            <table><thead><tr><th>नाम</th><th>कुल</th><th>X</th></tr></thead><tbody id="cartTbl"></tbody></table>
            <div style="text-align:right; margin-top:15px; border-top:1px dashed #ccc; padding-top:10px;">
                <strong id="cartTotal" style="font-size:24px; color:var(--d);">₹0.00</strong>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn btn-p" onclick="saveB()">💾 सेव करें</button>
                <button class="btn btn-w" onclick="shareWA()">💬 WhatsApp</button>
                <button class="btn" style="background:#444; color:white" onclick="window.print()">🖨️ प्रिंट</button>
                <button class="btn" style="background:#eee" onclick="location.reload()">❌ रद्द</button>
            </div>
        </div>
    </div>

    <div id="pg-ledger" class="page">
        <div class="card">
            <h3>📜 किसान बकाया खाता</h3>
            <input type="text" id="srch" placeholder="खोजें..." onkeyup="renderL()">
            <div id="lList" style="margin-top:15px;"></div>
        </div>
    </div>

    <div id="pg-stk" class="page">
        <div class="card">
            <h3>📦 स्टॉक एंट्री</h3>
            <input type="text" id="stkN" placeholder="सामान का नाम">
            <input type="number" id="stkP" placeholder="रेट ₹">
            <button class="btn btn-p" onclick="addStk()">स्टॉक सुरक्षित करें</button>
        </div>
        <div class="card" style="padding:0;"><table id="stkMain"><thead><tr><th>नाम</th><th>रेट</th><th>X</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div id="pg-set" class="page">
        <div class="card">
            <h3>⚙️ प्रोफाइल सेटिंग</h3>
            <input type="text" id="cfgN" placeholder="दुकान का नाम">
            <input type="number" id="cfgM" placeholder="मोबाइल नंबर">
            <button class="btn btn-p" onclick="saveCfg()">✅ प्रोफाइल अपडेट करें</button>
        </div>

        <div class="card" style="background: #e3f2fd; border: 2px solid #2196f3;">
            <h3>🔄 सॉफ्टवेयर कोड अपडेट सिस्टम</h3>
            <textarea id="updCode" rows="4" placeholder="नया कोड यहाँ पेस्ट करें..."></textarea>
            <button class="btn btn-upd" onclick="runUpd()">🚀 कोड से अपडेट करें</button>
            
            <hr style="margin:20px 0; border:0; border-top:1px solid #ccc;">
            
            <h3>📥 डेटा बैकअप (Excel/JSON)</h3>
            <button class="btn" style="background:#444; color:white;" onclick="exportDB()">📥 बैकअप डाउनलोड करें</button>
            <p style="font-size:10px; color:#666; text-align:center;">यह फाइल आपके पूरे हिसाब को सुरक्षित रखती है।</p>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item nav-active" onclick="tab('bill', this)">🛒<span>बिलिंग</span></div>
        <div class="nav-item" onclick="tab('ledger', this)">📜<span>खाता</span></div>
        <div class="nav-item" onclick="tab('stk', this)">📦<span>स्टॉक</span></div>
        <div class="nav-item" onclick="tab('set', this)">⚙<span>सेटिंग</span></div>
    </nav>
</div>

<div id="modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:2000; display:none; align-items:center; justify-content:center;">
    <div class="card" style="width:90%; max-height:85%; overflow-y:auto;">
        <h2 id="mN" style="margin:0;">किसान</h2>
        <div id="mB" style="font-size:28px; color:var(--d); text-align:center; padding:15px; background:#fff3e0; border-radius:10px; margin:10px 0;">₹0.00</div>
        <div id="mH"></div>
        <div style="background:#e8f5e9; padding:15px; border-radius:12px; margin-top:15px;">
            <input type="number" id="pAmt" placeholder="जमा पैसा ₹">
            <button class="btn btn-p" onclick="saveP()">✅ पैसे जमा करें</button>
        </div>
        <button class="btn" style="background:#eee; margin-top:10px;" onclick="document.getElementById('modal').style.display='none'">वापस</button>
    </div>
</div>

<script>
    const KEY = "AYANSH_FINAL_V59";
    let DB = JSON.parse(localStorage.getItem(KEY)) || { cfg: {n:"अयांश कृषि केंद्र", m:""}, tx: [], stk: [] };
    let cart = []; let curImg = ""; let curC = "";

    function init() {
        document.getElementById('hName').innerText = DB.cfg.n;
        document.getElementById('cfgN').value = DB.cfg.n;
        document.getElementById('cfgM').value = DB.cfg.m;
        renderStk(); updateTips();
    }

    function runUpd() {
        const code = document.getElementById('updCode').value;
        if(code.includes("<script") || code.includes("DOCTYPE")) {
            document.open(); document.write(code); document.close();
        } else alert("सही कोड डालें!");
    }

    function tab(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById('pg-'+p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('nav-active'));
        el.classList.add('nav-active');
        if(p==='ledger') renderL();
    }

    function handleImg(input) {
        const reader = new FileReader();
        reader.onload = (e) => { 
            curImg = e.target.result; 
            document.getElementById('photoPre').src = curImg;
            document.getElementById('photoPre').style.display = 'block';
            document.getElementById('cartBox').style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }

    function add2C() {
        const n = document.getElementById('iN').value, p = parseFloat(document.getElementById('iP').value), q = parseFloat(document.getElementById('iQ').value) || 1;
        if(n && p) { cart.push({n, p, q, t: p*q}); renderC(); document.getElementById('iN').value=""; document.getElementById('iP').value=""; }
    }

    function renderC() {
        let h = "", tt = 0;
        cart.forEach((it, i) => { h += `<tr><td>${it.n} (x${it.q})</td><td>₹${it.t.toFixed(2)}</td><td onclick="cart.splice(${i},1);renderC()" style="color:red">✖</td></tr>`; tt += it.t; });
        document.getElementById('cartTbl').innerHTML = h;
        document.getElementById('cartTotal').innerText = "₹" + tt.toFixed(2);
        document.getElementById('cartBox').style.display = (cart.length || curImg) ? 'block' : 'none';
    }

    function saveB() {
        const name = document.getElementById('cN').value.trim(); if(!name) return alert("नाम लिखें!");
        DB.tx.push({ id: Date.now(), name, phone: document.getElementById('cM').value, amt: cart.reduce((s,i)=>s+i.t,0), type: 'bill', date: new Date().toLocaleString('hi-IN'), img: curImg });
        save(); alert("खाता सुरक्षित!"); location.reload();
    }

    function renderL() {
        const q = document.getElementById('srch').value.toLowerCase();
        const ledger = {};
        DB.tx.forEach(t => { if(!ledger[t.name]) ledger[t.name] = {bal: 0}; ledger[t.name].bal += (t.type === 'bill' ? t.amt : -t.amt); });
        let h = "";
        Object.keys(ledger).sort().forEach(n => {
            if(n.toLowerCase().includes(q)) h += `<div class="l-row" onclick="openM('${n}')"><b>${n}</b><b>₹${ledger[n].bal.toFixed(2)}</b></div>`;
        });
        document.getElementById('lList').innerHTML = h;
    }

    function openM(n) {
        curC = n; document.getElementById('mN').innerText = n;
        const hist = DB.tx.filter(t => t.name === n);
        const bal = hist.reduce((s,t)=>s+(t.type==='bill'?t.amt:-t.amt),0);
        document.getElementById('mB').innerText = "₹" + bal.toFixed(2);
        document.getElementById('mH').innerHTML = hist.reverse().map(t => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #eee; font-size:12px;">
                <div>${t.date}<br><b>${t.type==='bill'?'उधार':'जमा'}</b></div>
                <b>₹${t.amt.toFixed(2)}</b>
                <button class="btn-del" onclick="delTx(${t.id})">✖ हटाएँ</button>
            </div>
        `).join('');
        document.getElementById('modal').style.display = 'flex';
    }

    function delTx(id) {
        if(confirm("डिलीट करें?")) { DB.tx = DB.tx.filter(t => t.id !== id); save(); openM(curC); }
    }

    function saveP() {
        const a = parseFloat(document.getElementById('pAmt').value); if(!a) return;
        DB.tx.push({ id: Date.now(), name: curC, amt: a, type: 'pay', date: new Date().toLocaleString('hi-IN') });
        save(); openM(curC); document.getElementById('pAmt').value = "";
    }

    function addStk() {
        const n = document.getElementById('stkN').value, p = document.getElementById('stkP').value;
        if(n && p) { DB.stk.push({id: Date.now(), n, p}); save(); renderStk(); document.getElementById('stkN').value=""; document.getElementById('stkP').value=""; }
    }

    function renderStk() {
        document.querySelector('#stkMain tbody').innerHTML = DB.stk.map(s => `<tr><td>${s.n}</td><td>₹${s.p}</td><td onclick="delStk(${s.id})" style="color:red">✖</td></tr>`).join('');
        document.getElementById('sTips').innerHTML = DB.stk.map(s => `<option value="${s.n}">`).join('');
    }

    function delStk(id) { DB.stk = DB.stk.filter(s => s.id !== id); save(); renderStk(); }
    function saveCfg() { DB.cfg.n = document.getElementById('cfgN').value; DB.cfg.m = document.getElementById('cfgM').value; save(); alert("अपडेट!"); location.reload(); }
    function save() { localStorage.setItem(KEY, JSON.stringify(DB)); }
    function updateTips() { document.getElementById('cTips').innerHTML = [...new Set(DB.tx.map(t => t.name))].map(n => `<option value="${n}">`).join(''); }
    function shareWA() { window.open(`https://wa.me/91${document.getElementById('cM').value}?text=*${DB.cfg.n}*%0Aकिसान: ${document.getElementById('cN').value}%0Aबकाया: ${document.getElementById('cartTotal').innerText}`); }
    function exportDB() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(DB)], {type:"application/json"})); a.download = "Munim_Data.json"; a.click(); }
    init();
</script>
</body>
</html>
