<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ayansh Vyapar - All-in-One Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --p: #002970; --s: #FF8F00; --g: #2E7D32; --r: #C62828; --bg: #F4F7F9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        
        /* ब्रांडिंग हेडर */
        .header { background: var(--p); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 12px; border-bottom: 4px solid var(--s); position: sticky; top: 0; z-index: 1000; }
        #sh-logo-img { width: 45px; height: 45px; border-radius: 50%; background: white; object-fit: cover; border: 2px solid var(--s); }
        .header-text h2 { margin: 0; font-size: 16px; text-transform: uppercase; }
        .header-text small { font-size: 10px; opacity: 0.8; }

        .container { padding: 10px; max-width: 550px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); border-top: 4px solid var(--p); }
        
        label { font-size: 12px; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }
        .inp { width: 100% !important; height: 45px !important; margin-bottom: 12px !important; border: 1px solid #BDC3C7 !important; border-radius: 8px !important; padding: 10px !important; box-sizing: border-box !important; font-size: 16px !important; }

        .btn { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; padding: 12px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 5px; color: white; }
        .btn-save { background: var(--s); }
        .btn-blue { background: var(--p); }
        .btn-excel { background: var(--g); }

        .footer { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 70px; border-top: 1px solid #ddd; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #7F8C8D; font-size: 11px; font-weight: bold; cursor: pointer; }
        .tab-active { color: var(--p); background: #F0F2F9; border-top: 4px solid var(--p); }

        .page { display: none; }
        .show { display: block; }
        .bal-status { background: #FFF3E0; padding: 10px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #FFE0B2; font-weight: bold; display: flex; justify-content: space-between; }
    </style>
</head>
<body onload="initApp()">

    <div class="header">
        <img id="sh-logo-img" src="https://via.placeholder.com/50" alt="Logo">
        <div class="header-text">
            <h2 id="disp-name">Ayansh Enterprises</h2>
            <small id="disp-details">GST: NA | Mob: NA</small>
        </div>
    </div>

    <div class="container">
        <div id="pg-bill" class="page">
            <div class="bal-status"><span>पुराना बकाया:</span><span id="c-bal" style="color:var(--r)">₹0</span></div>
            <div class="card">
                <input type="text" id="cN" class="inp" placeholder="किसान का नाम" list="custL" onkeyup="checkB(this.value)">
                <input type="number" id="cM" class="inp" placeholder="WhatsApp नंबर">
                <input type="text" id="iN" class="inp" placeholder="सामान का नाम" list="stkL">
                <div style="display:flex; gap:10px;">
                    <input type="number" id="iA" class="inp" placeholder="रकम ₹" style="flex:2">
                    <select id="iT" class="inp" style="flex:1"><option value="उधार">उधार</option><option value="नगद">नगद</option></select>
                </div>
                <button class="btn btn-save" onclick="saveBill()">💾 हिसाब सुरक्षित करें</button>
            </div>
        </div>

        <div id="pg-khata" class="page">
            <button class="btn btn-excel" onclick="exportExcel(DB.tx, 'Full_Khata')">📊 पूरा खाता Excel में डाउनलोड करें</button>
            <input type="text" id="srchK" class="inp" placeholder="नाम से खोजें..." onkeyup="renderK()">
            <div id="k-list"></div>
        </div>

        <div id="pg-stock" class="page">
            <div class="card">
                <input type="text" id="stN" class="inp" placeholder="नया सामान नाम">
                <input type="number" id="stQ" class="inp" placeholder="मात्रा (Quantity)">
                <button class="btn btn-blue" onclick="addStock()">➕ स्टॉक में जोड़ें</button>
            </div>
            <div id="stock-display"></div>
        </div>

        <div id="pg-set" class="page">
            <div class="card">
                <h3>🏢 दुकान की सेटिंग</h3>
                <label>लोगो अपलोड करें:</label>
                <input type="file" accept="image/*" onchange="previewLogo(this)">
                <img id="logo-pre" style="width:60px; height:60px; margin:10px 0; display:none; border-radius:50%;">
                
                <input type="text" id="s-name" class="inp" placeholder="दुकान का नाम">
                <input type="text" id="s-gst" class="inp" placeholder="GST नंबर">
                <input type="number" id="s-mob" class="inp" placeholder="मोबाइल नंबर">
                <button class="btn btn-blue" onclick="saveProfile()">💾 जानकारी सेव करें</button>
            </div>
            
            <div class="card" style="border-top: 5px solid var(--r);">
                <h3>🚀 सिस्टम अपडेट</h3>
                <textarea id="up-code" class="inp" style="height:60px" placeholder="नया कोड यहाँ डालें..."></textarea>
                <button class="btn" style="background:var(--r)" onclick="updateApp()">🆙 कोड अपडेट करें</button>
                <button class="btn" style="background:#333; margin-top:10px" onclick="downloadBackup()">📥 बैकअप JSON</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="tab" id="t-bill" onclick="tab('bill')">📝 बिलिंग</div>
        <div class="tab" id="t-khata" onclick="tab('khata')">📒 खाता</div>
        <div class="tab" id="t-stock" onclick="tab('stock')">📦 स्टॉक</div>
        <div class="tab" id="t-set" onclick="tab('set')">⚙️ सेटिंग</div>
    </div>

    <datalist id="custL"></datalist>
    <datalist id="stkL"></datalist>

    <script>
        let DB = JSON.parse(localStorage.getItem("AYANSH_MASTER_V4")) || { tx: [], stock: [], prof: { name: "Ayansh Enterprises", gst: "NA", mob: "NA", logo: "" } };

        function initApp() { tab('bill'); loadP(); renderK(); renderStock(); }

        function tab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
            document.getElementById('pg-' + t).classList.add('show');
            document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('tab-active'));
            document.getElementById('t-' + t).classList.add('tab-active');
        }

        function previewLogo(input) {
            if (input.files && input.files[0]) {
                let r = new FileReader();
                r.onload = e => { document.getElementById('logo-pre').src = e.target.result; document.getElementById('logo-pre').style.display='block'; };
                r.readAsDataURL(input.files[0]);
            }
        }

        function saveProfile() {
            DB.prof.name = document.getElementById('s-name').value;
            DB.prof.gst = document.getElementById('s-gst').value;
            DB.prof.mob = document.getElementById('s-mob').value;
            if(document.getElementById('logo-pre').src.startsWith("data:")) DB.prof.logo = document.getElementById('logo-pre').src;
            sync(); loadP(); alert("ब्रांडिंग अपडेट हुई!");
        }

        function loadP() {
            document.getElementById('disp-name').innerText = DB.prof.name;
            document.getElementById('disp-details').innerText = `GST: ${DB.prof.gst} | Mob: ${DB.prof.mob}`;
            document.getElementById('s-name').value = DB.prof.name;
            document.getElementById('s-gst').value = DB.prof.gst;
            document.getElementById('s-mob').value = DB.prof.mob;
            if(DB.prof.logo) { document.getElementById('sh-logo-img').src = DB.prof.logo; document.getElementById('logo-pre').src = DB.prof.logo; document.getElementById('logo-pre').style.display='block'; }
        }

        function checkB(n) {
            let b = DB.tx.filter(x => x.n === n).reduce((s, x) => s + (x.t === 'उधार' ? x.a : 0), 0);
            document.getElementById('c-bal').innerText = "₹" + b;
            let f = DB.tx.find(x => x.n === n);
            if(f) document.getElementById('cM').value = f.m || "";
        }

        function saveBill() {
            let n = document.getElementById('cN').value, a = document.getElementById('iA').value;
            if(!n || !a) return alert("नाम और रकम भरें!");
            DB.tx.push({ n, m: document.getElementById('cM').value, i: document.getElementById('iN').value, a: parseFloat(a), t: document.getElementById('iT').value, d: new Date().toLocaleString() });
            sync(); alert("हिसाब सुरक्षित!"); renderK();
        }

        function renderK() {
            let q = document.getElementById('srchK').value.toLowerCase();
            let h = "";
            let names = [...new Set(DB.tx.map(x => x.n))].reverse();
            names.forEach(name => {
                if(name.toLowerCase().includes(q)) {
                    let txs = DB.tx.filter(x => x.n === name);
                    let bal = txs.reduce((s, x) => s + (x.t === 'उधार' ? x.a : 0), 0);
                    h += `<div class="card">
                        <div style="display:flex; justify-content:space-between;"><b>${name}</b> <b style="color:var(--r)">बकाया: ₹${bal}</b></div>
                        <div style="font-size:11px; margin-top:8px;">
                            ${txs.slice(-3).map(e => `<div>${e.d.split(',')[0]} - ${e.i} - ₹${e.a} (${e.t})</div>`).join('')}
                        </div>
                    </div>`;
                }
            });
            document.getElementById('k-list').innerHTML = h;
            document.getElementById('custL').innerHTML = names.map(x => `<option value="${x}">`).join('');
        }

        function addStock() {
            let n = document.getElementById('stN').value, q = document.getElementById('stQ').value;
            if(!n || !q) return alert("नाम और मात्रा भरें!");
            DB.stock.push({ n, q: parseInt(q) });
            sync(); renderStock();
            document.getElementById('stN').value=""; document.getElementById('stQ').value="";
        }

        function renderStock() {
            let h = "";
            DB.stock.forEach((s, i) => {
                h += `<div class="card" style="display:flex; justify-content:space-between;"><b>${s.n}</b> <span>${s.q} नग <button onclick="delS(${i})" style="color:red; border:none; background:none;">🗑️</button></span></div>`;
            });
            document.getElementById('stock-display').innerHTML = h;
            document.getElementById('stkL').innerHTML = DB.stock.map(x => `<option value="${x.n}">`).join('');
        }

        function delS(i) { DB.stock.splice(i,1); sync(); renderStock(); }
        function sync() { localStorage.setItem("AYANSH_MASTER_V4", JSON.stringify(DB)); }

        function exportExcel(data, name) {
            let ws = XLSX.utils.json_to_sheet(data);
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, `${name}.xlsx`);
        }

        function updateApp() {
            let code = document.getElementById('up-code').value;
            if(code.length < 100) return alert("सही कोड डालें!");
            let b = new Blob([code], {type: 'text/html'});
            window.location.href = URL.createObjectURL(b);
        }

        function downloadBackup() {
            let data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(DB));
            let a = document.createElement('a'); a.href = data; a.download = "Vyapar_Backup.json"; a.click();
        }
    </script>
</body>
</html>
