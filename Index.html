<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>आयांश एंटरप्राइजेज</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 70px; background: #eef2f3; }
        header { background: #004a99; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .page { display: none; padding: 15px; }
        .active { display: block; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #222; }
        .nav button { flex: 1; padding: 15px; color: white; border: none; background: none; }
        input, button { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #004a99; color: white; font-weight: bold; }
        .record-card { background: white; padding: 10px; margin: 5px 0; border-radius: 5px; border-left: 5px solid #004a99; }
    </style>
</head>
<body>

<header>
    <span id="shopDisplay">आयांश एंटरप्राइजेज</span>
    <span onclick="settings()" style="cursor:pointer; font-size: 24px;">⋮</span>
</header>

<div id="billing" class="page active">
    <h3>🧾 बिलिंग</h3>
    <input type="text" id="name" placeholder="किसान का नाम">
    <input type="text" id="item" placeholder="सामान">
    <input type="number" id="qty" placeholder="मात्रा" oninput="calc()">
    <input type="number" id="rate" placeholder="रेट" oninput="calc()">
    <input type="text" id="total" placeholder="कुल राशि" readonly>
    <button onclick="saveData()">बिल सेव करें</button>
</div>

<div id="ledger" class="page"><h3>📒 खाता (लेजर)</h3><div id="ledgerList"></div></div>
<div id="stock" class="page"><h3>📦 स्टॉक</h3><p>स्टॉक अपडेट यहाँ दिखेगा...</p></div>
<div id="purchase" class="page"><h3>📥 आवक</h3><button>नया स्टॉक जोड़ें</button></div>

<div class="nav">
    <button onclick="show('ledger')">खाता</button>
    <button onclick="show('billing')">बिलिंग</button>
    <button onclick="show('stock')">स्टॉक</button>
    <button onclick="show('purchase')">आवक</button>
</div>

<script>
    // पेज स्विचिंग
    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'ledger') renderLedger();
    }

    function calc() { document.getElementById('total').value = document.getElementById('qty').value * document.getElementById('rate').value; }

    // सेटिंग (नाम, GST, मोबाइल)
    function settings() {
        let name = prompt("दुकान का नाम:", localStorage.getItem('shopName') || "आयांश एंटरप्राइजेज");
        if(name) { localStorage.setItem('shopName', name); document.getElementById('shopDisplay').innerText = name; }
    }

    // डेटा सेविंग (बिलिंग -> लेजर)
    function saveData() {
        let entry = { name: document.getElementById('name').value, total: document.getElementById('total').value };
        let ledger = JSON.parse(localStorage.getItem('myLedger') || '[]');
        ledger.push(entry);
        localStorage.setItem('myLedger', JSON.stringify(ledger));
        alert("बिल सेव हो गया! खाता में जुड़ गया।");
        renderLedger();
    }

    // लेजर रेंडर
    function renderLedger() {
        let ledger = JSON.parse(localStorage.getItem('myLedger') || '[]');
        document.getElementById('ledgerList').innerHTML = ledger.map(d => `<div class='record-card'><b>${d.name}</b>: ₹${d.total}</div>`).join('');
    }
    
    window.onload = () => { document.getElementById('shopDisplay').innerText = localStorage.getItem('shopName') || "आयांश एंटरप्राइजेज"; renderLedger(); };
</script>
</body>
</html>
