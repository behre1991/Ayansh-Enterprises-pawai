<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>आयांश ईआरपी - वर्किंग वर्जन</title>
    <style>
        :root { --p: #01579b; --s: #2e7d32; --err: #c62828; --bg: #f0f2f5; }
        * { box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #333; padding-bottom: 90px; }

        /* 🔐 फिक्स्ड लॉगिन स्क्रीन */
        #lockScreen { position: fixed; inset: 0; background: var(--p); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .lock-box { background: white; padding: 40px 25px; border-radius: 25px; text-align: center; width: 88%; max-width: 350px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .lock-box input { width: 100%; padding: 15px; font-size: 24px; text-align: center; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 20px; outline: none; }
        .btn-go { background: var(--s); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* 📱 हेडर */
        header { background: var(--p); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 75px; }
        .shop-name { font-size: 18px; font-weight: bold; }
        .mic-btn { background: #ff5252; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; }

        /* 📁 मास्टर मेनू */
        #sideMenu { display: none; position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: white; z-index: 2001; box-shadow: 5px 0 20px rgba(0,0,0,0.2); }
        .menu-top { background: var(--p); color: white; padding: 25px; font-weight: bold; }
        .menu-link { width: 100%; padding: 15px 20px; border: none; border-bottom: 1px solid #eee; text-align: left; background: none; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        /* 📄 पेज सिस्टम */
        .page { display: none; padding: 15px; }
        .active-pg { display: block; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h4 { margin: 0 0 12px 0; color: var(--p); border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%; outline: none; }
        
        .btn-plus { background: var(--p); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--s); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }

        /* 📊 टेबल्स */
        .table-box { overflow-x: auto; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8f9fa; padding: 10px; text-align: left; font-size: 12px; color: #777; }
        td { padding: 12px 10px; border-top: 1px solid #eee; font-size: 14px; }

        /* 🧭 नेविगेशन */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 80px; border-top: 1px solid #ddd; z-index: 1000; }
        nav button { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 11px; }
        nav button.on { color: var(--p); background: #e3f2fd; border-top: 3px solid var(--p); }
        nav button b { font-size: 22px; margin-bottom: 3px; font-style: normal; }
    </style>
</head>
<body>

<div id="lockScreen">
    <div class="lock-box">
        <h2 style="margin:0 0 10px 0; color:#01579b;">नमस्ते रोहित जी</h2>
        <p style="color:#666; font-size:14px;">सिक्योरिटी पिन दर्ज करें</p>
        <input type="password" id="pinField" maxlength="4" placeholder="••••">
        <button class="btn-go" onclick="unlockApp()">लॉगिन करें</button>
        <p style="margin-top:15px; font-size:12px; color:#999;">पिन: 1234</p>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <header>
        <div onclick="openSide()"><span class="shop-name">आयांश एंटरप्राइजेज</span></div>
        <button class="mic-btn" id="mic" onclick="startMic()">🎤</button>
    </header>

    <div id="sideMenu">
        <div class="menu-top">ERP मास्टर कंट्रोल <span onclick="closeSide()" style="float:right">✕</span></div>
        <button class="menu-link" onclick="goPage('m-staff')">👥 स्टाफ KYC (आधार/सैलरी)</button>
        <button class="menu-link" onclick="goPage('m-ledger')">📔 खाता लेजर (उधार)</button>
        <button class="menu-link" onclick="goPage('m-shop')">⚙️ शॉप सेटिंग</button>
    </div>

    <div id="pg-bill" class="page active-pg">
        <div class="card">
            <h4>👤 ग्राहक</h4>
            <div class="row">
                <input type="text" id="cName" placeholder="नाम">
                <input type="number" id="cMob" placeholder="मोबाइल">
            </div>
            <input type="date" id="cDate">
        </div>
        <div class="card">
            <h4>🛒 सामान जोड़ें</h4>
            <div class="row">
                <input type="text" id="bItem" placeholder="आइटम" list="stk">
                <input type="number" id="bQty" placeholder="मात्रा">
            </div>
            <input type="number" id="bRate" placeholder="रेट">
            <button class="btn-plus" onclick="addToBill()" style="margin-top:10px;">+ बिल में जोड़ें (Box Clear)</button>
            <div class="table-box" style="margin-top:15px;">
                <table id="billTbl">
                    <thead><tr><th>सामान</th><th>Qty</th><th>रेट</th><th>कुल</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div style="text-align:right; font-size:24px; font-weight:bold; color:var(--p); margin-top:10px;" id="total">₹0.00</div>
            <div class="row">
                <button class="btn-save" style="background:var(--err)" onclick="saveBill('उधार')">उधार (खाता)</button>
                <button class="btn-save" onclick="saveBill('नकद')">नकद बिल</button>
            </div>
        </div>
    </div>

    <div id="pg-stock" class="page">
        <div class="card">
            <h4>📦 लाइव स्टॉक</h4>
            <div class="table-box">
                <table>
                    <thead><tr><th>नाम</th><th>स्टॉक</th><th>खरीद</th><th>Exp</th></tr></thead>
                    <tbody id="stkBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="m-ledger" class="page">
        <div class="card">
            <h4>📔 उधार खाता (Ledger)</h4>
            <div class="table-box">
                <table>
                    <thead><tr><th>तारीख</th><th>नाम</th><th>उधार</th><th>जमा</th></tr></thead>
                    <tbody id="ledgerBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="m-staff" class="page">
        <div class="card">
            <h4>👥 स्टाफ केवाईसी</h4>
            <input type="text" id="sName" placeholder="नाम">
            <input type="number" id="sAadhar" placeholder="आधार नंबर" style="margin-top:10px;">
            <input type="number" id="sSal" placeholder="सैलरी प्रति माह" style="margin-top:10px;">
            <button class="btn-save" onclick="saveKYC()">स्टाफ सुरक्षित करें</button>
        </div>
    </div>

    <datalist id="stk"></datalist>

    <nav>
        <button onclick="goPage('pg-bill', this)" class="on"><b>📄</b>बिलिंग</button>
        <button onclick="goPage('pg-stock', this)"><b>📦</b>स्टॉक</button>
        <button onclick="goPage('m-ledger', this)"><b>📔</b>खाता</button>
        <button onclick="goPage('m-staff', this)"><b>👥</b>स्टाफ</button>
    </nav>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('AyanshFinal_Fix')) || {
        stock: [], staff: [], ledger: []
    };

    function unlockApp() {
        if(document.getElementById('pinField').value === '1234') {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('cDate').valueAsDate = new Date();
            refreshList();
        } else { alert("गलत पिन!"); }
    }

    function goPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(btn) {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('on'));
            btn.classList.add('on');
        }
        document.getElementById('sideMenu').style.display = 'none';
        if(id === 'pg-stock') renderStk();
        if(id === 'm-ledger') renderLedger();
    }

    function openSide() { document.getElementById('sideMenu').style.display = 'block'; }
    function closeSide() { document.getElementById('sideMenu').style.display = 'none'; }

    // बिलिंग फंक्शन्स
    let cart = [];
    function addToBill() {
        let n = document.getElementById('bItem').value, q = parseFloat(document.getElementById('bQty').value), r = parseFloat(document.getElementById('bRate').value);
        if(!n || !q) return;
        cart.push({ name: n, qty: q, rate: r, total: q*r });
        // बॉक्स क्लियर (Blank)
        document.getElementById('bItem').value=''; document.getElementById('bQty').value=''; document.getElementById('bRate').value='';
        renderCart();
    }

    function renderCart() {
        document.getElementById('billTbl').querySelector('tbody').innerHTML = cart.map(c => `<tr><td>${c.name}</td><td>${c.qty}</td><td>${c.rate}</td><td>${c.total}</td></tr>`).join('');
        let t = cart.reduce((a,b) => a + b.total, 0);
        document.getElementById('total').innerText = "₹" + t.toFixed(2);
    }

    function saveBill(mode) {
        if(cart.length === 0) return;
        let t = parseFloat(document.getElementById('total').innerText.replace('₹',''));
        if(mode === 'उधार') {
            db.ledger.push({ date: document.getElementById('cDate').value, name: document.getElementById('cName').value, dr: t, cr: 0 });
        }
        cart.forEach(c => {
            let s = db.stock.find(i => i.name === c.name);
            if(s) s.qty -= c.qty; else db.stock.push({name: c.name, qty: -c.qty, rate: c.rate});
        });
        localStorage.setItem('AyanshFinal_Fix', JSON.stringify(db));
        alert(mode + " सेव हुआ!"); cart = []; renderCart(); document.getElementById('cName').value='';
    }

    function renderStk() {
        document.getElementById('stkBody').innerHTML = db.stock.map(s => `<tr><td>${s.name}</td><td>${s.qty}</td><td>${s.rate}</td><td>-</td></tr>`).join('');
    }

    function renderLedger() {
        document.getElementById('ledgerBody').innerHTML = db.ledger.map(l => `<tr><td>${l.date}</td><td>${l.name}</td><td style="color:red">${l.dr}</td><td style="color:green">${l.cr}</td></tr>`).join('');
    }

    function saveKYC() {
        db.staff.push({ name: document.getElementById('sName').value, aadhar: document.getElementById('sAadhar').value, sal: document.getElementById('sSal').value });
        localStorage.setItem('AyanshFinal_Fix', JSON.stringify(db));
        alert("स्टाफ सेव!"); 
        document.getElementById('sName').value=''; document.getElementById('sAadhar').value='';
    }

    function refreshList() {
        document.getElementById('stk').innerHTML = db.stock.map(s => `<option value="${s.name}">`).join('');
    }

    function startMic() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!Speech) return;
        const rec = new Speech();
        rec.lang = 'hi-IN';
        rec.onresult = (e) => {
            let cmd = e.results[0][0].transcript.toLowerCase();
            if(cmd.includes("स्टॉक")) goPage('pg-stock', document.querySelector('nav button:nth-child(2)'));
            if(cmd.includes("बिल")) goPage('pg-bill', document.querySelector('nav button:nth-child(1)'));
        };
        rec.start();
    }
</script>
</body>
</html>
