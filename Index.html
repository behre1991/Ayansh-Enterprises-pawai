<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>अयांश व्यापार V105 | रोहित भाई</title>
    <style>
        :root { --p: #0052cc; --s: #ff8c00; --d: #d32f2f; --c: #2e7d32; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        .header { background: var(--p); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .logo-box { width: 45px; height: 45px; border-radius: 50%; background: white; border: 2px solid var(--s); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .page { display: none; padding: 12px; max-width: 600px; margin: auto; }
        .active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 12px; border: 1px solid #ddd; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; }
        .btn-add { background: var(--s); } .btn-sale { background: var(--p); } .btn-rec { background: var(--c); }
        .btn-wa { background: #25D366; } .btn-prn { background: #555; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; border-top: 2px solid #ddd; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 11px; cursor: pointer; }
        .nav-active { color: var(--p); font-weight: bold; border-top: 5px solid var(--p); background: #f8faff; }
        .item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        #printArea { display:none; background:white; padding:20px; font-family:monospace; }
        @media print { body * { visibility: hidden; } #printArea, #printArea * { visibility: visible; } #printArea { display: block; position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body onload="checkLock()">

<div id="lock" style="position:fixed; inset:0; background:var(--p); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; color:white;">
    <h2>अयांश व्यापार V105</h2>
    <input type="password" id="pInp" placeholder="पासवर्ड डालें" style="max-width:300px; text-align:center; height:50px; border-radius:10px; color:black;">
    <button class="btn btn-add" style="max-width:300px;" onclick="unlock()">प्रवेश करें</button>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="logo-box"><img id="hLogo" src=""></div>
            <div style="line-height:1.2"><b id="hName">दुकान</b><br><small id="hMobDisplay" style="font-size:12px; opacity:0.9;"></small></div>
        </div>
        <span onclick="tab('set')" style="cursor:pointer; font-size:24px;">⚙️</span>
    </div>

    <div id="pg-home" class="page active">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <div class="card" style="flex:1; background:var(--d); color:white; border:none; text-align:center;">कुल उधारी<br><b id="totOut">₹0</b></div>
            <div class="card" style="flex:1; background:var(--c); color:white; border:none; text-align:center;">आज जमा<br><b id="totIn">₹0</b></div>
        </div>
        <input type="text" id="srch" placeholder="किसान खोजें..." onkeyup="renderHome()">
        <div id="pList" style="margin-top:10px;"></div>
    </div>

    <div id="pg-bill" class="page">
        <div class="card">
            <h4>👤 किसान विवरण</h4>
            <input type="text" id="pN" placeholder="किसान का नाम" list="pTips">
            <input type="number" id="pM" placeholder="WhatsApp नंबर">
        </div>
        <div class="card" style="border: 2px solid var(--s);">
            <h4 style="margin:0; color:var(--s);">🛒 सामान जोड़ें</h4>
            <select id="stockSel" onchange="fillStockItem()"><option value="">स्टॉक से चुनें...</option></select>
            <input type="text" id="iN" placeholder="सामान का नाम">
            <div style="display:flex; gap:8px;">
                <input type="number" id="iP" placeholder="रेट ₹">
                <input type="number" id="iQ" placeholder="मात्रा" value="1">
            </div>
            <button class="btn btn-add" onclick="addToCart()">+ लिस्ट में जोड़ें</button>
            <div id="cartArea" style="margin-top:12px; border-top:1px dashed #ccc;"></div>
            <h3 id="cartTotal" style="text-align:right;">कुल: ₹0</h3>
            
            <hr>
            <button class="btn btn-sale" id="saveBillBtn" onclick="saveBill()">💾 1. बिल सेव करें</button>
            
            <div id="afterSaveActions" style="display:none; gap:8px; margin-top:10px;">
                <button class="btn btn-prn" style="flex:1" onclick="window.print()">🖨️ 2. प्रिंट</button>
                <button class="btn btn-wa" style="flex:1" id="waBtn">📲 3. WhatsApp</button>
            </div>
            <button class="btn" id="newBillBtn" style="display:none; background:#888;" onclick="location.reload()">🔄 अगला नया बिल</button>
        </div>
    </div>

    <div id="pg-stock" class="page">
        <div class="card">
            <h4>📦 स्टॉक मैनेजमेंट</h4>
            <input type="text" id="sN" placeholder="सामान का नाम">
            <input type="number" id="sQ" placeholder="कुल मात्रा">
            <input type="number" id="sR" placeholder="बिक्री रेट ₹">
            <button class="btn btn-add" onclick="addStock()">स्टॉक में जमा करें</button>
        </div>
        <div id="stockList"></div>
    </div>

    <div id="pg-set" class="page">
        <div class="card">
            <h4>⚙️ दुकान सेटिंग</h4>
            <label>लोगो बदलें:</label><input type="file" accept="image/*" onchange="updateLogo(this)">
            <label>दुकान का नाम:</label><input type="text" id="cfgN">
            <label>दुकानदार मोबाइल:</label><input type="text" id="cfgM">
            <label>पासवर्ड:</label><input type="password" id="cfgP">
            <button class="btn btn-sale" onclick="saveCfg()">सेटिंग सेव करें</button>
        </div>
        <div class="card" style="background:#fff3e0;">
            <h4>📧 बैकअप और सुरक्षा</h4>
            <button class="btn btn-rec" onclick="sendEmailBackup()">ईमेल पर बैकअप भेजें</button>
            <button class="btn btn-prn" onclick="downloadBackup()">फाइल डाउनलोड करें</button>
        </div>
        <div class="card" style="border:1px dashed red;">
            <h4>🚀 सॉफ्टवेयर अपडेट</h4>
            <textarea id="updC" rows="2" placeholder="नया अपडेट कोड यहाँ डालें..."></textarea>
            <button class="btn btn-add" onclick="runUpdate()">सॉफ्टवेयर अपडेट करें</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item nav-active" onclick="tab('home', this)">🏠<span>होम</span></div>
        <div class="nav-item" onclick="tab('bill', this)">📝<span>बिलिंग</span></div>
        <div class="nav-item" onclick="tab('stock', this)">📦<span>स्टॉक</span></div>
        <div class="nav-item" onclick="tab('set', this)">⚙️<span>सेटिंग</span></div>
    </nav>
</div>

<div id="printArea">
    <center><h2 id="prDukan"></h2><p id="prMob"></p></center>
    <hr><p>किसान: <b id="prKisan"></b> | तारीख: <span id="prDate"></span></p><hr>
    <div id="prItems"></div><hr>
    <h3 style="text-align:right;">कुल बकाया: ₹<span id="prTotal"></span></h3>
</div>

<datalist id="pTips"></datalist>

<script>
    const K = "VYAPAR_V94_ROHIT";
    const UPD_K = "VYAPAR_LIVE_CODE"; // अपडेट कोड स्टोर करने की चाबी
    
    // अगर मेमोरी में नया अपडेट कोड है, तो उसे चलाओ
    if(localStorage.getItem(UPD_K) && !window.alreadyUpdated){
        window.alreadyUpdated = true;
        document.open();
        document.write(localStorage.getItem(UPD_K));
        document.close();
    }

    let DB = JSON.parse(localStorage.getItem(K)) || { cfg:{n:"अयांश कृषि", p:"1234", m:"", l:""}, tx:[], stock:[] };
    let cart = [];

    function unlock() {
        if(document.getElementById('pInp').value === DB.cfg.p || document.getElementById('pInp').value === "1234") {
            document.getElementById('lock').style.display='none'; document.getElementById('app').style.display='block'; init();
        } else alert("गलत पासवर्ड!");
    }

    function init() {
        document.getElementById('hName').innerText = DB.cfg.n;
        document.getElementById('hLogo').src = DB.cfg.l || "";
        document.getElementById('hMobDisplay').innerText = DB.cfg.m ? "📞 " + DB.cfg.m : "";
        document.getElementById('cfgN').value = DB.cfg.n;
        document.getElementById('cfgM').value = DB.cfg.m;
        renderHome(); renderStock(); updateStockDrop();
    }

    function tab(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById('pg-'+p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        if(el) el.classList.add('nav-active');
    }

    // --- बिलिंग लॉजिक ---
    function addToCart() {
        const n = document.getElementById('iN').value, p = parseFloat(document.getElementById('iP').value), q = parseFloat(document.getElementById('iQ').value);
        if(!n || isNaN(p)) return;
        cart.push({ n, p, q, t:p*q });
        renderCart();
        document.getElementById('iN').value=""; document.getElementById('iP').value="";
    }

    function renderCart() {
        let h = ""; let tt = 0;
        cart.forEach((i, idx) => { h += `<div class="item-row"><span>${i.n} (${i.q}x${i.p})</span><b>₹${i.t} <span onclick="cart.splice(${idx},1);renderCart()" style="color:red">✖</span></b></div>`; tt += i.t; });
        document.getElementById('cartArea').innerHTML = h; document.getElementById('cartTotal').innerText = "कुल: ₹"+tt;
    }

    function saveBill() {
        const n = document.getElementById('pN').value, m = document.getElementById('pM').value;
        if(!n || cart.length === 0) return alert("किसान और सामान भरें!");
        const tt = cart.reduce((s,i)=>s+i.t, 0);
        
        cart.forEach(ci => {
            let s = DB.stock.find(x => x.n === ci.n);
            if(s) s.q -= ci.q;
        });

        DB.tx.push({ id:Date.now(), name:n, phone:m, amt:tt, type:'sale', date:new Date().toLocaleString(), itms:[...cart] });
        save();
        
        // प्रिंट एरिया सेट करें
        document.getElementById('prDukan').innerText = DB.cfg.n;
        document.getElementById('prMob').innerText = DB.cfg.m;
        document.getElementById('prKisan').innerText = n;
        document.getElementById('prTotal').innerText = tt;
        let pItm = ""; cart.forEach(i => pItm += `<div class="item-row"><span>${i.n}</span><span>₹${i.t}</span></div>`);
        document.getElementById('prItems').innerHTML = pItm;

        // बटन बदलें
        document.getElementById('saveBillBtn').innerText = "✅ बिल सुरक्षित हो गया!";
        document.getElementById('saveBillBtn').disabled = true;
        document.getElementById('afterSaveActions').style.display = "flex";
        document.getElementById('newBillBtn').style.display = "flex";
        
        document.getElementById('waBtn').onclick = () => {
            let msg = `*${DB.cfg.n}*\nकिसान: ${n}\nकुल राशि: ₹${tt}\nपधारने के लिए धन्यवाद!`;
            window.open(`https://wa.me/91${m}?text=${encodeURIComponent(msg)}`);
        };
    }

    // --- स्टॉक और सेटिंग ---
    function addStock() {
        const n = document.getElementById('sN').value, q = parseFloat(document.getElementById('sQ').value), r = parseFloat(document.getElementById('sR').value);
        if(!n || isNaN(q)) return;
        DB.stock.push({ n, q, r }); save(); renderStock(); updateStockDrop();
        document.getElementById('sN').value=""; document.getElementById('sQ').value=""; document.getElementById('sR').value="";
    }

    function renderStock() {
        let h = "<h4>📦 स्टॉक लिस्ट</h4>";
        DB.stock.forEach((s, i) => {
            h += `<div class="card" style="display:flex; justify-content:space-between;"><span><b>${s.n}</b> (${s.q})</span><button onclick="DB.stock.splice(${i},1);save();renderStock();" style="color:red; border:none; background:none;">✖</button></div>`;
        });
        document.getElementById('stockList').innerHTML = h;
    }

    function updateStockDrop() {
        let h = '<option value="">स्टॉक से चुनें...</option>';
        DB.stock.forEach(s => h += `<option value="${s.n}">${s.n}</option>`);
        document.getElementById('stockSel').innerHTML = h;
    }

    function fillStockItem() {
        const s = DB.stock.find(x => x.n === document.getElementById('stockSel').value);
        if(s) { document.getElementById('iN').value = s.n; document.getElementById('iP').value = s.r; }
    }

    function updateLogo(el) {
        const reader = new FileReader();
        reader.onload = (e) => { DB.cfg.l = e.target.result; document.getElementById('hLogo').src = e.target.result; };
        reader.readAsDataURL(el.files[0]);
    }

    function saveCfg() {
        DB.cfg.n = document.getElementById('cfgN').value; DB.cfg.m = document.getElementById('cfgM').value;
        if(document.getElementById('cfgP').value) DB.cfg.p = document.getElementById('cfgP').value;
        save(); alert("सेटिंग सेव हुई!"); location.reload();
    }

    function renderHome() {
        const q = document.getElementById('srch').value.toLowerCase();
        const l = {}; let tO = 0;
        DB.tx.forEach(t => { if(!l[t.name]) l[t.name] = 0; l[t.name] += (t.type==='sale'?t.amt:-t.amt); });
        let h = ""; Object.keys(l).sort().forEach(n => {
            if(n.toLowerCase().includes(q)) {
                if(l[n]>0) tO += l[n];
                h += `<div class="card" style="display:flex; justify-content:space-between;"><b>${n}</b><b style="color:red">₹${l[n]}</b></div>`;
            }
        });
        document.getElementById('pList').innerHTML = h;
        document.getElementById('totOut').innerText = "₹"+tO;
        document.getElementById('pTips').innerHTML = [...new Set(DB.tx.map(t=>t.name))].map(n=>`<option value="${n}">`).join('');
    }

    // --- परमानेंट अपडेट फंक्शन ---
    function runUpdate() {
        const code = document.getElementById('updC').value;
        if(code.includes("<html")) {
            localStorage.setItem(UPD_K, code); // कोड को मेमोरी में सेव कर लिया
            alert("सॉफ्टवेयर सफलतापूर्वक अपडेट हो गया है! अब ऐप रीलोड होगी।");
            location.reload();
        } else {
            alert("कृपया सही कोड डालें!");
        }
    }

    function save() { localStorage.setItem(K, JSON.stringify(DB)); }
    function sendEmailBackup() { window.location.href = `mailto:?subject=VyaparBackup&body=${encodeURIComponent(JSON.stringify(DB))}`; }
    function downloadBackup() { const blob = new Blob([JSON.stringify(DB)], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Ayansh_Backup.json"; a.click(); }
</script>
</body>
</html>
