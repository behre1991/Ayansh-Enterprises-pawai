<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>अयांश मुनीम V78 | रोहित भाई स्पेशल</title>
    <style>
        :root { --p: #1b5e20; --s: #ef6c00; --d: #c62828; --bg: #f4f7f4; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .header { background: var(--p); color: white; padding: 15px; text-align: center; font-weight: bold; border-bottom: 3px solid var(--s); display: flex; align-items: center; justify-content: center; gap: 10px; }
        #shopLogo { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: white; display: none; }
        .page { display: none; padding: 12px; max-width: 600px; margin: auto; }
        .active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; border: 1px solid #ddd; }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-p { background: var(--p); }
        .btn-upd { background: #0288d1; }
        .btn-w { background: #25d366; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; border-top: 2px solid #ddd; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 11px; cursor: pointer; }
        .nav-active { color: var(--p); font-weight: bold; border-top: 4px solid var(--p); background: #f9f9f9; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table td { border-bottom: 1px solid #eee; padding: 10px 5px; font-size: 14px; }
    </style>
</head>
<body onload="checkLock()">

<div id="lockScreen" style="position:fixed; inset:0; background:var(--p); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; padding:20px;">
    <h2>🔒 अयांश मुनीम सुरक्षा</h2>
    <input type="password" id="pInp" placeholder="पासवर्ड (1234)" style="max-width:280px; text-align:center; color:black;">
    <button class="btn btn-upd" style="max-width:280px;" onclick="unlock()">सॉफ्टवेयर अनलॉक करें</button>
</div>

<div id="app" style="display:none;">
    <div class="header"><img id="shopLogo"><span id="hName">लोड हो रहा है...</span></div>

    <div id="pg-bill" class="page active">
        <div class="card">
            <h3>👤 किसान का विवरण</h3>
            <input type="text" id="cN" placeholder="किसान का नाम" list="cTips">
            <datalist id="cTips"></datalist>
            <input type="number" id="cM" placeholder="मोबाइल नंबर">
            <input type="file" id="cam" capture="environment" accept="image/*" style="display:none" onchange="handleImg(this)">
            <button class="btn btn-upd" onclick="document.getElementById('cam').click()">📷 फोटो बिल जोड़ें</button>
            <img id="billImgPre" style="width:100%; margin-top:10px; display:none; border-radius:10px;">
        </div>
        <div class="card" style="border: 2px solid var(--p);">
            <h3>🛍️ सामान जोड़ें (लिस्ट बनाएं)</h3>
            <input type="text" id="iN" placeholder="सामान का नाम" list="sTips">
            <datalist id="sTips"></datalist>
            <div style="display:flex; gap:10px;">
                <input type="number" id="iP" placeholder="दर ₹">
                <input type="number" id="iQ" placeholder="मात्रा" value="1">
            </div>
            <button class="btn btn-p" onclick="addItem()">➕ लिस्ट में जोड़ें</button>
        </div>
        <div id="cartBox" class="card" style="display:none; border: 2.5px solid var(--s);">
            <table id="cartTbl"></table>
            <div style="text-align:right; font-size:24px; color:var(--d); font-weight:bold; padding:10px;" id="cartTotal">₹0.00</div>
            <button class="btn btn-p" onclick="saveBill()">💾 बिल सेव करें (खाते में)</button>
            <button class="btn btn-w" onclick="shareWA()">💬 व्हाट्सएप पर भेजें</button>
        </div>
    </div>

    <div id="pg-ledger" class="page">
        <div class="card">
            <h3>📜 बकाया रजिस्टर</h3>
            <input type="text" id="srch" placeholder="किसान का नाम खोजें..." onkeyup="renderL()">
            <div id="lList" style="margin-top:10px;"></div>
        </div>
    </div>

    <div id="pg-stk" class="page">
        <div class="card">
            <h3>📦 स्टॉक और रेट सेट करें</h3>
            <input type="text" id="stkN" placeholder="सामान का नाम">
            <input type="number" id="stkP" placeholder="बिक्री दर ₹">
            <button class="btn btn-p" onclick="addStk()">स्टॉक में सुरक्षित करें</button>
        </div>
        <div id="stkShow"></div>
    </div>

    <div id="pg-set" class="page">
        <div class="card">
            <h3>⚙️ प्रोफाइल सेटिंग</h3>
            <input type="text" id="cfgN" placeholder="दुकान का नाम">
            <input type="text" id="cfgG" placeholder="GST नंबर">
            <input type="number" id="cfgM" placeholder="मोबाइल नंबर">
            <input type="password" id="cfgP" placeholder="नया पासवर्ड">
            <input type="file" accept="image/*" onchange="handleLogo(this)">
            <button class="btn btn-p" onclick="saveCfg()">✅ प्रोफाइल अपडेट करें</button>
        </div>
        <div class="card" style="background:#e3f2fd;">
            <h3>🔄 सॉफ्टवेयर अपडेट</h3>
            <textarea id="updCode" rows="3" placeholder="नया अपडेट कोड यहाँ डालें"></textarea>
            <button class="btn btn-upd" onclick="runUpd()">🚀 ऐप अपडेट करें</button>
        </div>
        <div class="card" style="background:#fff3e0;">
            <h3>📤 डेटा बैकअप & रिकवरी</h3>
            <button class="btn btn-upd" onclick="exportDB()">📤 फाइल डाउनलोड करें</button>
            <input type="file" id="impF" style="display:none" onchange="importDB(this)">
            <button class="btn" style="background:#444;" onclick="document.getElementById('impF').click()">📥 पुरानी फाइल लोड करें</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item nav-active" onclick="tab('bill', this)">🛒<span>बिलिंग</span></div>
        <div class="nav-item" onclick="tab('ledger', this)">📜<span>खाता</span></div>
        <div class="nav-item" onclick="tab('stk', this)">📦<span>स्टॉक</span></div>
        <div class="nav-item" onclick="tab('set', this)">⚙<span>सेटिंग</span></div>
    </nav>
</div>

<div id="modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2000; display:none; align-items:center; justify-content:center;">
    <div class="card" style="width:90%;">
        <h2 id="mN">किसान</h2>
        <div id="mB" style="font-size:35px; color:var(--d); text-align:center; padding:15px; font-weight:bold;">₹0.00</div>
        <input type="number" id="pAmt" placeholder="कितना पैसा जमा किया? ₹">
        <button class="btn btn-p" onclick="saveP()">✅ पैसा जमा करें</button>
        <button class="btn" style="background:#ccc; color:black;" onclick="document.getElementById('modal').style.display='none'">बंद करें</button>
    </div>
</div>

<script>
    const K = "AYANSH_MASTER_V78";
    let DB = JSON.parse(localStorage.getItem(K)) || { cfg: {n:"अयांश कृषि", p:"1234"}, tx: [], stk: [] };
    let cart = []; let curImg = ""; let curC = "";

    function unlock() {
        const p = document.getElementById('pInp').value;
        if(p === DB.cfg.p || p === "1234") {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            init();
        } else alert("गलत पासवर्ड!");
    }

    function init() {
        document.getElementById('hName').innerText = DB.cfg.n;
        document.getElementById('cfgN').value = DB.cfg.n;
        if(DB.cfg.logo) { document.getElementById('shopLogo').src = DB.cfg.logo; document.getElementById('shopLogo').style.display='block'; }
        renderStk(); updateTips();
    }

    function tab(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById('pg-'+p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('nav-active'));
        el.classList.add('nav-active');
        if(p==='ledger') renderL();
    }

    function addItem() {
        const n = document.getElementById('iN').value, p = parseFloat(document.getElementById('iP').value), q = parseFloat(document.getElementById('iQ').value);
        if(n && p) { cart.push({ n, p, q, t: p*q }); renderCart(); document.getElementById('iN').value=""; document.getElementById('iP').value=""; }
    }

    function renderCart() {
        let h = ""; let tt = 0;
        cart.forEach((it, i) => { h += `<tr><td>${it.n}</td><td>${it.p}x${it.q}</td><td>₹${it.t}</td><td onclick="cart.splice(${i},1);renderCart()" style="color:red; font-weight:bold;">✖</td></tr>`; tt += it.t; });
        document.getElementById('cartTbl').innerHTML = h; document.getElementById('cartTotal').innerText = "₹" + tt;
        document.getElementById('cartBox').style.display = 'block';
    }

    function saveBill() {
        const name = document.getElementById('cN').value; if(!name) return alert("किसान का नाम लिखें!");
        DB.tx.push({ id: Date.now(), name, phone: document.getElementById('cM').value, amt: cart.reduce((s,i)=>s+i.t, 0), type: 'bill', date: new Date().toLocaleString(), img: curImg });
        save(); alert("सफलतापूर्वक खाते में दर्ज!"); location.reload();
    }

    function renderL() {
        const q = document.getElementById('srch').value.toLowerCase();
        const ledger = {};
        DB.tx.forEach(t => { if(!ledger[t.name]) ledger[t.name] = {bal: 0}; ledger[t.name].bal += (t.type === 'bill' ? t.amt : -t.amt); });
        let h = ""; Object.keys(ledger).sort().forEach(n => {
            if(n.toLowerCase().includes(q)) h += `<div style="padding:15px; background:white; margin-bottom:10px; border-radius:10px; display:flex; justify-content:space-between; border-left:8px solid #1b5e20;" onclick="openM('${n}')"><b>${n}</b><b style="color:red">₹${ledger[n].bal.toFixed(2)}</b></div>`;
        });
        document.getElementById('lList').innerHTML = h;
    }

    function openM(n) {
        curC = n; document.getElementById('mN').innerText = n;
        const bal = DB.tx.filter(t => t.name === n).reduce((s,t)=>s+(t.type==='bill'?t.amt:-t.amt),0);
        document.getElementById('mB').innerText = "₹" + bal.toFixed(2);
        document.getElementById('modal').style.display = 'flex';
    }

    function saveP() {
        const a = parseFloat(document.getElementById('pAmt').value); if(!a) return;
        DB.tx.push({ id: Date.now(), name: curC, amt: a, type: 'pay', date: new Date().toLocaleString() });
        save(); alert("जमा स्वीकार की गई!"); location.reload();
    }

    function addStk() {
        const n = document.getElementById('stkN').value, p = document.getElementById('stkP').value;
        if(n && p) { DB.stk.push({n, p}); save(); renderStk(); document.getElementById('stkN').value=""; document.getElementById('stkP').value=""; }
    }

    function renderStk() {
        document.getElementById('stkShow').innerHTML = DB.stk.map(s => `<div style="padding:10px; border-bottom:1px solid #ddd;">${s.n} - ₹${s.p}</div>`).join('');
        document.getElementById('sTips').innerHTML = DB.stk.map(s => `<option value="${s.n}">`).join('');
    }

    function saveCfg() {
        DB.cfg.n = document.getElementById('cfgN').value; if(document.getElementById('cfgP').value) DB.cfg.p = document.getElementById('cfgP').value;
        save(); alert("प्रोफाइल अपडेट हुई!"); location.reload();
    }

    function save() { localStorage.setItem(K, JSON.stringify(DB)); }
    function handleLogo(i) { const r = new FileReader(); r.onload = (e) => { DB.cfg.logo = e.target.result; save(); }; r.readAsDataURL(i.files[0]); }
    function handleImg(i) { const r = new FileReader(); r.onload = (e) => { curImg = e.target.result; document.getElementById('billImgPre').src = curImg; document.getElementById('billImgPre').style.display='block'; document.getElementById('cartBox').style.display='block'; }; r.readAsDataURL(i.files[0]); }
    function exportDB() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(DB)], {type:"application/json"})); a.download = `Ayansh_Data.json`; a.click(); }
    function importDB(i) { const r = new FileReader(); r.onload = (e) => { DB = JSON.parse(e.target.result); save(); location.reload(); }; r.readAsText(i.files[0]); }
    function updateTips() { document.getElementById('cTips').innerHTML = [...new Set(DB.tx.map(t => t.name))].map(n => `<option value="${n}">`).join(''); }
    function shareWA() { window.open(`https://wa.me/91${document.getElementById('cM').value}?text=*${DB.cfg.n}*%0Aनमस्ते, किसान: ${document.getElementById('cN').value}%0Aकुल बिल: ₹${document.getElementById('cartTotal').innerText}`); }
    function runUpd() { const c = document.getElementById('updCode').value; if(c.includes("<script")) { document.open(); document.write(c); document.close(); } }
</script>
</body>
</html>
