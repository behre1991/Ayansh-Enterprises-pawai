<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>आयांश एंटरप्राइजेज</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding-bottom: 70px; background: #f0f2f5; }
        header { background: #0056b3; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .page { display: none; padding: 15px; }
        .active { display: block; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #333; }
        .nav button { flex: 1; padding: 15px; color: white; background: none; border: none; font-size: 14px; cursor: pointer; }
        input, button, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; }
        .del-btn { background: #dc3545; color: white; }
    </style>
</head>
<body>

<header>
    <span>आयांश एंटरप्राइजेज</span>
    <span onclick="showSettings()" style="font-size:24px; cursor:pointer;">⋮</span>
</header>

<div id="billing" class="page active">
    <h3>🧾 बिलिंग</h3>
    <input type="text" id="bName" placeholder="किसान का नाम">
    <input type="tel" id="bMob" placeholder="मोबाइल नंबर">
    <input type="text" id="bItem" placeholder="सामान (स्टॉक या मैनुअल)">
    <input type="number" id="bQty" placeholder="मात्रा (Quantity)" oninput="calc()">
    <input type="number" id="bRate" placeholder="रेट (Rate)" oninput="calc()">
    <input type="text" id="bTotal" placeholder="कुल राशि (Total)" readonly>
    <select id="bMode"><option>नकद</option><option>उधार</option></select>
    <button onclick="saveData('bills', {name: bName.value, mob: bMob.value, item: bItem.value, total: bTotal.value})">बिल सेव करें</button>
</div>

<div id="ledger" class="page">
    <h3>📒 खाता (लेजर)</h3>
    <button onclick="alert('ग्राहक खाता')">👤 ग्राहक खाता</button>
    <button onclick="alert('सप्लायर खाता')">🏢 सप्लायर खाता</button>
</div>

<div id="stock" class="page"><h3>📦 स्टॉक रिपोर्ट</h3><div id="stockList"></div></div>

<div id="purchase" class="page">
    <h3>📥 आवक (Purchase)</h3>
    <input type="text" id="pSupp" placeholder="सप्लायर का नाम">
    <input type="text" id="pItem" placeholder="सामान">
    <input type="number" id="pQty" placeholder="मात्रा">
    <input type="number" id="pRate" placeholder="खरीद रेट">
    <button onclick="saveData('purchase', {supp: pSupp.value, qty: pQty.value})">स्टॉक में जोड़ें</button>
</div>

<div class="nav">
    <button onclick="show('ledger')">खाता</button>
    <button onclick="show('billing')">बिलिंग</button>
    <button onclick="show('stock')">स्टॉक</button>
    <button onclick="show('purchase')">आवक</button>
</div>

<script>
    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function calc() {
        document.getElementById('bTotal').value = document.getElementById('bQty').value * document.getElementById('bRate').value;
    }

    function saveSettings() {
        let name = prompt("दुकान का नाम:");
        let gst = prompt("GST नंबर:");
        localStorage.setItem("shopName", name);
        localStorage.setItem("gstNum", gst);
        alert("सेटिंग अपडेट हो गई!");
    }

    function showSettings() {
        if(confirm("सेटिंग खोलें (नाम, GST, लोगो, बैकअप)?")) saveSettings();
    }
</script>
</body>
</html>
