<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Ayansh Connected System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding-bottom: 70px; }
        .page { display: none; padding: 15px; } .show { display: block; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        .inp { width: 100%; padding: 10px; margin: 5px 0; background: #000; color: #fff; border: 1px solid #555; }
        .btn { width: 100%; padding: 12px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: #222; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="pg-billing" class="page show">
    <div class="card">
        <h3>📝 बिलिंग (सब जगह जुड़ेगा)</h3>
        <input type="text" id="cN" class="inp" placeholder="किसान का नाम">
        <input type="text" id="cItem" class="inp" placeholder="सामान का नाम">
        <input type="number" id="cQty" class="inp" placeholder="मात्रा (Quantity)">
        <input type="number" id="cRate" class="inp" placeholder="रेट">
        <button class="btn" onclick="processAll()">बिल सेव करें (स्टॉक और खाता अपडेट)</button>
    </div>
</div>

<div id="pg-khata" class="page">
    <div class="card">
        <h3>📒 खाता बुक</h3>
        <button class="btn" style="background:#0cf" onclick="exportToExcel()">एक्सेल में निकालें</button>
        <div id="khataDetails"></div>
    </div>
</div>

<div id="pg-stock" class="page">
    <div class="card">
        <h3>📦 स्टॉक अपडेट</h3>
        <div id="stockDetails"></div>
    </div>
</div>

<div id="pg-setting" class="page">
    <div class="card">
        <h3>⚙️ सेटिंग</h3>
        <input type="text" id="shName" class="inp" placeholder="दुकान का नाम">
        <input type="text" id="shGst" class="inp" placeholder="GST नंबर">
        <button class="btn" onclick="saveSettings()">पक्की सेटिंग सेव</button>
    </div>
</div>

<div class="tab-bar">
    <div class="tab" onclick="go('billing')">बिलिंग</div>
    <div class="tab" onclick="go('khata')">खाता</div>
    <div class="tab" onclick="go('stock')">स्टॉक</div>
    <div class="tab" onclick="go('setting')">सेटिंग</div>
</div>

<script>
    let DB = JSON.parse(localStorage.getItem("AYANSH_LINKED_DB")) || { tx: [], stock: [], shop: {} };

    function go(p) {
        document.querySelectorAll('.page').forEach(x => x.style.display = 'none');
        document.getElementById('pg-'+p).style.display = 'block';
    }

    function processAll() {
        let n = document.getElementById('cN').value;
        let item = document.getElementById('cItem').value;
        let qty = parseFloat(document.getElementById('cQty').value);
        
        // 1. खाता अपडेट
        DB.tx.push({ name: n, item: item, qty: qty });
        
        // 2. स्टॉक अपडेट (सामान घटने का लॉजिक)
        let s = DB.stock.find(x => x.name === item);
        if(s) s.qty -= qty;
        else DB.stock.push({ name: item, qty: -qty });

        localStorage.setItem("AYANSH_LINKED_DB", JSON.stringify(DB));
        alert("बिलिंग सफल: स्टॉक घट गया और खाता अपडेट हो गया!");
    }

    function saveSettings() {
        DB.shop = { name: document.getElementById('shName').value, gst: document.getElementById('shGst').value };
        localStorage.setItem("AYANSH_LINKED_DB", JSON.stringify(DB));
        alert("सेटिंग लॉक हो गई!");
    }
</script>
</body>
</html>
