<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>अयांश मुनीम प्रो | V45</title>
    <style>
        :root { --p: #003399; --s: #ff6600; --d: #cc0000; --ok: #008000; --g: #f2f2f2; --w: #ffffff; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--g); margin: 0; padding-bottom: 80px; }
        
        .header { background: var(--p); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 12px; max-width: 500px; margin: auto; animation: fadeIn 0.3s ease; }
        .page-active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--w); padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h3 { margin: 0 0 10px 0; color: var(--p); font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 5px; }

        input { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; margin-top: 10px; }
        .btn-p { background: var(--p); color: white; }
        .btn-s { background: var(--s); color: white; }
        .btn-ok { background: var(--ok); color: white; }
        .btn-wa { background: #25D366; color: white; margin-top: 5px; }
        
        .nav-bar { display: flex; background: white; position: fixed; bottom: 0; width: 100%; height: 75px; border-top: 1px solid #ddd; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #666; cursor: pointer; }
        .nav-active { color: var(--p); font-weight: bold; background: #e6ecff; border-top: 4px solid var(--p); }

        .ledger-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 6px solid var(--d); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .paid { border-left-color: var(--ok); }

        #qrOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .qr-card { background: white; padding: 20px; border-radius: 20px; text-align: center; width: 100%; max-width: 320px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-size:18px;">अयांश इंटरप्राइजेज मुनीम</h2>
</div>

<div id="p-bill" class="page page-active">
    <div class="card">
        <h3>👤 किसान विवरण</h3>
        <input type="text" id="cN" placeholder="किसान का नाम">
        <input type="number" id="cM" placeholder="WhatsApp नंबर">
    </div>
    <div class="card">
        <h3>🛒 सामान की बिक्री</h3>
        <input type="text" id="iN" placeholder="सामान का नाम (लिखें या चुनें)" list="stkData" onchange="getPrice(this.value)">
        <datalist id="stkData"></datalist>
        <div style="display:flex; gap:10px;">
            <input type="number" id="iQ" placeholder="मात्रा">
            <input type="number" id="iP" placeholder="रेट ₹">
        </div>
        <button class="btn btn-p" onclick="addList()">➕ बिल में जोड़ें</button>
    </div>
    <div id="billArea" class="card" style="display:none;">
        <table id="billTable"><tbody></tbody></table>
        <h2 id="totalShow" style="text-align:right; color:var(--d);">₹0</h2>
        <button class="btn btn-ok" onclick="doneSale()">💾 सुरक्षित करें और QR दिखाएं</button>
    </div>
</div>

<div id="p-khata" class="page">
    <div class="card">
        <h3>📜 किसान लेजर</h3>
        <input type="text" id="srch" placeholder="नाम खोजें..." onkeyup="loadKhata()">
        <div id="khataList" style="margin-top:10px;"></div>
    </div>
</div>

<div id="p-stock" class="page">
    <div class="card">
        <h3>📦 स्टॉक अपडेट</h3>
        <input type="text" id="sN" placeholder="सामान का नाम">
        <input type="number" id="sQ" placeholder="मात्रा">
        <input type="number" id="sR" placeholder="बिक्री रेट">
        <button class="btn btn-p" onclick="addStock()">स्टॉक सेव करें</button>
    </div>
    <div class="card">
        <table id="stTable"><thead><tr><th>नाम</th><th>स्टॉक</th><th>रेट</th></tr></thead><tbody></tbody></table>
    </div>
</div>

<div id="qrOverlay">
    <div class="qr-card">
        <h3 id="qrTitle">भुगतान करें</h3>
        <div id="qrPlace" style="margin:15px 0;"></div>
        <h2 id="qrAmtShow" style="color:var(--p); margin:5px 0;">₹0</h2>
        <p style="font-size:12px; color:#666;">Ayansh Enterprises | SBI Payments</p>
        <button class="btn btn-wa" onclick="waPay()">💬 WhatsApp पर भेजें</button>
        <button class="btn btn-p" onclick="closeQR()">ठीक है / बंद करें</button>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item nav-active" onclick="tab('bill', this)">🛒<span>बिक्री</span></div>
    <div class="nav-item" onclick="tab('khata', this)">📜<span>खाता</span></div>
    <div class="nav-item" onclick="tab('stock', this)">📦<span>स्टॉक</span></div>
</nav>

<script>
    // आपका असली UPI ID सेट कर दिया गया है
    const MY_UPI = "SBIBHIM.INSTANT73331772586360110@sbipay";
    const BIZ_NAME = "Ayansh Enterprises";

    let DB = JSON.parse(localStorage.getItem('ay_final_db')) || { stk: [], sls: [] };
    let tempItems = [];
    let lastUser = null;

    function save() { localStorage.setItem('ay_final_db', JSON.stringify(DB)); }

    function tab(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('page-active'));
        document.getElementById('p-'+p).classList.add('page-active');
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('nav-active'));
        el.classList.add('nav-active');
        if(p === 'khata') loadKhata();
        if(p === 'stock') loadStock();
    }

    // --- बिलिंग ---
    function addList() {
        let n = document.getElementById('iN').value;
        let q = parseFloat(document.getElementById('iQ').value);
        let p = parseFloat(document.getElementById('iP').value);
        if(!n || isNaN(q) || isNaN(p)) return;
        tempItems.push({ n, q, p, t: q*p });
        renderBill();
        document.getElementById('iN').value=""; document.getElementById('iQ').value=""; document.getElementById('iP').value="";
    }

    function renderBill() {
        let h = ""; let tt = 0;
        tempItems.forEach((it, i) => {
            h += `<tr><td>${it.n}</td><td>${it.q}</td><td>${it.t}</td><td onclick="tempItems.splice(${i},1);renderBill()">❌</td></tr>`;
            tt += it.t;
        });
        document.querySelector('#billTable tbody').innerHTML = h;
        document.getElementById('totalShow').innerText = "₹" + tt;
        document.getElementById('billArea').style.display = tt > 0 ? 'block' : 'none';
    }

    function doneSale() {
        let name = document.getElementById('cN').value.trim();
        let mob = document.getElementById('cM').value.trim();
        if(!name) return alert("किसान का नाम जरूरी है!");
        let total = tempItems.reduce((s, i) => s + i.t, 0);

        // स्टॉक कम करना
        tempItems.forEach(bi => {
            let si = DB.stk.find(x => x.n === bi.n);
            if(si) si.q -= bi.q;
        });

        DB.sls.push({ cn: name, cm: mob, amt: total, type: 'उधार', date: new Date().toLocaleDateString() });
        save();
        lastUser = { n: name, m: mob, a: total };
        openQR(total, "बिल भुगतान");
        
        tempItems = []; renderBill();
        document.getElementById('cN').value=""; document.getElementById('cM').value="";
        syncDL();
    }

    // --- पेमेंट QR ---
    function openQR(amt, title) {
        document.getElementById('qrOverlay').style.display = 'flex';
        document.getElementById('qrAmtShow').innerText = "₹" + amt;
        document.getElementById('qrTitle').innerText = title;
        let upiLink = `upi://pay?pa=${MY_UPI}&pn=${BIZ_NAME}&am=${amt}&cu=INR`;
        document.getElementById('qrPlace').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiLink)}" alt="QR">`;
    }

    function closeQR() { document.getElementById('qrOverlay').style.display = 'none'; }

    function waPay() {
        let msg = `नमस्ते ${lastUser.n}, अयांश इंटरप्राइजेज का बिल ₹${lastUser.a} है। कृपया भुगतान करें।`;
        window.open(`https://wa.me/91${lastUser.m}?text=${encodeURIComponent(msg)}`);
    }

    // --- लेजर ---
    function loadKhata() {
        let ledger = {};
        DB.sls.forEach(s => {
            if(!ledger[s.cn]) ledger[s.cn] = { b: 0, m: s.cm };
            ledger[s.cn].b += (s.type === 'उधार' || s.type === 'निकासी') ? s.amt : -s.amt;
        });

        let q = document.getElementById('srch').value.toLowerCase();
        let h = "";
        for(let n in ledger) {
            if(n.toLowerCase().includes(q)) {
                let bal = ledger[n].b;
                h += `<div class="ledger-item ${bal <= 0 ? 'paid' : ''}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div><b>${n}</b><br><small>${bal > 0 ? 'बकाया' : 'चुक्ता'}</small></div>
                        <b style="color:${bal > 0 ? 'var(--d)' : 'var(--ok)'}; font-size:20px;">₹${bal}</b>
                    </div>
                    <div style="display:flex; gap:8px; margin-top:10px;">
                        <button class="btn btn-ok" style="margin:0; flex:1; padding:8px;" onclick="quickPay('${n}', 'जमा')">जमा</button>
                        <button class="btn btn-s" style="margin:0; flex:1; padding:8px;" onclick="quickPay('${n}', 'निकासी')">निकासी</button>
                    </div>
                </div>`;
            }
        }
        document.getElementById('khataList').innerHTML = h || "कोई रिकॉर्ड नहीं";
    }

    function quickPay(name, type) {
        let amt = prompt(`${name} - ${type} राशि दर्ज करें:`);
        if(amt && !isNaN(amt)) {
            DB.sls.push({ cn: name, amt: parseFloat(amt), type: type, date: new Date().toLocaleDateString() });
            save(); loadKhata();
            if(type === 'जमा') {
                lastUser = { n: name, a: amt };
                openQR(amt, "पैसे जमा करें");
            }
        }
    }

    // --- स्टॉक ---
    function addStock() {
        let n = document.getElementById('sN').value;
        let q = parseFloat(document.getElementById('sQ').value);
        let r = parseFloat(document.getElementById('sR').value);
        if(!n || isNaN(q)) return;
        let it = DB.stk.find(x => x.n === n);
        if(it) { it.q += q; it.r = r; } else { DB.stk.push({n, q, r}); }
        save(); loadStock(); syncDL();
        document.getElementById('sN').value=""; document.getElementById('sQ').value=""; document.getElementById('sR').value="";
    }

    function loadStock() {
        let h = ""; DB.stk.forEach(s => h += `<tr><td>${s.n}</td><td>${s.q}</td><td>${s.r}</td></tr>`);
        document.querySelector('#stTable tbody').innerHTML = h;
    }

    function syncDL() {
        let h = ""; DB.stk.forEach(s => h += `<option value="${s.n}">`);
        document.getElementById('stkData').innerHTML = h;
    }

    function getPrice(v) {
        let it = DB.stk.find(x => x.n === v);
        if(it) document.getElementById('iP').value = it.r;
    }

    window.onload = () => { syncDL(); loadStock(); };
</script>
</body>
</html>
