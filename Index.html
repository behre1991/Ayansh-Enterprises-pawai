<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>अयांश व्यापार V97 | रोहित भाई</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --p: #0052cc; --s: #ff8c00; --d: #d32f2f; --c: #2e7d32; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .page { display: none; padding: 12px; max-width: 600px; margin: auto; }
        .active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 12px; border: 1px solid #ddd; }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; color: white; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: var(--s); } .btn-sale { background: var(--d); } .btn-rec { background: var(--c); }
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; border-top: 2px solid #ddd; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 11px; cursor: pointer; }
        .nav-active { color: var(--p); font-weight: bold; border-top: 4px solid var(--p); }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        #printArea { display:none; background:white; padding:20px; border:1px solid #000; font-family:monospace; }
        @media print { body * { visibility: hidden; } #printArea, #printArea * { visibility: visible; } #printArea { position: absolute; left: 0; top: 0; width: 100%; display: block; } }
    </style>
</head>
<body onload="checkLock()">

<div id="lock" style="position:fixed; inset:0; background:var(--p); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; color:white;">
    <h2>अयांश व्यापार V97 🔒</h2>
    <input type="password" id="pInp" placeholder="पासवर्ड (1234)" style="max-width:300px; text-align:center; height:50px; border-radius:10px; color:black;">
    <button class="btn" style="background:var(--s); max-width:300px;" onclick="unlock()">लॉगिन</button>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <div style="line-height:1.2"><b id="hName">दुकान</b><br><small id="hMobDisplay"></small></div>
        <span onclick="tab('set')" style="cursor:pointer; font-size:22px;">⚙️</span>
    </div>

    <div id="pg-home" class="page active">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <div class="card" style="flex:1; background:var(--d); color:white; border:none; text-align:center;">कुल उधार<br><b id="totOut">₹0</b></div>
            <div class="card" style="flex:1; background:var(--c); color:white; border:none; text-align:center;">आज जमा<br><b id="totIn">₹0</b></div>
        </div>
        <input type="text" id="srch" placeholder="किसान का नाम खोजें..." onkeyup="rHome()">
        <div id="pList" style="margin-top:10px;"></div>
    </div>

    <div id="pg-bill" class="page">
        <div class="card">
            <input type="text" id="pN" placeholder="किसान का नाम" list="pTips">
            <input type="number" id="pM" placeholder="किसान का मोबाइल">
        </div>
        <div class="card" style="border: 2px solid var(--s);">
            <h4 style="margin:0;">🛒 सामान जोड़ें (Multi-Item)</h4>
            <input type="text" id="iN" placeholder="सामान का नाम">
            <div style="display:flex; gap:8px;">
                <input type="number" id="iP" placeholder="रेट ₹">
                <input type="number" id="iQ" placeholder="मात्रा" value="1">
            </div>
            <button class="btn btn-add" onclick="addToCart()">+ लिस्ट में जोड़ें</button>
            <div id="cartArea" style="margin-top:10px; border-top:1px dashed #ccc;"></div>
            <h3 id="cartTotal" style="text-align:right; margin:10px 0;">कुल: ₹0</h3>
            <button class="btn btn-sale" onclick="saveBill()">💾 उधार बिल सेव और प्रिंट</button>
        </div>
        <div class="card" style="border: 2px solid var(--c);">
            <h4>💰 पैसा जमा (Cash)</h4>
            <input type="number" id="pAmt" placeholder="रकम ₹">
            <button class="btn btn-rec" onclick="savePayment()">✅ जमा रसीद</button>
        </div>
    </div>

    <div id="pg-set" class="page">
        <div class="card">
            <h4>⚙️ दुकान/प्रोफाइल सेटिंग</h4>
            <label>दुकान का नाम:</label><input type="text" id="cfgN">
            <label>दुकानदार का मोबाइल (आपका):</label><input type="text" id="cfgM" placeholder="अपना नंबर डालें">
            <label>GST नंबर (यदि है):</label><input type="text" id="cfgG">
            <label>लॉगिन पासवर्ड:</label><input type="password" id="cfgP">
            <button class="btn" style="background:var(--p);" onclick="saveCfg()">सेटिंग सेव करें</button>
        </div>
        <button class="btn" style="background:#444;" onclick="exportExcel()">📊 पूरी एक्सेल रिपोर्ट</button>
        <button class="btn" style="background:#00796b;" onclick="downloadBackup()">📥 डेटा बैकअप फाइल</button>
        <div class="card" style="background:#fff3e0; margin-top:15px;">
            <h4 style="margin:0;">🚀 सॉफ्टवेयर अपडेट</h4>
            <textarea id="updC" rows="3" placeholder="नया कोड यहाँ पेस्ट करें..."></textarea>
            <button class="btn btn-add" onclick="runUpdate()">अपडेट लागू करें</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item nav-active" onclick="tab('home', this)">🏠<span>होम</span></div>
        <div class="nav-item" onclick="tab('bill', this)">📝<span>बिल/जमा</span></div>
        <div class="nav-item" onclick="tab('set', this)">⚙️<span>सेटिंग</span></div>
    </nav>
</div>

<div id="modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; display:none; flex-direction:column; padding:15px;">
    <div style="background:white; border-radius:15px; padding:20px; flex:1; overflow-y:auto;">
        <h2 id="mName" style="margin:0;">किसान</h2>
        <div id="mBal" style="font-size:26px; font-weight:bold; color:var(--d);">₹0</div>
        <button class="btn" style="background:var(--c); margin-bottom:10px;" id="waLedgerBtn">📲 WhatsApp हिसाब भेजें</button>
        <hr><div id="mHistory"></div>
        <button class="btn" style="background:#ccc; color:black; margin-top:20px;" onclick="document.getElementById('modal').style.display='none'">बंद करें</button>
    </div>
</div>

<div id="printArea">
    <center><h2 id="prDukan"></h2><p id="prMob"></p></center>
    <hr><p><b>किसान:</b> <span id="prKisan"></span></p>
    <p><b>तारीख:</b> <span id="prDate"></span></p><hr>
    <div id="prItems"></div><hr>
    <h3 style="text-align:right;">कुल: ₹<span id="prTotal"></span></h3>
</div>

<datalist id="pTips"></datalist>

<script>
    const K = "VYAPAR_V94_ROHIT"; // वही ID ताकि V94 का डेटा इसमें खुल जाए
    let DB = JSON.parse(localStorage.getItem(K)) || { cfg:{n:"अयांश कृषि", p:"1234", m:"", g:""}, tx:[] };
    let cart = [];

    function unlock() {
        if(document.getElementById('pInp').value === DB.cfg.p || document.getElementById('pInp').value === "1234") {
            document.getElementById('lock').style.display='none'; document.getElementById('app').style.display='block'; init();
        } else alert("गलत पासवर्ड!");
    }

    function init() { 
        document.getElementById('hName').innerText = DB.cfg.n; 
        document.getElementById('hMobDisplay').innerText = DB.cfg.m ? "📞 " + DB.cfg.m : "";
        document.getElementById('cfgN').value = DB.cfg.n;
        document.getElementById('cfgM').value = DB.cfg.m;
        document.getElementById('cfgG').value = DB.cfg.g;
        rHome(); 
    }

    function tab(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById('pg-'+p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('nav-active'));
        if(el) el.classList.add('nav-active');
    }

    function addToCart() {
        const n = document.getElementById('iN').value, p = parseFloat(document.getElementById('iP').value), q = parseFloat(document.getElementById('iQ').value);
        if(!n || isNaN(p)) return alert("नाम और रेट भरें!");
        cart.push({n, p, q, t:p*q}); 
        renderCart();
        document.getElementById('iN').value=""; document.getElementById('iP').value="";
    }

    function renderCart() {
        let h = ""; let tt = 0;
        cart.forEach((i, idx) => { h += `<div class="item-row"><span>${i.n} (${i.q}x${i.p})</span><b>₹${i.t} <span onclick="cart.splice(${idx},1);renderCart()" style="color:red">✖</span></b></div>`; tt += i.t; });
        document.getElementById('cartArea').innerHTML = h; document.getElementById('cartTotal').innerText = "कुल: ₹"+tt;
    }

    function saveBill() {
        const n = document.getElementById('pN').value, m = document.getElementById('pM').value;
        if(!n || cart.length==0) return alert("नाम और सामान जोड़ें!");
        const tt = cart.reduce((s,i)=>s+i.t, 0);
        const tx = { id:Date.now(), name:n, phone:m, amt:tt, type:'sale', date:new Date().toLocaleString(), items:[...cart] };
        DB.tx.push(tx); save();
        doPrint(tx);
        location.reload();
    }

    function savePayment() {
        const n = document.getElementById('pN').value, a = parseFloat(document.getElementById('pAmt').value);
        if(!n || isNaN(a)) return alert("नाम और रकम भरें!");
        DB.tx.push({ id:Date.now(), name:n, amt:a, type:'rec', date:new Date().toLocaleString() });
        save(); alert("जमा हुआ!"); location.reload();
    }

    function doPrint(tx) {
        document.getElementById('prDukan').innerText = DB.cfg.n;
        document.getElementById('prMob').innerText = "📞 " + DB.cfg.m;
        document.getElementById('prKisan').innerText = tx.name;
        document.getElementById('prDate').innerText = tx.date;
        document.getElementById('prTotal').innerText = tx.amt;
        let itms = ""; tx.items.forEach(i => itms += `<div class="item-row"><span>${i.n} (${i.q}x${i.p})</span><span>₹${i.t}</span></div>`);
        document.getElementById('prItems').innerHTML = itms;
        window.print();
    }

    function rHome() {
        const q = document.getElementById('srch').value.toLowerCase();
        const l = {}; let tOut = 0; let tIn = 0;
        DB.tx.forEach(t => { if(!l[t.name]) l[t.name] = {bal:0, mob:t.phone}; l[t.name].bal += (t.type==='sale'?t.amt:-t.amt); });
        let h = ""; Object.keys(l).sort().forEach(n => {
            if(n.toLowerCase().includes(q)) {
                if(l[n].bal>0) tOut += l[n].bal;
                h += `<div class="card" onclick="oM('${n}')" style="display:flex; justify-content:space-between;"><b>${n}</b><b style="color:${l[n].bal>0?'red':'green'}">₹${l[n].bal}</b></div>`;
            }
        });
        document.getElementById('pList').innerHTML = h;
        document.getElementById('totOut').innerText = "₹"+tOut;
        document.getElementById('pTips').innerHTML = [...new Set(DB.tx.map(t=>t.name))].map(n=>`<option value="${n}">`).join('');
    }

    function oM(n) {
        document.getElementById('mName').innerText = n;
        const txs = DB.tx.filter(t => t.name === n);
        const b = txs.reduce((s,t)=>s+(t.type==='sale'?t.amt:-t.amt),0);
        document.getElementById('mBal').innerText = "बकाया: ₹"+b;
        document.getElementById('waLedgerBtn').onclick = () => {
            let msg = `*${DB.cfg.n}*\nकिसान: ${n}\nकुल बकाया: ₹${b}\n\n*विवरण:*\n`;
            txs.slice(-5).forEach(t => msg += `${t.date.split(',')[0]} - ₹${t.amt} (${t.type==='sale'?'उधार':'जमा'})\n`);
            window.open(`https://wa.me/91${txs[txs.length-1].phone}?text=${encodeURIComponent(msg)}`);
        };
        let h = ""; txs.reverse().forEach(t => {
            h += `<div style="border-bottom:1px solid #eee; padding:10px 0;">
                <div style="display:flex; justify-content:space-between;"><span>${t.date}</span><b>₹${t.amt} (${t.type==='sale'?'उधार':'जमा'})</b></div>
                <button onclick="delTx(${t.id})" style="color:red; border:none; background:none; font-size:12px;">❌ डिलीट</button>
            </div>`;
        });
        document.getElementById('mHistory').innerHTML = h; document.getElementById('modal').style.display='flex';
    }

    function delTx(id) { if(confirm("डिलीट करें?")) { DB.tx = DB.tx.filter(t => t.id !== id); save(); location.reload(); } }
    function saveCfg() { 
        DB.cfg.n = document.getElementById('cfgN').value; 
        DB.cfg.m = document.getElementById('cfgM').value; 
        DB.cfg.g = document.getElementById('cfgG').value; 
        if(document.getElementById('cfgP').value) DB.cfg.p = document.getElementById('cfgP').value; 
        save(); alert("सेटिंग सेव हुई!"); location.reload();
    }
    function save() { localStorage.setItem(K, JSON.stringify(DB)); }
    function runUpdate() { const c = document.getElementById('updC').value; if(c.includes("<html")) { document.open(); document.write(c); document.close(); } }
    function downloadBackup() { const blob = new Blob([JSON.stringify(DB)], {type:"application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Ayansh_Backup.json"; a.click(); }
    function exportExcel() {
        const data = DB.tx.map(t => ({ "تारीख": t.date, "किसान": t.name, "मोबाइल": t.phone||'-', "प्रकार": t.type==='sale'?'उधार':'जमा', "रकम": t.amt }));
        const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Report"); XLSX.writeFile(wb, "Report.xlsx");
    }
</script>
</body>
</html>
