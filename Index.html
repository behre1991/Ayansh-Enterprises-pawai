<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>आयांश एंटरप्राइजेज</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; padding: 20px; }
        .layer { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 15px; border-left: 6px solid #2e7d32; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #2e7d32; font-size: 1.2rem; margin-top: 0; }
        input, button { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: #2e7d32; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="text-align:center;">आयांश एंटरप्राइजेज</h1>
    
    <div class="layer">
        <h2>⚙️ 1. सेटिंग (प्रोफाइल और अपडेट)</h2>
        <input type="password" id="pass" placeholder="पासवर्ड (1234)">
        <input type="text" placeholder="दुकान नाम / GST / QR कोड डेटा">
        <button onclick="checkUpdate()">🔄 ऐप अपडेट चेक करें (सीक्रेट कोड)</button>
        <button>गूगल शीट सिंक</button>
    </div>

    <div class="layer">
        <h2>🧾 2. बिलिंग (असीमित)</h2>
        <div id="billingArea">
            <input type="text" placeholder="सामान का नाम">
            <input type="number" placeholder="मात्रा">
            <button style="background: #d32f2f;" onclick="this.parentElement.remove()">❌ डिलीट एंट्री</button>
        </div>
        <button onclick="addMore()">+ नया सामान जोड़ें</button>
        <button>नकद/उधार सुरक्षित करें</button>
    </div>

    <div class="layer">
        <h2>📒 3. खाता (हिस्ट्री फोल्डर)</h2>
        <input type="text" placeholder="नाम सर्च करें (पूरी हिस्ट्री यहाँ आएगी)">
        <button>👥 ग्राहक खाता</button>
        <button>🚚 डिस्ट्रीब्यूटर खाता</button>
        <button style="background: #ffa000;">📸 पेमेंट रसीद/फोटो</button>
    </div>

    <div class="layer">
        <h2>📦 4. स्टॉक & 📥 5. आवक</h2>
        <p>आवक में एंट्री करते ही स्टॉक अपने आप बढ़ जाएगा</p>
        <input type="text" placeholder="आवक: सामान नाम">
        <input type="number" placeholder="आवक: मात्रा (स्टॉक में प्लस)">
        <button onclick="alert('स्टॉक अपडेटेड')">स्टॉक में जोड़ें</button>
    </div>

    <script>
        // ऐप अपडेट लॉजिक
        function checkUpdate() {
            let code = prompt("अपडेट के लिए कोड डालें:");
            if(code === "update2026") { alert("ऐप अपडेट हो गया!"); } 
            else { alert("गलत कोड!"); }
        }
        
        // बिलिंग में नई एंट्री का लॉजिक
        function addMore() {
            const div = document.createElement('div');
            div.innerHTML = `<input type="text" placeholder="नया सामान"><input type="number" placeholder="मात्रा"><button style="background:#d32f2f;" onclick="this.parentElement.remove()">❌</button>`;
            document.getElementById('billingArea').appendChild(div);
        }
    </script>
</body>
</html>
