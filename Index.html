<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>स्मार्ट शॉप हेयर</title>
    <style>
        :root { --main: #1a5f7a; --sec: #27ae60; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }

        /* 1. पिन डालने वाली मुख्य स्क्रीन (Login Page) */
        #loginPage { 
            position: fixed; inset: 0; background: var(--main); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999; color: white;
        }
        .login-container { 
            background: white; padding: 40px 20px; border-radius: 20px; 
            width: 85%; max-width: 350px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
        }
        .login-container h1 { color: var(--main); margin-bottom: 5px; font-size: 24px; }
        .login-container p { color: #666; margin-bottom: 25px; font-size: 14px; }
        
        /* पिन इनपुट बॉक्स - यहाँ पिन डालें */
        .pin-input { 
            width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; 
            font-size: 28px; text-align: center; letter-spacing: 15px; outline: none; 
            box-sizing: border-box; color: var(--main); transition: 0.3s;
        }
        .pin-input:focus { border-color: var(--sec); }
        .btn-login { 
            background: var(--sec); color: white; border: none; padding: 15px; 
            width: 100%; border-radius: 12px; margin-top: 20px; font-size: 18px; font-weight: bold; cursor: pointer;
        }

        /* 2. मुख्य ऐप का हिस्सा */
        #mainApp { display: none; }
        header { background: var(--main); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo-box { width: 45px; height: 45px; background: #fff; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--main); border: 2px solid #fff; }

        /* प्रोफाइल मेन्यू (8 पॉइंट्स) */
        #profileMenu { display: none; position: fixed; top: 70px; right: 10px; background: white; width: 270px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); z-index: 2000; overflow: hidden; }
        .menu-btn { width: 100%; padding: 14px; border: none; border-bottom: 1px solid #eee; text-align: left; background: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; }

        /* पेज और फॉर्म */
        .page { display: none; padding: 15px; padding-bottom: 160px; }
        .active-page { display: block !important; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 14px; }

        /* 5 मुख्य नेविगेशन बटन */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 75px; z-index: 1000; }
        nav button { flex: 1; border: none; background: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #777; cursor: pointer; }
        nav button.nav-active { color: var(--main); font-weight: bold; border-top: 4px solid var(--main); }

        /* बॉटम टोटल बार */
        .bottom-bar { position: fixed; bottom: 75px; width: 100%; background: white; border-top: 2px solid var(--main); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .btn-add { background: var(--sec); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

<div id="loginPage">
    <div class="login-container">
        <h1>स्मार्ट शॉप हेयर</h1>
        <p>प्रवेश करने के लिए पिन दर्ज करें</p>
        <input type="password" id="pinInput" class="pin-input" maxlength="4" placeholder="****">
        <button class="btn-login" onclick="checkPin()">प्रवेश करें</button>
        <p id="errorMsg" style="color:red; margin-top:10px; display:none;">गलत पिन! (सही पिन: 1234)</p>
    </div>
</div>

<div id="mainApp">
    <header>
        <div class="logo-box" onclick="toggleMenu()">S</div>
        <b>स्मार्ट शॉप हेयर</b>
        <span style="font-size:12px;">19/04/2026</span>
    </header>

    <div id="profileMenu">
        <button class="menu-btn">⚙️ शॉप सेटिंग (लोगो/QR)</button>
        <button class="menu-btn">📁 विभाग मास्टर (खाद/बीज)</button>
        <button class="menu-btn">👥 स्टाफ मास्टर (KYC)</button>
        <button class="menu-btn">📊 विस्तृत रिपोर्ट (GST/Date)</button>
        <button class="menu-btn">✏️ सुधार सिस्टम (Edit)</button>
        <button class="menu-btn">🔐 सुरक्षा (मास्टर पिन)</button>
        <button class="menu-btn">🌐 भाषा और वॉइस</button>
        <button class="menu-btn" onclick="alert('सपोर्ट: help@smartshop.com')">🆘 सपोर्ट सिस्टम (Help)</button>
    </div>

    <div id="billing" class="page active-page">
        <div class="card">
            <input type="text" id="cName" placeholder="ग्राहक का नाम">
            <div class="grid" style="margin-top:10px;">
                <input type="number" id="cMob" placeholder="मोबाइल">
                <input type="text" id="cAddr" placeholder="पता">
            </div>
        </div>
        <div class="card">
            <div class="grid">
                <select id="dept"><option>विभाग चुनें</option><option>खाद</option><option>बीज</option><option>दवाई</option></select>
                <input type="text" id="item" placeholder="सामान का नाम">
            </div>
            <div class="grid">
                <input type="number" id="qty" placeholder="मात्रा">
                <input type="number" id="rate" placeholder="रेट">
            </div>
            <button class="btn-add" onclick="addItem()">+ सामान जोड़ें (कॉलम खाली करें)</button>
        </div>
        <div id="billList" class="card" style="display:none;">
            <table style="width:100%; font-size:13px; border-collapse:collapse;">
                <thead style="background:#eee;"><tr><th style="padding:5px;">नाम</th><th>कुल</th></tr></thead>
                <tbody id="billBody"></tbody>
            </table>
        </div>
        <div class="bottom-bar">
            <b id="totalTxt">योग: ₹0</b>
            <button class="btn-add" style="width:auto; padding:8px 20px; background:var(--main);" onclick="save()">सेव करें</button>
        </div>
    </div>

    <div id="inward" class="page">
        <div class="card">
            <h4>🚚 सप्लायर विवरण</h4>
            <input type="text" placeholder="सप्लायर का नाम">
            <div class="grid" style="margin-top:10px;">
                <input type="text" placeholder="GST नंबर">
                <input type="text" placeholder="बिल नंबर">
            </div>
        </div>
        <div class="card">
            <h4>📦 दवाई स्टॉक डिटेल</h4>
            <div class="grid">
                <input type="text" placeholder="पैकिंग साइज">
                <input type="text" placeholder="बैच नंबर">
            </div>
            <div class="grid">
                <label style="font-size:11px;">MFG: <input type="date"></label>
                <label style="font-size:11px;">EXP: <input type="date"></label>
            </div>
            <div class="grid">
                <input type="number" placeholder="खरीद रेट">
                <input type="number" placeholder="MRP">
            </div>
            <button class="btn-add" style="background:var(--main)">स्टॉक में जमा करें</button>
        </div>
    </div>

    <div id="khata" class="page"><div class="card">📖 खाता: यहाँ हिसाब दिखेगा।</div></div>
    <div id="stock" class="page"><div class="card">📦 स्टॉक: दवाई लिस्ट यहाँ है।</div></div>
    <div id="expense" class="page"><div class="card">🏪 खर्च: दुकान का खर्चा यहाँ जोड़ें।</div></div>

    <nav>
        <button onclick="go('billing', this)" class="nav-active">📄 बिलिंग</button>
        <button onclick="go('khata', this)">📖 खाता</button>
        <button onclick="go('stock', this)">📦 स्टॉक</button>
        <button onclick="go('inward', this)">🚚 आवक</button>
        <button onclick="go('expense', this)">🏪 खर्च</button>
    </nav>
</div>

<script>
    let grandTotal = 0;

    // पिन चेक फंक्शन
    function checkPin() {
        const pin = document.getElementById('pinInput').value;
        if(pin === "1234") {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else {
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('pinInput').value = "";
        }
    }

    // नेविगेशन
    function go(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
        btn.classList.add('nav-active');
        document.getElementById('profileMenu').style.display = 'none';
    }

    // मेन्यू टॉगल
    function toggleMenu() {
        const m = document.getElementById('profileMenu');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    // सामान जोड़ना
    function addItem() {
        const item = document.getElementById('item').value;
        const q = document.getElementById('qty').value;
        const r = document.getElementById('rate').value;
        if(!item || !q || !r) return;

        const sub = q * r;
        grandTotal += sub;
        document.getElementById('billList').style.display = 'block';
        document.getElementById('billBody').innerHTML += `<tr><td style="padding:5px; border-bottom:1px solid #eee;">${item}</td><td style="border-bottom:1px solid #eee;">₹${sub}</td></tr>`;
        document.getElementById('totalTxt').innerText = "योग: ₹" + grandTotal;

        // कॉलम खाली करना
        document.getElementById('dept').selectedIndex = 0;
        document.getElementById('item').value = "";
        document.getElementById('qty').value = "";
        document.getElementById('rate').value = "";
    }

    function save() {
        alert("बिल सुरक्षित किया गया!");
        location.reload();
    }
</script>

</body>
</html>
