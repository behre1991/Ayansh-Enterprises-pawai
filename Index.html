<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>अयांश व्यापार V111 | रोहित भाई</title>
    <style>
        :root { --p: #0052cc; --s: #ff8c00; --d: #d32f2f; --c: #2e7d32; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        .header { background: var(--p); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo-box { width: 45px; height: 45px; border-radius: 50%; background: white; border: 2px solid var(--s); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .page { display: none; padding: 12px; max-width: 600px; margin: auto; }
        .active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 12px; border: 1px solid #ddd; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 13px; text-decoration: none; }
        .btn-add { background: var(--s); width: 100%; margin-top: 10px; padding: 14px; font-size: 15px; }
        .btn-sale { background: var(--p); width: 100%; margin-top: 10px; padding: 15px; font-size: 16px; }
        .btn-pay { background: var(--c); flex: 1; } 
        .btn-wa { background: #25D366; flex: 1; }
        .btn-prn { background: #555; flex: 1; }
        .btn-del { background: var(--d); padding: 8px; width: auto; flex: 0.2; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; border-top: 2px solid #ddd; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 11px; cursor: pointer; }
        .nav-active { color: var(--p); font-weight: bold; border-top: 5px solid var(--p); background: #f8faff; }
        .ledger-row { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dotted #ccc; font-size: 14px; }
        #printArea { display:none; background:white; padding:20px; font-family:monospace; }
        @media print { body * { visibility: hidden; } #printArea, #printArea * { visibility: visible; } #printArea { display: block; position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body onload="checkLock()">

<div id="lock" style="position:fixed; inset:0; background:var(--p); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; color:white;">
    <h2>अयांश व्यापार V111</h2>
    <p>रोहित भाई, स्वागत है!</p>
    <input type="password" id="pInp" placeholder="पासवर्ड डालें" style="max-width:300px; text-align:center; height:50px; border-radius:10px; color:black;">
    <button class="btn btn-add" style="max-width:300px;" onclick="unlock()">प्रवेश करें</button>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="logo-box"><img id="hLogo" src=""></div>
            <div><b id="hName">दुकान</b><br><small id="hMobDisplay" style="font-size:10px; opacity:0.8;"></small></div>
        </div>
        <span onclick="tab('set')" style="cursor:pointer; font-size:22px;">⚙️</span>
    </div>

    <div id="pg-home" class="page active">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <div class="card" style="flex:1; background:var(--d); color:white; border:none; text-align:center;">कुल उधारी<br><b id="totOut">₹0</b></div>
            <div class="card" style="flex:1; background:var(--c); color:white; border:none; text-align:center;">आज जमा<br><b id="totIn">₹0</b></div>
        </div>
        <input type="text" id="srch" placeholder="किसान का नाम खोजें..." onkeyup="renderHome()">
        <div id="pList" style="margin-top:10px;"></div>
    </div>

    <div id="pg-bill" class="page">
        <div class="card">
            <h4>👤 किसान</h4>
            <input type="text" id="pN" placeholder="किसान का नाम" list="pTips">
            <input type="number" id="pM" placeholder="WhatsApp नंबर">
        </div>
        <div class="card" style="border: 2px solid var(--s);">
            <h4 style="color:var(--s); margin:0;">🛒 सामान जोड़ें</h4>
            <select id="stockSel" onchange="fillStockItem()"><option value="">स्टॉक से चुनें...</option></select>
            <input type="text" id="iN" placeholder="सामान का नाम">
            <div style="display:flex; gap:8px;">
                <input type="number" id="iP" placeholder="रेट ₹">
                <input type="number" id="iQ" placeholder="मात्रा" value="1">
            </div>
            <button class="btn btn-add" onclick="addToCart()">+ लिस्ट में जोड़ें</button>
            <div id="cartArea" style="margin-top:12px; border-top:1px dashed #ccc;"></div>
            <h3 id="cartTotal" style="text-align:right;">कुल: ₹0</h3>
            <hr>
            <button class="btn btn-sale" id="saveBillBtn" onclick="saveBill()">💾 1. बिल सेव करें</button>
            <div id="afterSaveActions" style="display:none; gap:8px; margin-top:10px;">
                <button class="btn btn-prn" onclick="window.print()">🖨️ 2. प्रिंट</button>
                <button class="btn btn-wa" id="waBtn">📲 3. WhatsApp</button>
            </div>
            <button class="btn" id="newBillBtn" style="display:none; background:#888; width:100%; margin-top:10px;" onclick="location.reload()">🔄 अगला नया बिल</button>
        </div>
        <div class="card" style="border: 2px solid var(--c);">
            <h4>💰 नगद जमा</h4>
            <input type="number" id="pAmt" placeholder="जमा राशि ₹">
            <button class="btn btn-pay" style="width:100%; padding:15px; margin-top:10px;" onclick="savePayment()">✅ जमा करें</button>
        </div>
    </div>

    <div id="pg-ledger" class="page">
        <button class="btn" style="background:#555; margin-bottom:10px; width:100px;" onclick="tab('home')">⬅ वापस</button>
        <div class="card">
            <h3 id="ldName" style="margin:0;">नाम</h3>
            <p id="ldMob" style="color:#666; font-size:14px; margin:5px 0;"></p>
            <hr>
            <div id="ledgerContent"></div>
            <h3 id="ldTotal" style="text-align:right; color:var(--d);">कुल बकाया: ₹0</h3>
        </div>
    </div>

    <div id="pg-stock" class="page">
        <div class="card"><h4>📦 स्टॉक</h4><input type="text" id="sN" placeholder="सामान"><input type="number" id="sQ" placeholder="मात्रा"><input type="number" id="sR" placeholder="रेट"><button class="btn btn-add" onclick="addStock()">स्टॉक में जोड़ें</button></div>
        <div id="stockList"></div>
    </div>

    <div id="pg-set" class="page">
        <div class="card"><h4>⚙️ सेटिंग</h4><input type="text" id="cfgN" placeholder="दुकान का नाम"><input type="text" id="cfgM" placeholder="मोबाइल"><input type="password" id="cfgP" placeholder="पासवर्ड बदलें"><button class="btn btn-sale" onclick="saveCfg()">सेव करें</button></div>
        <div class="card" style="border:1px dashed red;"><textarea id="updC" rows="2" placeholder="अपडेट कोड यहाँ डालें..."></textarea><button class="btn btn-sale" onclick="runUpdate()">🚀 अपडेट सॉफ्टवेयर</button></div>
    </div>

    <nav class="nav">
        <div class="nav-item nav-active" onclick="tab('home', this)">🏠<span>होम</span></div>
        <div class="nav-item" onclick="tab('bill', this)">📝<span>बिलिंग</span></div>
        <div class="nav-item" onclick="tab('stock', this)">📦<span>स्टॉक</span></div>
        <div class="nav-item" onclick="tab('set', this)">⚙️<span>सेटिंग</span></div>
    </nav>
</div>

<div id="printArea"><center><h2 id="prDukan"></h2><p id="prMob"></p></center><hr><p>किसान: <b id="prKisan"></b> | <span id="prDate"></span></p><hr><div id="prItems"></div><hr><h3 style="text-align:right;">कुल: ₹<span id="prTotal"></span></h3></div>
<datalist id="pTips"></datalist>

<script>
    const K = "VYAPAR_V94_ROHIT";
    const UPD_K = "VYAPAR_LIVE_CODE";
    
    // अपडेट सिस्टम (पुराने डेटा को नहीं छेड़ता)
    if(localStorage.getItem(UPD_K) && !window.alreadyUpdated){
        window.alreadyUpdated = true;
        document.open(); document.write(localStorage.getItem(UPD_K)); document.close();
    }

    let DB = JSON.parse(localStorage.getItem(K)) || { cfg:{n:"अयांश कृषि", p:"1234", m:"", l:""}, tx:[], stock:[] };
    let cart = [];

    function unlock() {
        if(document.getElementById('pInp').value === DB.cfg.p || document.getElementById('pInp').value === "1234") {
            document.getElementById('lock').style.display='none'; document.getElementById('app').style.display='block'; init();
        } else alert("गलत पासवर्ड!");
    }

    function init() {
        document.getElementById('hName').innerText = DB.cfg.n;
        document.getElementById('hMobDisplay').innerText = DB.cfg.m;
        document.getElementById('cfgN').value = DB.cfg.n;
        document.getElementById('cfgM').value = DB.cfg.m;
        renderHome(); renderStock(); updateStockDrop();
    }

    function tab(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById('pg-'+p).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
            el.classList.add('nav-active');
        }
    }

    function renderHome() {
        const q = document.getElementById('srch').value.toLowerCase();
        const summary = {}; const phones = {}; let tO = 0; let tI = 0;
        const today = new Date().toLocaleDateString();

        DB.tx.forEach(t => { 
            if(!summary[t.name]) summary[t.name] = 0; 
            summary[t.name] += (t.type==='sale'?t.amt:-t.amt);
            if(t.phone) phones[t.name] = t.phone;
            if(t.type==='rec' && t.date.includes(today)) tI += t.amt;
        });

        let h = ""; 
        Object.keys(summary).sort().forEach(n => {
            let bal = summary[n];
            if(n.toLowerCase().includes(q) && bal !== 0) {
                if(bal > 0) tO += bal;
                let pNo = phones[n] || "";
                h += `<div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;" onclick="openLedger('${n}')">
                        <div><b>${n}</b><br><small style="color:${bal>0?'red':'green'}">बकाया: ₹${bal}</small></div>
                        <button class="btn btn-del" onclick="event.stopPropagation(); deleteKisan('${n}')">🗑️</button>
                    </div>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <button class="btn btn-pay" onclick="quickAction('${n}', 'pay')">➕ जमा</button>
                        <button class="btn btn-wa" onclick="sendWhatsAppSummary('${n}', '${bal}', '${pNo}')">📲 WhatsApp</button>
                    </div>
                </div>`;
            }
        });
        document.getElementById('pList').innerHTML = h || "<center>कोई हिसाब नहीं</center>";
        document.getElementById('totOut').innerText = "₹"+tO;
        document.getElementById('totIn').innerText = "₹"+tI;
        document.getElementById('pTips').innerHTML = [...new Set(DB.tx.map(t=>t.name))].map(n=>`<option value="${n}">`).join('');
    }

    function openLedger(name) {
        tab('ledger');
        document.getElementById('ldName').innerText = name;
        let h = ""; let bal = 0; let lastMob = "";
        DB.tx.filter(t => t.name === name).forEach(t => {
            if(t.phone) lastMob = t.phone;
            bal += (t.type==='sale'?t.amt:-t.amt);
            let items = t.itms ? t.itms.map(i => `${i.n}(${i.q})`).join(', ') : 'नगद जमा';
            h += `<div class="ledger-row">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${t.date.split(',')[0]}</b>
                        <span style="color:${t.type==='sale'?'red':'green'}">${t.type==='sale'?'+':'-'}₹${t.amt}</span>
                    </div>
                    <div style="font-size:11px; color:#555;">${items}</div>
                  </div>`;
        });
        document.getElementById('ldMob').innerText = "📞 " + lastMob;
        document.getElementById('ldTotal').innerText = "कुल बकाया: ₹" + bal;
        document.getElementById('ledgerContent').innerHTML = h;
    }

    function sendWhatsAppSummary(name, bal, phone) {
        if(!phone) phone = prompt("नंबर डालें:");
        if(phone) window.open(`https://wa.me/91${phone}?text=${encodeURIComponent("*"+DB.cfg.n+"*\nकिसान: "+name+"\nबकाया: ₹"+bal)}`);
    }

    function quickAction(name, type) { tab('bill'); document.getElementById('pN').value = name; document.getElementById('pAmt').focus(); }
    function deleteKisan(name) { if(confirm(name + " का हिसाब हटा दें?")) { DB.tx = DB.tx.filter(t => t.name !== name); save(); renderHome(); } }

    function addToCart() {
        const n = document.getElementById('iN').value, p = parseFloat(document.getElementById('iP').value), q = parseFloat(document.getElementById('iQ').value);
        if(!n || isNaN(p)) return;
        cart.push({ n, p, q, t:p*q });
        renderCart();
        document.getElementById('iN').value=""; document.getElementById('iP').value="";
    }

    function renderCart() {
        let h = ""; let tt = 0;
        cart.forEach((i, idx) => { h += `<div class="item-row"><span>${i.n}(${i.q}x${i.p})</span><b>₹${i.t}</b></div>`; tt += i.t; });
        document.getElementById('cartArea').innerHTML = h; document.getElementById('cartTotal').innerText = "कुल: ₹"+tt;
    }

    function saveBill() {
        const n = document.getElementById('pN').value, m = document.getElementById('pM').value;
        if(!n || cart.length === 0) return alert("विवरण भरें!");
        const tt = cart.reduce((s,i)=>s+i.t, 0);
        DB.tx.push({ id:Date.now(), name:n, phone:m, amt:tt, type:'sale', date:new Date().toLocaleString(), itms:[...cart] });
        save();
        document.getElementById('saveBillBtn').style.display = "none";
        document.getElementById('afterSaveActions').style.display = "flex";
        document.getElementById('newBillBtn').style.display = "block";
        document.getElementById('prDukan').innerText = DB.cfg.n;
        document.getElementById('prKisan').innerText = n;
        document.getElementById('prTotal').innerText = tt;
        document.getElementById('waBtn').onclick = () => window.open(`https://wa.me/91${m}?text=${encodeURIComponent("बिल राशि: ₹"+tt)}`);
    }

    function savePayment() {
        const n = document.getElementById('pN').value, a = parseFloat(document.getElementById('pAmt').value);
        if(!n || isNaN(a)) return alert("नाम और रकम भरें!");
        DB.tx.push({ id:Date.now(), name:n, amt:a, type:'rec', date:new Date().toLocaleString() });
        save(); alert("जमा सफल!"); location.reload();
    }

    function addStock() {
        const n = document.getElementById('sN').value, q = parseFloat(document.getElementById('sQ').value), r = parseFloat(document.getElementById('sR').value);
        if(!n) return; DB.stock.push({ n, q, r }); save(); renderStock();
    }
    function renderStock() {
        let h = ""; DB.stock.forEach((s, i) => { h += `<div class="card">${s.n} (${s.q}) <button style="float:right" onclick="DB.stock.splice(${i},1);save();renderStock();">✖</button></div>`; });
        document.getElementById('stockList').innerHTML = h;
    }
    function updateStockDrop() { document.getElementById('stockSel').innerHTML = '<option value="">स्टॉक चुनें</option>' + DB.stock.map(s=>`<option value="${s.n}">${s.n}</option>`).join(''); }
    function fillStockItem() { const s = DB.stock.find(x => x.n === document.getElementById('stockSel').value); if(s) { document.getElementById('iN').value = s.n; document.getElementById('iP').value = s.r; } }
    function saveCfg() { DB.cfg.n = document.getElementById('cfgN').value; DB.cfg.m = document.getElementById('cfgM').value; if(document.getElementById('cfgP').value) DB.cfg.p = document.getElementById('cfgP').value; save(); alert("सेव!"); location.reload(); }
    function runUpdate() { const code = document.getElementById('updC').value; if(code.includes("<html")) { localStorage.setItem(UPD_K, code); location.reload(); } }
    function save() { localStorage.setItem(K, JSON.stringify(DB)); }
</script>
</body>
</html>
