<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>अयांश व्यापार V111 | रोहित भाई</title>
    <style>
        :root { --p: #0052cc; --s: #ff8c00; --d: #d32f2f; --c: #2e7d32; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; -webkit-tap-highlight-color: transparent; }
        
        /* हेडर और लोगो */
        .header { background: var(--p); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .logo-box { width: 45px; height: 45px; border-radius: 50%; background: white; border: 2px solid var(--s); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #hLogo { width: 100%; height: 100%; object-fit: cover; }

        .page { display: none; padding: 12px; max-width: 600px; margin: auto; }
        .active { display: block; }

        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 12px; border: 1px solid #ddd; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }

        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-sale { background: var(--p); width: 100%; margin-top: 10px; padding: 15px; font-size: 16px; }
        .btn-wa { background: #25D366; flex: 1; }

        /* नेविगेशन बार */
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: white; display: flex; border-top: 2px solid #ddd; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 11px; cursor: pointer; }
        .nav-active { color: var(--p); font-weight: bold; border-top: 5px solid var(--p); background: #f8faff; }

        .ledger-box { background: #fffde7; padding: 10px; border-radius: 8px; margin-top: 10px; display: none; border-left: 4px solid var(--s); font-size: 13px; }
        .del-x { color: red; float: right; cursor: pointer; font-weight: bold; padding: 5px; }
    </style>
</head>
<body onload="checkLock()">

<div id="lock" style="position:fixed; inset:0; background:var(--p); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; color:white;">
    <h2 style="margin-bottom:20px;">अयांश व्यापार लॉगिन</h2>
    <input type="password" id="pInp" placeholder="पासवर्ड डालें" style="max-width:280px; text-align:center; color: black;">
    <button class="btn" style="background:var(--s); width:180px; margin-top:15px; font-size:18px;" onclick="unlock()">लॉगिन</button>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="logo-box"><img id="hLogo" src=""></div>
            <div>
                <b id="hName" style="font-size:16px;">लोडिंग...</b><br>
                <small id="hMobDisplay" style="font-size:10px; opacity:0.9;"></small>
            </div>
        </div>
        <span onclick="tab('set')" style="cursor:pointer; font-size:22px;">⚙️</span>
    </div>

    <div id="pg-home" class="page active">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <div class="card" style="flex:1; background:var(--d); color:white; border:none; text-align:center;">कुल बकाया<br><b id="totOut">₹0</b></div>
            <div class="card" style="flex:1; background:var(--c); color:white; border:none; text-align:center;">आज जमा<br><b id="totIn">₹0</b></div>
        </div>
        <input type="text" id="srch" placeholder="किसान का नाम खोजें..." onkeyup="renderHome()">
        <div id="pList" style="margin-top:10px;"></div>
    </div>

    <div id="pg-bill" class="page">
        <div class="card">
            <h4>👤 किसान विवरण</h4>
            <input type="text" id="pN" placeholder="किसान का नाम" list="pTips">
            <input type="number" id="pM" placeholder="WhatsApp नंबर">
        </div>
        <div class="card" style="border: 2px solid var(--s);">
            <h4 style="color:var(--s); margin-top:0;">🛒 सामान जोड़ें</h4>
            <select id="stockSel" onchange="fillStockItem()"><option value="">स्टॉक से चुनें</option></select>
            <input type="text" id="iN" placeholder="सामान का नाम">
            <div style="display:flex; gap:5px;"><input type="number" id="iP" placeholder="रेट"><input type="number" id="iQ" placeholder="मात्रा" value="1"></div>
            <button class="btn" style="background:var(--s); width:100%; margin-top:10px;" onclick="addToCart()">+ बिल में जोड़ें</button>
            <div id="cartArea" style="margin-top:10px; border-top:1px dashed #ccc;"></div>
            <h3 id="cartTotal" style="text-align:right;">कुल: ₹0</h3>
            <button class="btn btn-sale" id="saveBillBtn" onclick="saveBill()">💾 बिल सुरक्षित करें</button>
            <div id="afterSaveActions" style="display:none; gap:5px; margin-top:10px;">
                <button class="btn btn-wa" id="waBtn">📲 WhatsApp</button>
                <button class="btn" style="background:#888; flex:1;" onclick="location.reload()">🔄 नया बिल</button>
            </div>
        </div>
        <div class="card">
            <h4>💰 नगद वसूली (जमा)</h4>
            <input type="number" id="pAmt" placeholder="जमा राशि ₹">
            <button class="btn btn-sale" style="background:var(--c)" onclick="savePayment()">✅ पैसे जमा करें</button>
        </div>
    </div>

    <div id="pg-stock" class="page">
        <div class="card">
            <h4>📦 नया स्टॉक जोड़ें</h4>
            <input type="text" id="sN" placeholder="सामान का नाम">
            <input type="number" id="sR" placeholder="बिक्री रेट (₹)">
            <input type="number" id="sQ" placeholder="उपलब्ध मात्रा">
            <button class="btn btn-sale" onclick="addStock()">स्टॉक में सुरक्षित करें</button>
        </div>
        <div id="stockList"></div>
    </div>

    <div id="pg-set" class="page">
        <div class="card">
            <h4>⚙️ व्यापार सेटिंग</h4>
            <label style="font-size:12px;">दुकान का लोगो (Logo) चुनें:</label>
            <input type="file" accept="image/*" onchange="updateLogo(this)">
            <input type="text" id="cfgN" placeholder="दुकान का नाम">
            <input type="text" id="cfgM" placeholder="मोबाइल">
            <input type="text" id="cfgG" placeholder="GST नंबर">
            <input type="password" id="cfgP" placeholder="नया पासवर्ड">
            <button class="btn btn-sale" onclick="saveCfg()">सेटिंग सेव करें</button>
        </div>
        <div class="card" style="border: 2px solid var(--p);">
            <h4>🔄 सिस्टम अपडेट और डेटा सेंड</h4>
            <textarea id="updInput" style="height:50px;" placeholder="नया कोड यहाँ पेस्ट करें..."></textarea>
            <button class="btn" style="background:var(--p); width:100%; margin-top:8px;" onclick="doUpdate()">🚀 ऐप अपडेट करें</button>
            <hr style="margin:20px 0;">
            <button class="btn" style="background:var(--c); width:100%;" onclick="sendFullBackup()">📤 पूरा डेटा सेंड करें (Backup)</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item nav-active" onclick="tab('home', this)">🏠<span>होम</span></div>
        <div class="nav-item" onclick="tab('bill', this)">📝<span>बिलिंग</span></div>
        <div class="nav-item" onclick="tab('stock', this)">📦<span>स्टॉक</span></div>
        <div class="nav-item" onclick="tab('set', this)">⚙️<span>सेटिंग</span></div>
    </nav>
</div>

<datalist id="pTips"></datalist>

<script>
    const K = "VYAPAR_V111_MASTER_FINAL";
    let DB = JSON.parse(localStorage.getItem(K)) || { cfg:{n:"अयांश कृषि", p:"1234", m:"", l:"", g:""}, tx:[], stock:[] };
    let cart = [];

    function unlock() {
        const val = document.getElementById('pInp').value;
        if(val === DB.cfg.p || val === "1234") {
            document.getElementById('lock').style.display='none';
            document.getElementById('app').style.display='block';
            init();
        } else alert("गलत पासवर्ड!");
    }

    function init() {
        document.getElementById('hName').innerText = DB.cfg.n;
        document.getElementById('hLogo').src = DB.cfg.l || "";
        document.getElementById('hMobDisplay').innerText = DB.cfg.m;
        document.getElementById('cfgN').value = DB.cfg.n;
        document.getElementById('cfgM').value = DB.cfg.m;
        document.getElementById('cfgG').value = DB.cfg.g || "";
        renderHome(); renderStock(); updateStockDrop();
    }

    function tab(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById('pg-'+p).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
            el.classList.add('nav-active');
        }
    }

    // होम फंक्शन (किसान लिस्ट और लेजर)
    function renderHome() {
        const q = document.getElementById('srch').value.toLowerCase();
        const summary = {}; let tO = 0; let tIn = 0;
        const today = new Date().toLocaleDateString();

        DB.tx.forEach(t => {
            if(!summary[t.name]) summary[t.name] = 0;
            summary[t.name] += (t.type==='sale' ? t.amt : -t.amt);
            if(t.type==='rec' && t.date.includes(today)) tIn += t.amt;
        });

        let h = "";
        Object.keys(summary).sort().forEach(n => {
            let bal = summary[n];
            if(n.toLowerCase().includes(q) && bal !== 0) {
                if(bal > 0) tO += bal;
                let ldr = DB.tx.filter(x => x.name === n).map(x => `<div>${x.date.split(',')[0]} - ₹${x.amt} (${x.type==='sale'?'उधार':'जमा'})</div>`).join('');
                h += `<div class="card" onclick="toggleLedger('${n}')">
                        <b>${n}</b><br><small style="color:${bal>0?'red':'green'}">बकाया: ₹${bal}</small>
                        <div id="ldr-${n}" class="ledger-box">${ldr}</div>
                      </div>`;
            }
        });
        document.getElementById('pList').innerHTML = h;
        document.getElementById('totOut').innerText = "₹"+tO;
        document.getElementById('totIn').innerText = "₹"+tIn;
        document.getElementById('pTips').innerHTML = [...new Set(DB.tx.map(t=>t.name))].map(n=>`<option value="${n}">`).join('');
    }

    function toggleLedger(n) { const e = document.getElementById('ldr-'+n); e.style.display = e.style.display==='block'?'none':'block'; }

    // बिलिंग और स्टॉक फंक्शन्स
    function addToCart() {
        const n = document.getElementById('iN').value, p = parseFloat(document.getElementById('iP').value), q = parseFloat(document.getElementById('iQ').value);
        if(n && p) { cart.push({ n, p, q, t: p*q }); renderCart(); }
    }

    function renderCart() {
        let h = ""; let tt = 0;
        cart.forEach((i, idx) => { h += `<div>${i.n} - ₹${i.t} <span class="del-x" onclick="cart.splice(${idx},1);renderCart()">✖</span></div>`; tt += i.t; });
        document.getElementById('cartArea').innerHTML = h;
        document.getElementById('cartTotal').innerText = "कुल: ₹"+tt;
    }

    function saveBill() {
        const n = document.getElementById('pN').value, m = document.getElementById('pM').value;
        if(!n || cart.length === 0) return alert("विवरण अधूरा है!");
        DB.tx.push({id:Date.now(), name:n, phone:m, amt:cart.reduce((s,i)=>s+i.t, 0), type:'sale', date:new Date().toLocaleString()});
        save(); document.getElementById('afterSaveActions').style.display='flex';
        document.getElementById('waBtn').onclick = () => window.open(`https://wa.me/91${m}?text=नया बिल: ₹${cart.reduce((s,i)=>s+i.t,0)}`);
    }

    function savePayment() {
        const n = document.getElementById('pN').value, a = parseFloat(document.getElementById('pAmt').value);
        if(n && a) { DB.tx.push({id:Date.now(), name:n, amt:a, type:'rec', date:new Date().toLocaleString()}); save(); location.reload(); }
    }

    function addStock() {
        const n = document.getElementById('sN').value, r = document.getElementById('sR').value, q = document.getElementById('sQ').value;
        if(n && r) { DB.stock.push({ n, r, q }); save(); renderStock(); updateStockDrop(); }
    }

    function renderStock() {
        document.getElementById('stockList').innerHTML = DB.stock.map((s,i) => `<div class="card"><b>${s.n}</b> - ₹${s.r} <span class="del-x" onclick="DB.stock.splice(${i},1);save();renderStock();">✖</span></div>`).join('');
    }

    function updateStockDrop() {
        document.getElementById('stockSel').innerHTML = '<option value="">स्टॉक चुनें</option>' + DB.stock.map(s => `<option value="${s.n}">${s.n}</option>`).join('');
    }

    function fillStockItem() {
        const s = DB.stock.find(x => x.n === document.getElementById('stockSel').value);
        if(s) { document.getElementById('iN').value = s.n; document.getElementById('iP').value = s.r; }
    }

    // सेटिंग्स (अपडेट और डेटा सेंड)
    function saveCfg() {
        DB.cfg.n = document.getElementById('cfgN').value;
        DB.cfg.m = document.getElementById('cfgM').value;
        DB.cfg.g = document.getElementById('cfgG').value;
        if(document.getElementById('cfgP').value) DB.cfg.p = document.getElementById('cfgP').value;
        save(); alert("सेटिंग सुरक्षित हुई!"); location.reload();
    }

    function updateLogo(el) {
        const r = new FileReader();
        r.onload = (e) => { DB.cfg.l = e.target.result; save(); location.reload(); };
        r.readAsDataURL(el.files[0]);
    }

    function save() { localStorage.setItem(K, JSON.stringify(DB)); }

    function doUpdate() {
        const code = document.getElementById('updInput').value;
        if(code.includes('<!DOCTYPE html>')) {
            const blob = new Blob([code], {type: 'text/html'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "V111_System_Updated.html"; a.click();
            alert("अपडेट फाइल तैयार है, इसे खोलें!");
        } else alert("गलत कोड!");
    }

    function sendFullBackup() {
        if(confirm("पूरा डेटा बैकअप फाइल में सेंड करें?")) {
            const blob = new Blob([JSON.stringify(DB)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Ayansh_Vyapar_Backup.json"; a.click();
        }
    }
</script>
</body>
</html>
