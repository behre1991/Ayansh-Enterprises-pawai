<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>स्मार्ट शॉप हेयर - मुकम्मल समाधान</title>
    <style>
        :root { --main: #1a5f7a; --sec: #27ae60; --txt: #333; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f0f2f5; color: var(--txt); overflow-x: hidden; }
        
        /* 1. PIN लॉक स्क्रीन */
        #pinOverlay { position: fixed; inset: 0; background: var(--main); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .pin-card { background: white; padding: 30px; border-radius: 15px; width: 300px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .pin-card input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 20px; text-align: center; letter-spacing: 5px; box-sizing: border-box; }
        
        /* 2. हेडर और प्रोफाइल लोगो */
        header { background: var(--main); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; background: #eee; }

        /* 3. प्रोफाइल के 8 पॉइंट्स (स्वतंत्र बटन) */
        #profilePop { display: none; position: fixed; top: 65px; right: 10px; background: white; width: 260px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 500; }
        .pop-item { width: 100%; padding: 12px; border: none; border-bottom: 1px solid #eee; text-align: left; background: none; cursor: pointer; font-size: 14px; font-weight: 500; }
        .pop-item:hover { background: #f5f5f5; }

        /* 4. मुख्य कंटेंट और कार्ड्स */
        .page { display: none; padding: 15px; padding-bottom: 150px; min-height: 80vh; }
        .active { display: block !important; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 14px; }
        
        /* 5. बटन स्टाइल */
        .btn-sec { background: var(--sec); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; font-size: 15px; }
        .btn-sec:active { transform: scale(0.98); }

        /* 6. नेविगेशन (5 मुख्य बटन) */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 65px; z-index: 100; }
        nav button { flex: 1; border: none; background: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; cursor: pointer; }
        nav button.nav-active { color: var(--main); font-weight: bold; border-top: 3px solid var(--main); }
