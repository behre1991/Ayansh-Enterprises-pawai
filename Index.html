<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>अयांश व्यापार V101 | रोहित भाई</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --p: #0052cc; --s: #ff8c00; --d: #d32f2f; --c: #2e7d32; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .header { background: var(--p); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; sticky: top; z-index: 1000; }
        .logo-box { width: 45px; height: 45px; border-radius: 50%; background: white; border: 2px solid var(--s); overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .page { display: none; padding: 12px; max-width: 600px; margin: auto; }
        .active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 12px; border: 1px solid #ddd; }
        input, select { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: var(--s); } .btn-sale { background: var(--d); } .btn-rec { background: var(--c); }
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; border-top: 2px solid #ddd; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 11px; }
        .nav-active { color: var(--p); font-weight: bold; border-top: 4px solid var(--p); }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        #printArea { display:none; background:white; padding:20px; font-family:monospace; }
        @media print { body * { visibility: hidden; } #printArea, #printArea * { visibility: visible; } #printArea { display: block; position: absolute; left: 0; top: 0; width: 100%; } }
    </style>
</head>
<body onload="checkLock()">

<div id="lock" style="position:fixed; inset:0; background:var(--p); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; color:white;">
    <h2 id="lTitle">अयांश व्यापार V101</h2>
    <input type="password" id="pInp" placeholder="पासवर्ड" style="max-width:300px; text-align:center; height:50px; border-radius:10px; color:black;">
    <button class="btn btn-add" style="max-width:300px;" onclick="unlock()">लॉगिन</button>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="logo-box"><img id="hLogo" src=""></div>
            <div><b id="hName">दुकान</b><br><small id="hMob"></small></div>
        </div>
        <span onclick="tab('set')" style="cursor:pointer; font-size:22px;">⚙️</span>
    </div>

    <div id="pg-home" class="page active">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <div class="card" style="flex:1; background:var(--d); color:white; border:none; text-align:center;">कुल बकाया<br><b id="totOut">₹0</b></div>
            <div class="card" style="flex:1; background:var(--c); color:white; border:none; text-align:center;">आज जमा<br><b id="totIn">₹0</b></div>
        </div>
        <input type="text" id="srch" placeholder="किसान का नाम खोजें..." onkeyup="renderHome()">
        <div id="pList" style="margin-top:10px;"></div>
    </div>

    <div id="pg-bill" class="page">
        <div class="card">
            <input type="text" id="pN" placeholder="किसान का नाम" list="pTips">
            <input type="number" id="pM" placeholder="किसान मोबाइल (WhatsApp)">
        </div>
        <div class="card" style="border: 2px solid var(--s);">
            <h4 style="margin:0;">🛒 सामान जोड़ें (Multi-Item)</h4>
            <select id="stockSel" onchange="fillStockItem()"><option value="">स्टॉक से चुनें...</option></select>
            <input type="text" id="iN" placeholder="सामान का नाम">
            <div style="display:flex; gap:8px;">
                <input type="number" id="iP" placeholder="रेट ₹">
                <input type="number" id="iQ" placeholder="मात्रा" value="1">
            </div>
            <button class="btn btn-add" onclick="addToCart()">+ लिस्ट में जोड़ें</button>
            <div id="cartArea" style="margin-top:10px;"></div>
            <h3 id="cartTotal" style="text-align:right;">कुल: ₹0</h3>
            <button class="btn btn-sale" onclick="saveBill()">💾 बिल सेव और प्रिंट</button>
        </div>
        <div class="card" style="border: 2px solid var(--c);">
            <h4>💰 नगद जमा रसीद</h4>
            <input type="number" id="pAmt" placeholder="रकम ₹">
            <button class="btn btn-rec" onclick="savePayment()">✅ जमा करें</button>
        </div>
    </div>

    <div id="pg-stock" class="page">
        <div class="card">
            <h4>📦 नया स्टॉक चढ़ाएं</h4>
            <input type="text" id="sN" placeholder="सामान का नाम">
            <input type="number" id="sQ" placeholder="मात्रा">
            <input type="number" id="sR" placeholder="बिक्री रेट ₹">
            <button class="btn btn-add" onclick="addStock()">स्टॉक सेव करें</button>
        </div>
        <div id="stockList"></div>
    </div>

    <div id="pg-set" class="page">
        <div class="card">
            <h4>⚙️ दुकान प्रोफाइल</h4>
            <label>दुकान का लोगो:</label><input type="file" accept="image/*" onchange="updateLogo(this)">
            <label>दुकान का नाम:</label><input type="text" id="cfgN">
            <label>दुकानदार मोबाइल:</label><input type="text" id="cfgM">
            <label>पासवर्ड:</label><input type="password" id="cfgP">
            <button class="btn" style="background:var(--p);" onclick="saveCfg()">सेटिंग सेव करें</button>
        </div>
        <button class="btn" style="background:#555;" onclick="downloadBackup()">📥 बैकअप फाइल</button>
        <div class="card" style="margin-top:15px; border:1px dashed red;">
            <textarea id="updC" rows="2" placeholder="अपडेट कोड यहाँ पेस्ट करें..."></textarea>
            <button class="btn btn-add" onclick="runUpdate()">अपडेट लागू करें</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item nav-active" onclick="tab('home', this)">🏠<span>होम</span></div>
        <div class="nav-item" onclick="tab('bill', this)">📝<span>नया बिल</span></div>
        <div class="nav-item" onclick="tab('stock', this)">📦<span>स्टॉक</span></div>
        <div class="nav-item" onclick="tab('set', this)">⚙️<span>सेटिंग</span></div>
    </nav>
</div>

<div id="printArea">
    <center><h2 id="prDukan"></h2><p id="prMob"></p></center>
    <hr><p>किसान: <b id="prKisan"></b></p>
    <div id="prItems"></div><hr>
    <h3 style="text-align:right;">कुल: ₹<span id="prTotal"></span></h3>
</div>

<datalist id="pTips"></datalist>

<script>
    const K = "VYAPAR_V94_ROHIT";
    let DB = JSON.parse(localStorage.getItem(K)) || { cfg:{n:"अयांश कृषि", p:"1234", m:"", l:""}, tx:[], stock:[] };
    let cart = [];

    function unlock() {
        if(document.getElementById('pInp').value === DB.cfg.p || document.getElementById('pInp').value === "1234") {
            document.getElementById('lock').style.display='none'; document.getElementById('app').style.display='block'; init();
        } else alert("गलत पासवर्ड!");
    }

    function init() {
        document.getElementById('hName').innerText = DB.cfg.n;
        document.getElementById('hLogo').src = DB.cfg.l || "";
        document.getElementById('hMob').innerText = DB.cfg.m ? "📞 " + DB.cfg.m : "";
        document.getElementById('cfgN').value = DB.cfg.n;
        document.getElementById('cfgM').value = DB.cfg.m;
        renderHome(); renderStock(); updateStockDrop();
    }

    function tab(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById('pg-'+p).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        if(el) el.classList.add('nav-active');
    }

    // --- स्टॉक फंक्शन ---
    function addStock() {
        const n = document.getElementById('sN').value, q = parseFloat(document.getElementById('sQ').value), r = parseFloat(document.getElementById('sR').value);
        if(!n || isNaN(q)) return;
        DB.stock.push({ n, q, r }); save(); renderStock(); updateStockDrop();
        document.getElementById('sN').value=""; document.getElementById('sQ').value=""; document.getElementById('sR').value="";
    }

    function renderStock() {
        let h = "<h4>📦 स्टॉक लिस्ट</h4>";
        DB.stock.forEach((s, i) => {
            h += `<div class="card" style="display:flex; justify-content:space-between;">
                <span><b>${s.n}</b> (मात्रा: ${s.q})</span>
                <button onclick="DB.stock.splice(${i},1);save();renderStock();" style="color:red; border:none; background:none;">✖</button>
            </div>`;
        });
        document.getElementById('stockList').innerHTML = h;
    }

    function updateStockDrop() {
        let h = '<option value="">स्टॉक से चुनें...</option>';
        DB.stock.forEach(s => h += `<option value="${s.n}">${s.n} (बचा: ${s.q})</option>`);
        document.getElementById('stockSel').innerHTML = h;
    }

    function fillStockItem() {
        const s = DB.stock.find(x => x.n === document.getElementById('stockSel').value);
        if(s) { document.getElementById('iN').value = s.n; document.getElementById('iP').value = s.r; }
    }

    // --- बिलिंग फंक्शन ---
    function addToCart() {
        const n = document.getElementById('iN').value, p = parseFloat(document.getElementById('iP').value), q = parseFloat(document.getElementById('iQ').value);
        if(!n || isNaN(p)) return;
        cart.push({ n, p, q, t:p*q });
        renderCart();
        document.getElementById('iN').value=""; document.getElementById('iP').value="";
    }

    function renderCart() {
        let h = ""; let tt = 0;
        cart.forEach((i, idx) => { h += `<div class="item-row"><span>${i.n} (${i.q}x${i.p})</span><b>₹${i.t} <span onclick="cart.splice(${idx},1);renderCart()" style="color:red">✖</span></b></div>`; tt += i.t; });
        document.getElementById('cartArea').innerHTML = h; document.getElementById('cartTotal').innerText = "कुल: ₹"+tt;
    }

    function saveBill() {
        const n = document.getElementById('pN').value, m = document.getElementById('pM').value;
        if(!n || cart.length === 0) return alert("किसान और सामान जोड़ें!");
        const tt = cart.reduce((s,i)=>s+i.t, 0);
        
        cart.forEach(ci => {
            let s = DB.stock.find(x => x.n === ci.n);
            if(s) s.q -= ci.q;
        });

        DB.tx.push({ id:Date.now(), name:n, phone:m, amt:tt, type:'sale', date:new Date().toLocaleString(), itms:[...cart] });
        save();
        
        document.getElementById('prDukan').innerText = DB.cfg.n;
        document.getElementById('prMob').innerText = "📞 " + DB.cfg.m;
        document.getElementById('prKisan').innerText = n;
        document.getElementById('prTotal').innerText = tt;
        let h = ""; cart.forEach(i => h += `<div>${i.n} - ₹${i.t}</div>`);
        document.getElementById('prItems').innerHTML = h;
        window.print();
        location.reload();
    }

    function savePayment() {
        const n = document.getElementById('pN').value, a = parseFloat(document.getElementById('pAmt').value);
        if(!n || isNaN(a)) return;
        DB.tx.push({ id:Date.now(), name:n, amt:a, type:'rec', date:new Date().toLocaleString() });
        save(); alert("जमा हुआ!"); location.reload();
    }

    function renderHome() {
        const q = document.getElementById('srch').value.toLowerCase();
        const l = {}; let tO = 0; let tI = 0; const today = new Date().toLocaleDateString();
        DB.tx.forEach(t => { 
            if(!l[t.name]) l[t.name] = 0; 
            l[t.name] += (t.type==='sale'?t.amt:-t.amt);
            if(t.type==='rec' && t.date.includes(today)) tI += t.amt;
        });
        let h = ""; Object.keys(l).sort().forEach(n => {
            if(n.toLowerCase().includes(q)) {
                if(l[n]>0) tO += l[n];
                h += `<div class="card" onclick="alert('बकाया: ₹'+${l[n]})" style="display:flex; justify-content:space-between;"><b>${n}</b><b style="color:red">₹${l[n]}</b></div>`;
            }
        });
        document.getElementById('pList').innerHTML = h;
        document.getElementById('totOut').innerText = "₹"+tO;
        document.getElementById('totIn').innerText = "₹"+tI;
        document.getElementById('pTips').innerHTML = [...new Set(DB.tx.map(t=>t.name))].map(n=>`<option value="${n}">`).join('');
    }

    // --- प्रोफाइल/सेटिंग ---
    function updateLogo(el) {
        const reader = new FileReader();
        reader.onload = (e) => { DB.cfg.l = e.target.result; document.getElementById('hLogo').src = e.target.result; };
        reader.readAsDataURL(el.files[0]);
    }

    function saveCfg() {
        DB.cfg.n = document.getElementById('cfgN').value;
        DB.cfg.m = document.getElementById('cfgM').value;
        if(document.getElementById('cfgP').value) DB.cfg.p = document.getElementById('cfgP').value;
        save(); alert("सेटिंग सेव हुई!"); location.reload();
    }

    function save() { localStorage.setItem(K, JSON.stringify(DB)); }
    function runUpdate() { const c = document.getElementById('updC').value; if(c.includes("<html")) { document.open(); document.write(c); document.close(); } }
    function downloadBackup() { const blob = new Blob([JSON.stringify(DB)], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Vyapar_Backup.json"; a.click(); }
</script>
</body>
</html>
