<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ayansh Super Vyapar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --p: #002970; --s: #FF8F00; --g: #2E7D32; --r: #C62828; --bg: #F4F7F9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: #333; }
        
        /* प्रोफेशनल हेडर */
        .header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--s); position: sticky; top: 0; z-index: 1000; }
        .header h2 { margin: 0; font-size: 18px; text-transform: uppercase; }

        .container { padding: 10px; max-width: 550px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); border-left: 5px solid var(--p); }
        
        /* इनपुट बॉक्स */
        label { font-size: 12px; font-weight: bold; color: #666; margin-bottom: 5px; display: block; }
        .inp { width: 100% !important; height: 45px !important; margin-bottom: 12px !important; border: 1px solid #BDC3C7 !important; border-radius: 8px !important; padding: 10px !important; box-sizing: border-box !important; font-size: 16px !important; }
        .inp:focus { border-color: var(--s) !important; outline: none; background: #FFFDE7; }

        /* बटन्स */
        .btn { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; padding: 12px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; font-size: 15px; }
        .btn-save { background: var(--s); color: white; box-shadow: 0 4px #E67E00; }
        .btn-stock { background: var(--p); color: white; margin-top: 10px; }
        .btn-excel { background: var(--g); color: white; margin-top: 10px; }
        
        /* बकाया स्टेटस बार */
        .status-bar { display: flex; justify-content: space-between; background: #E8EAF6; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; border: 1px solid #C5CAE9; }

        /* फुटर नेविगेशन */
        .footer { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 70px; border-top: 1px solid #ddd; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #7F8C8D; font-size: 11px; font-weight: bold; cursor: pointer; }
        .tab-active { color: var(--p); background: #F0F2F9; border-top: 4px solid var(--p); }

        .page { display: none; }
        .show { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .badge { padding: 2px 8px; border-radius: 10px; font-size: 10px; color: white; }
    </style>
</head>
<body onload="initApp()">

    <div class="header">
        <h2 id="sh-name">Ayansh Vyapar</h2>
        <div id="sh-gst" style="font-size: 10px; background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 4px;">GST: NA</div>
    </div>

    <div class="container">
        
        <div id="pg-bill" class="page">
            <div class="card">
                <div class="status-bar">
                    <span>पुराना बकाया:</span>
                    <span id="old-bal" style="color:var(--r)">₹0</span>
                </div>
                <label>किसान का नाम:</label>
                <input type="text" id="cN" class="inp" placeholder="नाम लिखें..." list="custL" onkeyup="checkCustomer(this.value)">
                <label>मोबाइल नंबर:</label>
                <input type="number" id="cM" class="inp" placeholder="WhatsApp नंबर">
            </div>

            <div class="card" style="border-left-color: var(--s);">
                <label>सामान का चयन करें:</label>
                <input type="text" id="iN" class="inp" placeholder="सामान का नाम..." list="stockL" onchange="checkStockVal(this.value)">
                <div id="stk-info" style="font-size: 11px; color: var(--g); margin-top: -10px; margin-bottom: 10px;"></div>
                
                <div style="display:flex; gap:10px;">
                    <div style="flex:2">
                        <label>कुल रकम (₹):</label>
                        <input type="number" id="iA" class="inp" placeholder="0.00">
                    </div>
                    <div style="flex:1">
                        <label>पेमेंट:</label>
                        <select id="iT" class="inp">
                            <option value="उधार">उधार</option>
                            <option value="नगद">नगद</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-save" onclick="saveBill()">💾 बिल सुरक्षित करें</button>
            </div>
        </div>

        <div id="pg-ledger" class="page">
            <button class="btn btn-excel" onclick="exportExcel(DB.tx, 'Full_Khata_Report')">📥 पूरा खाता Excel डाउनलोड</button>
            <input type="text" id="srchK" class="inp" placeholder="नाम या मोबाइल से खोजें..." onkeyup="renderKhata()">
            <div id="ledger-list"></div>
        </div>

        <div id="pg-stock" class="page">
            <div class="card">
                <h3>📦 नया स्टॉक जोड़ें</h3>
                <input type="text" id="stN" class="inp" placeholder="सामान का नाम">
                <input type="number" id="stQ" class="inp" placeholder="मात्रा (Quantity)">
                <button class="btn btn-stock" onclick="addStock()">➕ स्टॉक अपडेट करें</button>
            </div>
            <div id="stock-display"></div>
        </div>

        <div id="pg-set" class="page">
            <div class="card">
                <h3>⚙️ दुकान की सेटिंग</h3>
                <label>दुकान का नाम:</label><input type="text" id="s-shop" class="inp">
                <label>GST नंबर:</label><input type="text" id="s-gst" class="inp">
                <button class="btn btn-stock" onclick="updateProfile()">💾 अपडेट करें</button>
            </div>
            <div class="card" style="border-left-color: var(--r);">
                <label>एडवांस कोड अपडेट:</label>
                <textarea id="app-code" class="inp" style="height:60px" placeholder="नया कोड यहाँ पेस्ट करें"></textarea>
                <button class="btn" style="background:var(--r); color:white" onclick="selfUpdate()">🚀 ऐप अपडेट करें</button>
                <button class="btn" style="background:#333; color:white; margin-top:10px;" onclick="downloadBackup()">📥 बैकअप JSON</button>
            </div>
        </div>

    </div>

    <div class="footer">
        <div class="tab" id="t-bill" onclick="switchTab('bill')">📝 बिलिंग</div>
        <div class="tab" id="t-ledger" onclick="switchTab('ledger')">📒 खाता</div>
        <div class="tab" id="t-stock" onclick="switchTab('stock')">📦 स्टॉक</div>
        <div class="tab" id="t-set" onclick="switchTab('set')">⚙️ सेटिंग</div>
    </div>

    <datalist id="custL"></datalist>
    <datalist id="stockL"></datalist>

    <script>
        let DB = JSON.parse(localStorage.getItem("AYANSH_AI_DB")) || { tx: [], stock: [], prof: { shop: "Ayansh Enterprises", gst: "NA" } };

        function initApp() {
            switchTab('bill');
            loadProf();
            renderKhata();
            renderStock();
        }

        function switchTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
            document.getElementById('pg-' + t).classList.add('show');
            document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('tab-active'));
            document.getElementById('t-' + t).classList.add('tab-active');
        }

        function loadProf() {
            document.getElementById('sh-name').innerText = DB.prof.shop;
            document.getElementById('sh-gst').innerText = "GST: " + DB.prof.gst;
            document.getElementById('s-shop').value = DB.prof.shop;
            document.getElementById('s-gst').value = DB.prof.gst;
        }

        function updateProfile() {
            DB.prof.shop = document.getElementById('s-shop').value;
            DB.prof.gst = document.getElementById('s-gst').value;
            sync(); loadProf(); alert("प्रोफाइल अपडेट हुई!");
        }

        function checkCustomer(name) {
            let bal = DB.tx.filter(x => x.n === name).reduce((s, x) => s + (x.t === 'उधार' ? x.a : 0), 0);
            document.getElementById('old-bal').innerText = "₹" + bal;
            let found = DB.tx.find(x => x.n === name);
            if(found) document.getElementById('cM').value = found.m || "";
        }

        function checkStockVal(name) {
            let item = DB.stock.find(x => x.n === name);
            document.getElementById('stk-info').innerText = item ? `स्टॉक में उपलब्ध: ${item.q}` : "नया सामान";
        }

        function saveBill() {
            let n = document.getElementById('cN').value, a = document.getElementById('iA').value, i = document.getElementById('iN').value;
            if(!n || !a) return alert("नाम और रकम जरूरी है!");

            DB.tx.push({ n, m: document.getElementById('cM').value, i, a: parseFloat(a), t: document.getElementById('iT').value, d: new Date().toLocaleString() });
            
            // स्टॉक कम करना (ऑप्शनल)
            let stkItem = DB.stock.find(x => x.n === i);
            if(stkItem) stkItem.q -= 1; 

            sync(); alert("हिसाब सुरक्षित!");
            renderKhata(); renderStock();
            document.getElementById('iA').value = ""; document.getElementById('iN').value = "";
        }

        function renderKhata() {
            let q = document.getElementById('srchK').value.toLowerCase();
            let html = "";
            let names = [...new Set(DB.tx.map(x => x.n))].reverse();
            
            names.forEach(name => {
                if(name.toLowerCase().includes(q)) {
                    let txs = DB.tx.filter(x => x.n === name);
                    let bal = txs.reduce((s, x) => s + (x.t === 'उधार' ? x.a : 0), 0);
                    html += `<div class="card">
                        <div style="display:flex; justify-content:space-between;">
                            <b>${name}</b>
                            <b style="color:var(--r)">बकाया: ₹${bal}</b>
                        </div>
                        <div style="font-size:12px; margin-top:10px; border-top:1px solid #eee;">
                            ${txs.slice(-3).map(e => `<div style="padding:5px 0; border-bottom:1px solid #f9f9f9; display:flex; justify-content:space-between;">
                                <span>${e.d.split(',')[0]} - ${e.i}</span>
                                <span>₹${e.a} <button style="color:red; border:none; background:none;" onclick="delTx('${e.d}')">🗑️</button></span>
                            </div>`).join('')}
                        </div>
                        <button class="btn btn-stock" style="padding:5px; font-size:11px;" onclick="exportSingleExcel('${name}')">Excel रसीद</button>
                    </div>`;
                }
            });
            document.getElementById('ledger-list').innerHTML = html;
            document.getElementById('custL').innerHTML = names.map(x => `<option value="${x}">`).join('');
        }

        function addStock() {
            let n = document.getElementById('stN').value, q = parseInt(document.getElementById('stQ').value);
            if(!n || !q) return alert("नाम और मात्रा भरें!");
            let found = DB.stock.find(x => x.n === n);
            if(found) found.q += q; else DB.stock.push({ n, q });
            sync(); renderStock();
            alert("स्टॉक अपडेट हुआ!");
        }

        function renderStock() {
            let html = "";
            DB.stock.forEach((s, idx) => {
                html += `<div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left-color:var(--g)">
                    <span><b>${s.n}</b></span>
                    <span>${s.q} मात्रा <button style="color:red; border:none; background:none" onclick="delStk(${idx})">🗑️</button></span>
                </div>`;
            });
            document.getElementById('stock-display').innerHTML = html;
            document.getElementById('stockL').innerHTML = DB.stock.map(x => `<option value="${x.n}">`).join('');
        }

        function delTx(d) { if(confirm("डिलीट करें?")) { DB.tx = DB.tx.filter(x => x.d !== d); sync(); renderKhata(); } }
        function delStk(idx) { if(confirm("स्टॉक हटाएं?")) { DB.stock.splice(idx, 1); sync(); renderStock(); } }
        function sync() { localStorage.setItem("AYANSH_AI_DB", JSON.stringify(DB)); }

        function exportExcel(data, name) {
            let ws = XLSX.utils.json_to_sheet(data);
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Records");
            XLSX.writeFile(wb, `${name}.xlsx`);
        }

        function exportSingleExcel(name) {
            let data = DB.tx.filter(x => x.n === name);
            exportExcel(data, name + "_Khata");
        }

        function selfUpdate() {
            let code = document.getElementById('app-code').value;
            if(code.length < 100) return alert("सही कोड पेस्ट करें!");
            let blob = new Blob([code], {type: 'text/html'});
            window.location.href = URL.createObjectURL(blob);
        }

        function downloadBackup() {
            let data = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(DB));
            let a = document.createElement('a'); a.href = data; a.download = "Ayansh_Backup.json"; a.click();
        }
    </script>
</body>
</html>
